<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAG Video Systems - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js">
</script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        .logo-text {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            letter-spacing: 8px;
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
            display: none;
        }

        .info {
            background: #e0e7ff;
            border: 2px solid #667eea;
            color: #3730a3;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.85em;
        }

        .info strong {
            display: block;
            margin-bottom: 5px;
        }

        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-text">TAG</div>
        <h1>Video Systems</h1>
        <div class="subtitle">Probe Monitoring Dashboard</div>

        <div id="error" class="error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
            <div class="loading" id="loading">Authenticating...</div>
        </form>

        <div class="info">
            <strong>Demo Credentials:</strong>
            Username: <code>admin</code><br>
            Password: <code>TagVideo2024!</code>
        </div>
    </div>

    <script>
        // Cognito configuration - will be set after deployment
        const COGNITO_CONFIG = {
            UserPoolId: 'YOUR_USER_POOL_ID',
            ClientId: 'YOUR_CLIENT_ID',
            Region: 'us-east-1'
        };

        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error');
        const loadingDiv = document.getElementById('loading');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            hideError();
            showLoading();

            try {
                // Configure Cognito
                const poolData = {
                    UserPoolId: COGNITO_CONFIG.UserPoolId,
                    ClientId: COGNITO_CONFIG.ClientId
                };
                const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

                const authenticationData = {
                    Username: username,
                    Password: password,
                };
                const authenticationDetails = new AmazonCognitoIdentity.AuthenticationDetails(authenticationData);

                const userData = {
                    Username: username,
                    Pool: userPool,
                };
                const cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

                cognitoUser.authenticateUser(authenticationDetails, {
                    onSuccess: function(result) {
                        const accessToken = result.getAccessToken().getJwtToken();
                        const idToken = result.getIdToken().getJwtToken();
                        
                        // Store tokens
                        sessionStorage.setItem('accessToken', accessToken);
                        sessionStorage.setItem('idToken', idToken);
                        sessionStorage.setItem('username', username);
                        
                        // Redirect to dashboard
                        window.location.href = 'index.html';
                    },
                    onFailure: function(err) {
                        hideLoading();
                        showError(err.message || 'Authentication failed');
                    },
                    newPasswordRequired: function(userAttributes, requiredAttributes) {
                        hideLoading();
                        showError('Password change required. Please contact administrator.');
                    }
                });

            } catch (error) {
                hideLoading();
                showError(error.message || 'An error occurred during login');
            }
        });

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            errorDiv.style.display = 'none';
        }

        function showLoading() {
            loadingDiv.style.display = 'block';
            loginBtn.disabled = true;
        }

        function hideLoading() {
            loadingDiv.style.display = 'none';
            loginBtn.disabled = false;
        }
    </script>
</body>
</html>
