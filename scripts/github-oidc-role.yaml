AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub OIDC provider and deploy role for CDK in Sandbox

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organization or user (e.g., my-org)
  GitHubRepo:
    Type: String
    Description: Repository name (e.g., tsg-sandbox-pipeline)
  RoleName:
    Type: String
    Default: GitHubDeployRole
    Description: Name of the IAM role to create

Resources:
  # Creates the OIDC provider if it's not already present.
  # If you already created an OIDC provider manually in this account, you can comment this resource out.
  GitHubOidc:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main
                  - repo:${GitHubOrg}/${GitHubRepo}:pull_request
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

Outputs:
  RoleArn:
    Value: !GetAtt DeployRole.Arn
    Description: Use this in GitHub Actions secret AWS_ROLE_ARN