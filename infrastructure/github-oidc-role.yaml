AWSTemplateFormatVersion: '2010-09-09'
Description: 'GitHub Actions OIDC Role for AWS Bill Analyzer Deployment'

Parameters:
  GitHubOrg:
    Type: String
    Default: 'arieeshkol1'
    Description: GitHub organization or username
  
  GitHubRepo:
    Type: String
    Default: 'TAG-SYSTEM-POC'
    Description: GitHub repository name
  
  AWSAccountId:
    Type: String
    Default: '991105135552'
    Description: AWS Account ID

Resources:
  # GitHub OIDC Provider
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd
      Tags:
        - Key: Project
          Value: AWS-Bill-Analyzer
        - Key: ManagedBy
          Value: CloudFormation

  # IAM Role for GitHub Actions
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsDeploymentRole
      Description: Role for GitHub Actions to deploy AWS Bill Analyzer
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOIDCProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
      ManagedPolicyArns:
        - !Ref GitHubActionsPolicy
      MaxSessionDuration: 3600
      Tags:
        - Key: Project
          Value: AWS-Bill-Analyzer
        - Key: ManagedBy
          Value: CloudFormation

  # Custom Policy for GitHub Actions
  GitHubActionsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: GitHubActionsDeploymentPolicy
      Description: Permissions for GitHub Actions to deploy AWS Bill Analyzer
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # S3 Permissions
          - Sid: S3BucketManagement
            Effect: Allow
            Action:
              - s3:CreateBucket
              - s3:DeleteBucket
              - s3:PutBucketPolicy
              - s3:GetBucketPolicy
              - s3:PutBucketVersioning
              - s3:GetBucketVersioning
              - s3:PutBucketEncryption
              - s3:GetBucketEncryption
              - s3:PutLifecycleConfiguration
              - s3:GetLifecycleConfiguration
              - s3:PutBucketPublicAccessBlock
              - s3:GetBucketPublicAccessBlock
              - s3:PutBucketTagging
              - s3:GetBucketTagging
              - s3:ListBucket
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:PutObjectAcl
              - s3:GetObjectAcl
            Resource:
              - arn:aws:s3:::arieleshkolwebsite22feb2026
              - arn:aws:s3:::arieleshkolwebsite22feb2026/*
              - arn:aws:s3:::aws-bill-analyzer-storage-991105135552
              - arn:aws:s3:::aws-bill-analyzer-storage-991105135552/*
              - arn:aws:s3:::www.eshkolai.com
              - arn:aws:s3:::www.eshkolai.com/*
              - arn:aws:s3:::eshkolai.com
              - arn:aws:s3:::eshkolai.com/*
              - arn:aws:s3:::slashmycloudbill.com
              - arn:aws:s3:::slashmycloudbill.com/*
          
          - Sid: S3ListAllBuckets
            Effect: Allow
            Action:
              - s3:ListAllMyBuckets
              - s3:GetBucketLocation
            Resource: '*'
          
          # Lambda Permissions
          - Sid: LambdaManagement
            Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:DeleteFunction
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:GetFunction
              - lambda:GetFunctionConfiguration
              - lambda:ListFunctions
              - lambda:PublishVersion
              - lambda:CreateAlias
              - lambda:UpdateAlias
              - lambda:DeleteAlias
              - lambda:GetAlias
              - lambda:AddPermission
              - lambda:RemovePermission
              - lambda:GetPolicy
              - lambda:PutFunctionConcurrency
              - lambda:DeleteFunctionConcurrency
              - lambda:TagResource
              - lambda:UntagResource
              - lambda:ListTags
            Resource:
              - !Sub 'arn:aws:lambda:us-east-1:${AWSAccountId}:function:aws-bill-analyzer-*'
          
          # IAM Permissions
          - Sid: IAMRoleManagement
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:PassRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:GetRolePolicy
              - iam:ListRolePolicies
              - iam:ListAttachedRolePolicies
              - iam:TagRole
              - iam:UntagRole
            Resource:
              - !Sub 'arn:aws:iam::${AWSAccountId}:role/aws-bill-analyzer-*'
              - !Sub 'arn:aws:iam::${AWSAccountId}:role/GitHubDeployRole'
          
          # API Gateway Permissions
          - Sid: APIGatewayManagement
            Effect: Allow
            Action:
              - apigateway:POST
              - apigateway:GET
              - apigateway:PUT
              - apigateway:PATCH
              - apigateway:DELETE
              - apigateway:UpdateRestApiPolicy
            Resource:
              - arn:aws:apigateway:us-east-1::/restapis
              - arn:aws:apigateway:us-east-1::/restapis/*
              - arn:aws:apigateway:us-east-1::/apis
              - arn:aws:apigateway:us-east-1::/apis/*
              - arn:aws:apigateway:us-east-1::/tags/*

          # DynamoDB Permissions
          - Sid: DynamoDBManagement
            Effect: Allow
            Action:
              - dynamodb:CreateTable
              - dynamodb:DeleteTable
              - dynamodb:DescribeTable
              - dynamodb:UpdateTable
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:Query
              - dynamodb:BatchWriteItem
              - dynamodb:BatchGetItem
              - dynamodb:TagResource
              - dynamodb:UntagResource
              - dynamodb:ListTagsOfResource
            Resource:
              - !Sub 'arn:aws:dynamodb:us-east-1:${AWSAccountId}:table/ViewMyBill-*'

          # CloudFront Permissions
          - Sid: CloudFrontManagement
            Effect: Allow
            Action:
              - cloudfront:CreateDistribution
              - cloudfront:DeleteDistribution
              - cloudfront:GetDistribution
              - cloudfront:GetDistributionConfig
              - cloudfront:ListDistributions
              - cloudfront:UpdateDistribution
              - cloudfront:CreateInvalidation
              - cloudfront:GetInvalidation
              - cloudfront:CreateFunction
              - cloudfront:UpdateFunction
              - cloudfront:DeleteFunction
              - cloudfront:PublishFunction
              - cloudfront:DescribeFunction
              - cloudfront:GetFunction
              - cloudfront:ListFunctions
              - cloudfront:AssociateAlias
              - cloudfront:TagResource
              - cloudfront:UntagResource
              - cloudfront:ListTagsForResource
            Resource: '*'

          # Route 53 Permissions (needed for slashmycloudbill.com DNS)
          - Sid: Route53Management
            Effect: Allow
            Action:
              - route53:ChangeResourceRecordSets
              - route53:GetHostedZone
              - route53:ListHostedZones
              - route53:ListResourceRecordSets
              - route53:GetChange
            Resource:
              - arn:aws:route53:::hostedzone/Z08610352PUNQ7MUZTRVI
              - arn:aws:route53:::change/*

          # ACM Certificate Permissions (needed for slashmycloudbill.com)
          - Sid: ACMCertificateManagement
            Effect: Allow
            Action:
              - acm:RequestCertificate
              - acm:DescribeCertificate
              - acm:ListCertificates
              - acm:DeleteCertificate
              - acm:AddTagsToCertificate
            Resource: '*'
          
          # CloudFormation Permissions
          - Sid: CloudFormationManagement
            Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:DescribeStackResources
              - cloudformation:GetTemplate
              - cloudformation:ValidateTemplate
              - cloudformation:ListStacks
              - cloudformation:ListStackResources
              - cloudformation:CreateChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:ExecuteChangeSet
              - cloudformation:DeleteChangeSet
              - cloudformation:GetTemplateSummary
            Resource:
              - !Sub 'arn:aws:cloudformation:us-east-1:${AWSAccountId}:stack/aws-bill-analyzer-*/*'
              - !Sub 'arn:aws:cloudformation:us-east-1:${AWSAccountId}:stack/slashmycloudbill-*/*'
          
          # Bedrock Permissions
          - Sid: BedrockAccess
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:GetFoundationModel
              - bedrock:ListFoundationModels
            Resource: '*'
          
          # CloudWatch Logs Permissions
          - Sid: CloudWatchLogsManagement
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
              - logs:DeleteLogGroup
              - logs:PutRetentionPolicy
            Resource:
              - !Sub 'arn:aws:logs:us-east-1:${AWSAccountId}:log-group:/aws/lambda/aws-bill-analyzer-*'
              - !Sub 'arn:aws:logs:us-east-1:${AWSAccountId}:log-group:/aws/lambda/aws-bill-analyzer-*:*'
          
          # General Permissions
          - Sid: GeneralReadAccess
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
              - cloudwatch:PutMetricData
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeVpcs
            Resource: '*'

Outputs:
  GitHubActionsRoleArn:
    Description: ARN of the IAM role for GitHub Actions
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: GitHubActionsRoleArn
  
  OIDCProviderArn:
    Description: ARN of the GitHub OIDC provider
    Value: !GetAtt GitHubOIDCProvider.Arn
    Export:
      Name: GitHubOIDCProviderArn
