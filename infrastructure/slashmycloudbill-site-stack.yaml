AWSTemplateFormatVersion: '2010-09-09'
Description: 'slashmycloudbill.com — Dedicated S3 bucket + CloudFront distribution'

Parameters:
  CertificateArn:
    Type: String
    Default: 'arn:aws:acm:us-east-1:991105135552:certificate/5f9cd85b-591f-4787-963b-8f616c448588'
    Description: ACM certificate ARN for slashmycloudbill.com (must be in us-east-1)

  HostedZoneId:
    Type: String
    Default: 'Z08610352PUNQ7MUZTRVI'
    Description: Route 53 hosted zone ID for slashmycloudbill.com

Resources:

  # ── S3 Bucket ─────────────────────────────────────────────────────────────
  SlashMyCloudBillBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: slashmycloudbill.com
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
        - Key: Project
          Value: SlashMyCloudBill

  SlashMyCloudBillBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SlashMyCloudBillBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${SlashMyCloudBillBucket.Arn}/*'

  # ── CloudFront Distribution ───────────────────────────────────────────────
  SlashMyCloudBillDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: slashmycloudbill.com distribution
        Aliases:
          - slashmycloudbill.com
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SlashMyCloudBillBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          ACMCertificateArn: !Ref CertificateArn
          SSLSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        HttpVersion: http2
        PriceClass: PriceClass_100
      Tags:
        - Key: Project
          Value: SlashMyCloudBill

  # ── Route 53 DNS Records ───────────────────────────────────────────────────
  SlashMyCloudBillDnsA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: slashmycloudbill.com
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt SlashMyCloudBillDistribution.DomainName
        EvaluateTargetHealth: false

  SlashMyCloudBillDnsAAAA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: slashmycloudbill.com
      Type: AAAA
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt SlashMyCloudBillDistribution.DomainName
        EvaluateTargetHealth: false


Outputs:
  BucketName:
    Value: !Ref SlashMyCloudBillBucket
    Export:
      Name: SlashMyCloudBill-BucketName

  DistributionId:
    Value: !Ref SlashMyCloudBillDistribution
    Export:
      Name: SlashMyCloudBill-DistributionId

  DistributionDomain:
    Value: !GetAtt SlashMyCloudBillDistribution.DomainName
    Export:
      Name: SlashMyCloudBill-Domain
