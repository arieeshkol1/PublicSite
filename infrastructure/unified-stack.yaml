AWSTemplateFormatVersion: '2010-09-09'
Description: 'Eshkolai.com - Complete website infrastructure: S3, CloudFront, ACM, Route 53'

Parameters:
  DomainName:
    Type: String
    Default: www.eshkolai.com
  RootDomainName:
    Type: String
    Default: eshkolai.com
  HostedZoneId:
    Type: String
    Default: Z07144662HMOSSEBOKGII

Resources:
  # ─── S3 Bucket ───
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DomainName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
        - Key: ManagedBy
          Value: CloudFormation

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${WebsiteBucket.Arn}/*'

  # ─── SSL Certificate (covers both www and root) ───
  SSLCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref RootDomainName
      SubjectAlternativeNames:
        - !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref RootDomainName
          HostedZoneId: !Ref HostedZoneId
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: ManagedBy
          Value: CloudFormation

  # ─── CloudFront Distribution (serves both www and root) ───
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn:
      - WebsiteBucket
      - SSLCertificate
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'Distribution for ${RootDomainName}'
        Aliases:
          - !Ref DomainName
          - !Ref RootDomainName
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !Sub '${DomainName}.s3-website-${AWS::Region}.amazonaws.com'
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 86400
          MaxTTL: 31536000
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 300
        ViewerCertificate:
          AcmCertificateArn: !Ref SSLCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        HttpVersion: http2
        PriceClass: PriceClass_100
      Tags:
        - Key: ManagedBy
          Value: CloudFormation

  # ─── Route 53 DNS Records ───
  WWWRecord:
    Type: AWS::Route53::RecordSet
    DependsOn: CloudFrontDistribution
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        EvaluateTargetHealth: false

  RootRecord:
    Type: AWS::Route53::RecordSet
    DependsOn: CloudFrontDistribution
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref RootDomainName
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        EvaluateTargetHealth: false

  # ─── Audit Evaluator Lambda ───
  AuditEvaluatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: audit-evaluator
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Timeout: 60
      MemorySize: 256
      Code:
        ZipFile: |
          # Placeholder - deploy via CI/CD or script
          def lambda_handler(event, context):
              pass
      Environment:
        Variables:
          TABLE_NAME: Audit_Transaction_Log
          BEDROCK_MODEL_ID: us.anthropic.claude-opus-4-0-20250514
      Role: !GetAtt AuditEvaluatorRole.Arn

  AuditEvaluatorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: audit-evaluator-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AuditEvaluatorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource:
                  - !GetAtt TransactionLogTable.Arn
                  - !Sub '${TransactionLogTable.Arn}/stream/*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: '*'

  AuditEvaluatorEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt TransactionLogTable.StreamArn
      FunctionName: !Ref AuditEvaluatorFunction
      StartingPosition: LATEST
      BatchSize: 1

  # ─── DynamoDB: Audit Transaction Log ───
  TransactionLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Audit_Transaction_Log
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: transaction_id
          AttributeType: S
        - AttributeName: start_timestamp
          AttributeType: S
        - AttributeName: user_email
          AttributeType: S
        - AttributeName: function_name
          AttributeType: S
      KeySchema:
        - AttributeName: transaction_id
          KeyType: HASH
        - AttributeName: start_timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: user-email-index
          KeySchema:
            - AttributeName: user_email
              KeyType: HASH
            - AttributeName: start_timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: function-name-index
          KeySchema:
            - AttributeName: function_name
              KeyType: HASH
            - AttributeName: start_timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiry_ttl
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  # ─── Audit Evaluator Lambda ───
  AuditEvaluatorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AuditEvaluatorLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AuditEvaluatorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource:
                  - !GetAtt TransactionLogTable.Arn
                  - !Sub '${TransactionLogTable.Arn}/index/*'
                  - !GetAtt TransactionLogTable.StreamArn
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  AuditEvaluatorFunction:
    Type: AWS::Lambda::Function
    DependsOn: AuditEvaluatorRole
    Properties:
      FunctionName: audit-evaluator
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Timeout: 60
      Role: !GetAtt AuditEvaluatorRole.Arn
      Code:
        ZipFile: |
          # Placeholder - deploy actual code via CI/CD
          def lambda_handler(event, context):
              pass
      Environment:
        Variables:
          TABLE_NAME: !Ref TransactionLogTable
          BEDROCK_MODEL_ID: us.anthropic.claude-opus-4-0-20250514

  AuditEvaluatorEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    DependsOn: AuditEvaluatorFunction
    Properties:
      EventSourceArn: !GetAtt TransactionLogTable.StreamArn
      FunctionName: !GetAtt AuditEvaluatorFunction.Arn
      StartingPosition: LATEST
      BatchSize: 1
      Enabled: true

Outputs:
  WebsiteURL:
    Value: !Sub 'https://${DomainName}'
  RootURL:
    Value: !Sub 'https://${RootDomainName}'
  S3BucketName:
    Value: !Ref WebsiteBucket
  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
  CloudFrontDomainName:
    Value: !GetAtt CloudFrontDistribution.DomainName
  CertificateArn:
    Value: !Ref SSLCertificate
  TransactionLogTableName:
    Value: !Ref TransactionLogTable
  TransactionLogTableArn:
    Value: !GetAtt TransactionLogTable.Arn
  TransactionLogStreamArn:
    Value: !GetAtt TransactionLogTable.StreamArn
  AuditEvaluatorFunctionArn:
    Value: !GetAtt AuditEvaluatorFunction.Arn
  AuditEvaluatorRoleArn:
    Value: !GetAtt AuditEvaluatorRole.Arn
