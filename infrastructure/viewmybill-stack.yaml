    Value: !GetAtt OTPTable.Arn

  OTPHandlerFunctionArn:
    Description: OTP Handler Lambda function ARN
    Value: !GetAtt OTPHandlerFunction.Arn

  AdminHandlerFunctionArn:
    Description: Admin Handler Lambda function ARN
    Value: !GetAtt AdminHandlerFunction.Arn

  MembersTableName:
    Description: DynamoDB table name for member portal members
    Value: !Ref MembersTable

  MembersTableArn:
    Description: DynamoDB Members table ARN
    Value: !GetAtt MembersTable.Arn

  AccountsTableName:
    Description: DynamoDB table name for member portal accounts
    Value: !Ref AccountsTable

  AccountsTableArn:
