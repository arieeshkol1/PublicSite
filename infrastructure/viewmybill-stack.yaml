  # ============================================================
  # IAM Role - Scheduler Executor Lambda
  # ============================================================
  SchedulerExecutorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: slashmybill-scheduler-executor-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: STSAssumeRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource:
                  - 'arn:aws:iam::*:role/SlashMyBill-*'
        - PolicyName: DynamoDBMembersReadWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt MembersTable.Arn
      Tags:
        - Key: Project
          Value: ViewMyBill

  # ============================================================
  # Lambda Function - Scheduler Executor
  # ============================================================
  SchedulerExecutorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: slashmybill-scheduler-executor
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      MemorySize: 512
      Timeout: 300
      Role: !GetAtt SchedulerExecutorRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: 'lambda-packages/scheduler-executor.zip'
      Environment:
        Variables:
          MEMBERS_TABLE_NAME: !Ref MembersTable
      Tags:
        - Key: Project
          Value: ViewMyBill

  # ============================================================
  # IAM Role - EventBridge Scheduler Execution Role
  # ============================================================
  EventBridgeSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SlashMyBill-EventBridge-Scheduler-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeSchedulerExecutor
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt SchedulerExecutorFunction.Arn
      Tags:
        - Key: Project
          Value: ViewMyBill

  # ============================================================
  # S3 Lifecycle Rule for reports/ prefix
  # NOTE: The bucket aws-bill-analyzer-storage-991105135552 already exists
  # and is NOT managed by this stack. Apply this lifecycle rule manually:
  #
  #   aws s3api put-bucket-lifecycle-configuration \
  #     --bucket aws-bill-analyzer-storage-991105135552 \
  #     --lifecycle-configuration '{
  #       "Rules": [
  #         {
  #           "ID": "DeleteReportsAfter1Day",
  #           "Filter": { "Prefix": "reports/" },
  #           "Status": "Enabled",
  #           "Expiration": { "Days": 1 }
  #         }
  #       ]
  #     }'
  #
  # ============================================================

