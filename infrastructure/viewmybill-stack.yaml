      Timeout: 120
      Role: !GetAtt MemberHandlerRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref MemberHandlerCodeKey
      Environment:
        Variables:
          JWT_SECRET: !Ref JWTSecret
          MEMBERS_TABLE_NAME: !Ref MembersTable
          ACCOUNTS_TABLE_NAME: !Ref AccountsTable
          OTP_TABLE_NAME: !Ref OTPTable
          SES_SENDER_EMAIL: 'noreply@eshkolai.com'
          PLATFORM_ACCOUNT_ID: '991105135552'
          STORAGE_BUCKET: !Ref BillStorageBucket
          TIPS_TABLE_NAME: !Ref CostOptimizationTipsTable
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          BEDROCK_AGENT_ID: 'IDG5VJGUOZ5W'
          BEDROCK_AGENT_ALIAS_ID: '9VYFXAEEH6'
          FEEDBACK_TABLE_NAME: !Ref AgentFeedbackTable
          BUSINESS_METRICS_TABLE: !Ref BusinessMetricsTable
          COGNITO_USER_POOL_ID: 'us-east-1_FlR2CmFu0'
          COGNITO_CLIENT_ID: '3shmdb332mm8sjheopdu9sg8o4'
      Tags:
        - Key: Project
          Value: ViewMyBill

