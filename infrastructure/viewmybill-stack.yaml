              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource:
                  - !GetAtt AgentFeedbackTable.Arn
        - PolicyName: DynamoDBBusinessMetricsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt BusinessMetricsTable.Arn
        - PolicyName: AWSPricingRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - pricing:GetProducts
                  - pricing:DescribeServices
                Resource: '*'
        - PolicyName: CognitoMemberAuth
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
