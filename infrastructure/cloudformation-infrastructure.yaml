AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Bill Analyzer - Infrastructure Setup (S3, IAM Roles)'

Parameters:
  AWSAccountId:
    Type: String
    Default: '991105135552'
    Description: AWS Account ID for resource naming

Resources:
  # S3 Bucket for Bill Storage
  BillStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'aws-bill-analyzer-storage-${AWSAccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteBillsAfter24Hours
            Status: Enabled
            Prefix: bills/
            ExpirationInDays: 1
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: AWS-Bill-Analyzer
        - Key: Environment
          Value: Production

  # IAM Role for Upload Handler Lambda
  UploadHandlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: aws-bill-analyzer-upload-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3BillUploadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectTagging
                Resource: !Sub '${BillStorageBucket.Arn}/bills/*'
      Tags:
        - Key: Project
          Value: AWS-Bill-Analyzer
        - Key: Function
          Value: UploadHandler

  # IAM Role for Question Processor Lambda
  QuestionProcessorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: aws-bill-analyzer-question-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3BillReadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub '${BillStorageBucket.Arn}/bills/*'
        - PolicyName: BedrockInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: !Sub 'arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-lite-v1:0'
      Tags:
        - Key: Project
          Value: AWS-Bill-Analyzer
        - Key: Function
          Value: QuestionProcessor

Outputs:
  BillStorageBucketName:
    Description: Name of the S3 bucket for bill storage
    Value: !Ref BillStorageBucket
    Export:
      Name: !Sub '${AWS::StackName}-BillStorageBucket'

  BillStorageBucketArn:
    Description: ARN of the S3 bucket for bill storage
    Value: !GetAtt BillStorageBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BillStorageBucketArn'

  UploadHandlerRoleArn:
    Description: ARN of the IAM role for Upload Handler Lambda
    Value: !GetAtt UploadHandlerRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-UploadHandlerRoleArn'

  QuestionProcessorRoleArn:
    Description: ARN of the IAM role for Question Processor Lambda
    Value: !GetAtt QuestionProcessorRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QuestionProcessorRoleArn'
