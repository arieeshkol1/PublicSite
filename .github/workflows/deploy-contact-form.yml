name: Deploy Contact Form Infrastructure

on:
  workflow_dispatch:
    inputs:
      recipient_email:
        description: 'Email address to receive contact form submissions'
        required: true
        default: 'ariel.eshkol@gmail.com'
      sender_email:
        description: 'Email address to send from (will be verified in SES)'
        required: true
        default: 'ariel.eshkol@gmail.com'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: us-east-1

      - name: Deploy CloudFormation Stack
        id: deploy-stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/contact-form-stack.yaml \
            --stack-name contact-form-stack \
            --parameter-overrides \
              RecipientEmail=${{ github.event.inputs.recipient_email }} \
              SenderEmail=${{ github.event.inputs.sender_email }} \
              DomainName=www.eshkolai.com \
            --capabilities CAPABILITY_NAMED_IAM \
            --region us-east-1

      - name: Get API Endpoint
        id: get-endpoint
        run: |
          API_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name contact-form-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text \
            --region us-east-1)
          echo "API_ENDPOINT=$API_ENDPOINT" >> $GITHUB_OUTPUT
          echo "API Endpoint: $API_ENDPOINT"

      - name: Verify Sender Email in SES
        run: |
          echo "Verifying sender email in SES..."
          aws ses verify-email-identity \
            --email-address ${{ github.event.inputs.sender_email }} \
            --region us-east-1 || true

      - name: Verify Recipient Email in SES
        run: |
          echo "Verifying recipient email in SES..."
          aws ses verify-email-identity \
            --email-address ${{ github.event.inputs.recipient_email }} \
            --region us-east-1 || true

      - name: Display Setup Instructions
        run: |
          echo "=========================================="
          echo "Contact Form Infrastructure Deployed!"
          echo "=========================================="
          echo ""
          echo "API Endpoint: ${{ steps.get-endpoint.outputs.API_ENDPOINT }}"
          echo ""
          echo "IMPORTANT NEXT STEPS:"
          echo "1. Check your email inbox for verification emails from AWS SES"
          echo "   - Sender: ${{ github.event.inputs.sender_email }}"
          echo "   - Recipient: ${{ github.event.inputs.recipient_email }}"
          echo ""
          echo "2. Click the verification links in both emails"
          echo ""
          echo "3. Update script.js with the API endpoint:"
          echo "   Replace 'YOUR_API_GATEWAY_ENDPOINT_HERE' with:"
          echo "   ${{ steps.get-endpoint.outputs.API_ENDPOINT }}"
          echo ""
          echo "4. Commit and push the updated script.js"
          echo ""
          echo "5. The contact form will be live after deployment!"
          echo "=========================================="

      - name: Create API Endpoint File
        run: |
          echo "${{ steps.get-endpoint.outputs.API_ENDPOINT }}" > api-endpoint.txt
          echo "API endpoint saved to api-endpoint.txt"

      - name: Upload API Endpoint
        uses: actions/upload-artifact@v4
        with:
          name: api-endpoint
          path: api-endpoint.txt
