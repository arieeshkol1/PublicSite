name: Check Root Domain Status

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: us-east-1

      - name: Check CloudFront distribution
        run: |
          echo "=== CloudFront Distribution ==="
          aws cloudfront get-distribution --id E12JIHGHK40OLE \
            --query "Distribution.{Status:Status,DomainName:DomainName,Aliases:DistributionConfig.Aliases,CertARN:DistributionConfig.ViewerCertificate.ACMCertificateArn}" \
            --output json
          echo ""

      - name: Check ALL certificates
        run: |
          echo "=== All ACM Certificates ==="
          CERTS=$(aws acm list-certificates --query "CertificateSummaryList[*].CertificateArn" --output text)
          for CERT in $CERTS; do
            echo "--- Certificate: $CERT ---"
            aws acm describe-certificate --certificate-arn $CERT \
              --query "Certificate.{Domain:DomainName,SANs:SubjectAlternativeNames,Status:Status,Type:Type}" \
              --output json
            echo ""
          done

      - name: Check Route 53 records
        run: |
          echo "=== Route 53 Records ==="
          aws route53 list-resource-record-sets \
            --hosted-zone-id Z07144662HMOSSEBOKGII \
            --output json
          echo ""

      - name: Test DNS resolution
        run: |
          echo "=== DNS Resolution ==="
          echo "eshkolai.com:"
          dig eshkolai.com +short || nslookup eshkolai.com || echo "dig not available"
          echo ""
          echo "www.eshkolai.com:"
          dig www.eshkolai.com +short || nslookup www.eshkolai.com || echo "dig not available"

      - name: Fix if needed
        run: |
          echo "=== Attempting Fix ==="
          
          # Get current CloudFront config
          aws cloudfront get-distribution-config --id E12JIHGHK40OLE > cf-full.json
          ETAG=$(cat cf-full.json | jq -r '.ETag')
          cat cf-full.json | jq '.DistributionConfig' > cf-config.json
          
          CURRENT_ALIASES=$(cat cf-config.json | jq '.Aliases.Items')
          CURRENT_CERT=$(cat cf-config.json | jq -r '.ViewerCertificate.ACMCertificateArn')
          echo "Current aliases: $CURRENT_ALIASES"
          echo "Current cert: $CURRENT_CERT"
          
          # Check if eshkolai.com is already in aliases
          if echo "$CURRENT_ALIASES" | grep -q "eshkolai.com"; then
            echo "eshkolai.com IS in CloudFront aliases"
            
            # Check if cert covers eshkolai.com
            SANS=$(aws acm describe-certificate --certificate-arn $CURRENT_CERT \
              --query "Certificate.SubjectAlternativeNames" --output text)
            echo "Certificate SANs: $SANS"
            
            STATUS=$(aws acm describe-certificate --certificate-arn $CURRENT_CERT \
              --query "Certificate.Status" --output text)
            echo "Certificate status: $STATUS"
            
            if [ "$STATUS" != "ISSUED" ]; then
              echo "WARNING: Certificate is NOT yet issued! Status: $STATUS"
              echo "Check DNS validation records."
              
              # Show validation details
              aws acm describe-certificate --certificate-arn $CURRENT_CERT \
                --query "Certificate.DomainValidationOptions" --output json
            fi
          else
            echo "eshkolai.com is NOT in CloudFront aliases - need to add it"
            
            # Find a cert that covers eshkolai.com
            VALID_CERT=""
            CERTS=$(aws acm list-certificates --certificate-statuses ISSUED \
              --query "CertificateSummaryList[*].CertificateArn" --output text)
            
            for CERT in $CERTS; do
              SANS=$(aws acm describe-certificate --certificate-arn $CERT \
                --query "Certificate.SubjectAlternativeNames" --output text)
              if echo "$SANS" | grep -qw "eshkolai.com"; then
                VALID_CERT=$CERT
                echo "Found valid cert: $CERT (SANs: $SANS)"
                break
              fi
            done
            
            if [ -z "$VALID_CERT" ]; then
              echo "No ISSUED certificate covers eshkolai.com"
              echo "Requesting new certificate..."
              
              VALID_CERT=$(aws acm request-certificate \
                --domain-name "eshkolai.com" \
                --subject-alternative-names "www.eshkolai.com" \
                --validation-method DNS \
                --query 'CertificateArn' \
                --output text)
              echo "New cert requested: $VALID_CERT"
              
              sleep 15
              
              # Add DNS validation
              VALIDATIONS=$(aws acm describe-certificate \
                --certificate-arn $VALID_CERT \
                --query "Certificate.DomainValidationOptions" \
                --output json)
              
              for row in $(echo "$VALIDATIONS" | jq -c '.[]'); do
                RNAME=$(echo $row | jq -r '.ResourceRecord.Name')
                RVALUE=$(echo $row | jq -r '.ResourceRecord.Value')
                
                cat > /tmp/val.json << EOF
              {"Changes":[{"Action":"UPSERT","ResourceRecordSet":{"Name":"$RNAME","Type":"CNAME","TTL":300,"ResourceRecords":[{"Value":"$RVALUE"}]}}]}
          EOF
                aws route53 change-resource-record-sets \
                  --hosted-zone-id Z07144662HMOSSEBOKGII \
                  --change-batch file:///tmp/val.json
              done
              
              echo "Waiting for cert validation..."
              aws acm wait certificate-validated --certificate-arn $VALID_CERT || echo "Still pending"
            fi
            
            # Now update CloudFront
            if [ -n "$VALID_CERT" ]; then
              STATUS=$(aws acm describe-certificate --certificate-arn $VALID_CERT \
                --query "Certificate.Status" --output text)
              
              if [ "$STATUS" = "ISSUED" ]; then
                echo "Updating CloudFront with cert $VALID_CERT..."
                cat cf-config.json | jq \
                  --arg cert "$VALID_CERT" \
                  '.Aliases = {"Quantity": 2, "Items": ["www.eshkolai.com", "eshkolai.com"]} | .ViewerCertificate.ACMCertificateArn = $cert' \
                  > updated.json
                
                aws cloudfront update-distribution \
                  --id E12JIHGHK40OLE \
                  --if-match $ETAG \
                  --distribution-config file://updated.json
                
                echo "CloudFront updated! May take 5-15 minutes to deploy."
              else
                echo "Certificate not yet ISSUED (status: $STATUS). Run this workflow again in a few minutes."
              fi
            fi
          fi
