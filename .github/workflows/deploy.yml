name: Deploy-Serverless-JP2

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_ACCOUNT_ID: "991105135552"
  AWS_REGION: "us-east-1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CDK & deps
        run: |
          npm install -g aws-cdk@latest
          python -m pip install --upgrade pip
          pip install -r infrastructure/requirements.txt

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Bootstrap (idempotent)
        run: cdk bootstrap aws://$AWS_ACCOUNT_ID/$AWS_REGION

      - name: CDK Deploy
        run: cdk deploy --all --require-approval never

      - name: Upload UI
        run: |
          aws s3 sync ui/ s3://jp2-ui-${{ env.AWS_ACCOUNT_ID }}-${{ env.AWS_REGION }}/ --delete --follow-symlinks
          # set short cache for HTML so updates show fast
          aws s3 cp s3://jp2-ui-${{ env.AWS_ACCOUNT_ID }}-${{ env.AWS_REGION }}/index.html s3://jp2-ui-${{ env.AWS_ACCOUNT_ID }}-${{ env.AWS_REGION }}/index.html \
            --metadata-directive REPLACE \
            --cache-control "max-age=60" \
            --content-type "text/html"
