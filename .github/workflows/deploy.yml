              if aws lambda update-function-code --function-name "$fn" --s3-bucket ${{ env.STORAGE_BUCKET }} --s3-key "$key" > /dev/null 2>&1; then
                return 0
              fi
              echo "⚠ $fn update attempt $i failed, waiting 5s..."
              sleep 5
            done
            echo "⚠ $fn update failed after 2 attempts (non-fatal)"
            return 0
          }
          update_lambda aws-bill-analyzer-viewmybill lambda-packages/bill-analyzer.zip
