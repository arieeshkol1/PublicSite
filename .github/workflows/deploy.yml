name: Deploy

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - '*.css'
      - '*.js'
      - '*.png'
      - '*.jpg'
      - '*.jpeg'
      - '*.gif'
      - '*.svg'
      - '*.ico'
      - 'slashMyBill/**'
      - 'infrastructure/viewmybill-stack.yaml'
      - 'infrastructure/slashmycloudbill-stack.yaml'
      - 'infrastructure/github-oidc-role.yaml'
      - 'bill-analyzer/**'
      - 'upload-handler/**'
      - 'otp-handler/**'
      - 'admin-handler/**'
      - 'admin/**'
      - 'member-handler/**'
      - 'members/**'
      - 'agent-action/**'
      - 'knowledge-base/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: www.eshkolai.com
  SMB_BUCKET: slashmycloudbill.com
  CLOUDFRONT_ID: E12JIHGHK40OLE
  STORAGE_BUCKET: aws-bill-analyzer-storage-991105135552
  STACK_NAME: aws-bill-analyzer-viewmybill

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ---- SlashMyBill Infrastructure ----
      - name: Package Bill Analyzer Lambda
        run: |
          echo "Packaging Bill Analyzer Lambda..."
          pip install -r bill-analyzer/requirements.txt -t .build-bill-analyzer/ --quiet
          cp bill-analyzer/*.py .build-bill-analyzer/
          cp bill-analyzer/SlashMyBill.png .build-bill-analyzer/
          cd .build-bill-analyzer && zip -r ../bill-analyzer-lambda.zip . -q
          cd ..
          aws s3 cp bill-analyzer-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/bill-analyzer.zip
          echo "✓ Bill Analyzer packaged"

      - name: Package Upload Handler Lambda
        run: |
          echo "Packaging Upload Handler Lambda..."
          mkdir -p .build-upload-handler
          cp upload-handler/lambda_function.py .build-upload-handler/
          cd .build-upload-handler && zip -r ../upload-handler-lambda.zip . -q
          cd ..
          aws s3 cp upload-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/upload-handler.zip
          echo "✓ Upload Handler packaged"

      - name: Package OTP Handler Lambda
        run: |
          echo "Packaging OTP Handler Lambda..."
          mkdir -p .build-otp-handler
          cp otp-handler/lambda_function.py .build-otp-handler/
          cd .build-otp-handler && zip -r ../otp-handler-lambda.zip . -q
          cd ..
          aws s3 cp otp-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/otp-handler.zip
          echo "✓ OTP Handler packaged"

      - name: Package Admin Handler Lambda
        run: |
          echo "Packaging Admin Handler Lambda..."
          pip install PyJWT bcrypt -t .build-admin-handler/ --quiet
          cp admin-handler/lambda_function.py .build-admin-handler/
          cd .build-admin-handler && zip -r ../admin-handler-lambda.zip . -q
          cd ..
          aws s3 cp admin-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/admin-handler.zip
          echo "✓ Admin Handler packaged"

      - name: Package Member Handler Lambda
        run: |
          echo "Packaging Member Handler Lambda..."
          pip install PyJWT bcrypt pyyaml -t .build-member-handler/ --quiet
          cp member-handler/lambda_function.py .build-member-handler/
          cd .build-member-handler && zip -r ../member-handler-lambda.zip . -q
          cd ..
          aws s3 cp member-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/member-handler.zip
          echo "✓ Member Handler packaged"

      - name: Package Agent Action Lambda
        run: |
          echo "Packaging Agent Action Lambda..."
          mkdir -p .build-agent-action
          cp agent-action/lambda_function.py .build-agent-action/
          cd .build-agent-action && zip -r ../agent-action-lambda.zip . -q
          cd ..
          aws s3 cp agent-action-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/agent-action.zip
          echo "✓ Agent Action packaged"

      - name: Deploy SlashMyBill CloudFormation stack
        run: |
          echo "Deploying SlashMyBill infrastructure..."
          aws cloudformation deploy \
            --template-file infrastructure/viewmybill-stack.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              AdminUsername='${{ secrets.ADMIN_USERNAME }}' \
              AdminPasswordHash='${{ secrets.ADMIN_PASSWORD_HASH }}' \
              JWTSecret='${{ secrets.JWT_SECRET }}' \
            --tags Project=ViewMyBill
          echo "✓ Infrastructure deployed"

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name aws-bill-analyzer-viewmybill \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/bill-analyzer.zip > /dev/null
          aws lambda update-function-code \
            --function-name aws-bill-analyzer-upload-handler \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/upload-handler.zip > /dev/null
          aws lambda update-function-code \
            --function-name aws-bill-analyzer-otp-handler \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/otp-handler.zip > /dev/null
          aws lambda update-function-code \
            --function-name aws-bill-analyzer-admin-api \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/admin-handler.zip > /dev/null
          aws lambda update-function-code \
            --function-name aws-bill-analyzer-member-api \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/member-handler.zip > /dev/null
          aws lambda update-function-code \
            --function-name SlashMyBill-AgentAction \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/agent-action.zip > /dev/null || true
          echo "✓ Lambda functions updated"

      - name: Seed DynamoDB knowledge base
        run: |
          pip install boto3 --quiet
          python knowledge-base/seed-dynamodb.py
          echo "✓ DynamoDB seeded"

      - name: Get API Gateway URL
        id: api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "API Gateway URL: $API_URL"
          echo "api_endpoint=$API_URL" >> $GITHUB_OUTPUT

      - name: Configure S3 lifecycle rules
        run: |
          aws s3api put-bucket-lifecycle-configuration \
            --bucket ${{ env.STORAGE_BUCKET }} \
            --lifecycle-configuration '{
              "Rules": [
                {"ID":"DeleteReportsAfter1Day","Filter":{"Prefix":"reports/"},"Status":"Enabled","Expiration":{"Days":1}},
                {"ID":"DeleteBillsAfter1Day","Filter":{"Prefix":"bills/"},"Status":"Enabled","Expiration":{"Days":1}}
              ]
            }'
          echo "✓ Lifecycle rules set"

      # ---- Website Deployment ----
      - name: Deploy website to S3
        run: |
          echo "Deploying website files..."
          for file in *.html; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "no-cache, no-store, must-revalidate"
          done
          for file in *.css; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "no-cache, no-store, must-revalidate"
          done
          for file in *.js; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "no-cache, no-store, must-revalidate" --content-type "application/javascript"
          done
          for file in *.png *.jpg *.jpeg *.gif *.svg *.ico; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "max-age=2592000"
          done
          echo "✓ Website deployed"

      - name: Deploy SlashMyBill frontend
        run: |
          API_URL="${{ steps.api-url.outputs.api_endpoint }}"
          echo "Injecting API URL: $API_URL"
          sed -i "s|https://YOUR_API_GATEWAY_URL|${API_URL}|g" slashMyBill/slashMyBill.js
          aws s3 cp slashMyBill/index.html s3://${{ env.S3_BUCKET }}/slashMyBill/index.html \
            --cache-control "no-cache, no-store, must-revalidate" --content-type "text/html"
          aws s3 cp slashMyBill/slashMyBill.css s3://${{ env.S3_BUCKET }}/slashMyBill/slashMyBill.css \
            --cache-control "no-cache, no-store, must-revalidate" --content-type "text/css"
          aws s3 cp slashMyBill/slashMyBill.js s3://${{ env.S3_BUCKET }}/slashMyBill/slashMyBill.js \
            --cache-control "no-cache, no-store, must-revalidate" --content-type "application/javascript"
          echo "✓ SlashMyBill frontend deployed"

      - name: Remove old viewMyBill files from S3
        run: |
          aws s3 rm s3://${{ env.S3_BUCKET }}/viewMyBill/ --recursive
          echo "✓ Old viewMyBill/ files removed"

      - name: Deploy Admin frontend
        run: |
          aws s3 cp admin/index.html s3://${{ env.S3_BUCKET }}/admin/index.html \
            --cache-control "no-cache, no-store, must-revalidate" --content-type "text/html"
          aws s3 cp admin/admin.css s3://${{ env.S3_BUCKET }}/admin/admin.css \
            --cache-control "no-cache, no-store, must-revalidate" --content-type "text/css"
          aws s3 cp admin/admin.js s3://${{ env.S3_BUCKET }}/admin/admin.js \
            --cache-control "no-cache, no-store, must-revalidate" --content-type "application/javascript"
          echo "✓ Admin frontend deployed"

      - name: Deploy Member Portal frontend
        run: |
          API_URL="${{ steps.api-url.outputs.api_endpoint }}"
          echo "Injecting API URL: $API_URL"
          sed -i "s|https://YOUR_API_GATEWAY_URL|${API_URL}|g" members/members.js
          aws s3 cp members/index.html s3://${{ env.S3_BUCKET }}/members/index.html \
            --cache-control "no-cache, no-store, must-revalidate" --content-type "text/html"
          aws s3 cp members/members.css s3://${{ env.S3_BUCKET }}/members/members.css \
            --cache-control "no-cache, no-store, must-revalidate" --content-type "text/css"
          aws s3 cp members/members.js s3://${{ env.S3_BUCKET }}/members/members.js \
            --cache-control "no-cache, no-store, must-revalidate" --content-type "application/javascript"
          aws s3 cp members/help.js s3://${{ env.S3_BUCKET }}/members/help.js \
            --cache-control "no-cache, no-store, must-revalidate" --content-type "application/javascript"
          echo "✓ Member Portal frontend deployed"

      - name: Sync to eshkolai.com bucket
        run: |
          echo "Syncing to eshkolai.com bucket..."
          aws s3 sync s3://${{ env.S3_BUCKET }} s3://eshkolai.com --delete
          echo "✓ eshkolai.com bucket synced"

      - name: Deploy slashmycloudbill.com site stack
        run: |
          echo "Deploying slashmycloudbill.com infrastructure..."
          aws cloudformation deploy \
            --template-file infrastructure/slashmycloudbill-site-stack.yaml \
            --stack-name slashmycloudbill-site \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --tags Project=SlashMyCloudBill || echo "⚠ slashmycloudbill site stack deploy failed"
          echo "✓ slashmycloudbill.com stack deployed"

      - name: Deploy SlashMyBill files to slashmycloudbill.com bucket
        run: |
          API_URL="${{ steps.api-url.outputs.api_endpoint }}"
          echo "Deploying to slashmycloudbill.com bucket..."

          # Inject API URL into slashMyBill JS
          sed -i "s|https://YOUR_API_GATEWAY_URL|${API_URL}|g" slashMyBill/slashMyBill.js

          # Shared assets (needed by both members and slashMyBill pages)
          for f in SlashMyBill.png smallninja2.png styles.css; do
            [ -f "$f" ] && aws s3 cp "$f" s3://${{ env.SMB_BUCKET }}/$f \
              --cache-control "max-age=2592000"
          done

          # SlashMyBill landing page
          aws s3 sync slashMyBill/ s3://${{ env.SMB_BUCKET }}/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.py" --exclude "*.md"

          # Member Portal
          aws s3 sync members/ s3://${{ env.SMB_BUCKET }}/members/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.py"

          # Admin Panel
          aws s3 sync admin/ s3://${{ env.SMB_BUCKET }}/admin/ \
            --cache-control "no-cache, no-store, must-revalidate"

          echo "✓ slashmycloudbill.com files deployed"

      - name: Update CloudFront function for slashmycloudbill.com
        run: |
          # Update the routing function (now simpler — files at root of new bucket)
          aws cloudfront create-function \
            --name "SlashMyCloudBill-Router" \
            --function-config 'Comment=Routes slashmycloudbill.com,Runtime=cloudfront-js-2.0' \
            --function-code fileb://infrastructure/cf-function-slashmycloudbill.js > /dev/null 2>&1 || true

          FN_ETAG=$(aws cloudfront describe-function --name "SlashMyCloudBill-Router" --query "ETag" --output text)
          aws cloudfront update-function \
            --name "SlashMyCloudBill-Router" \
            --if-match "$FN_ETAG" \
            --function-config 'Comment=Routes slashmycloudbill.com,Runtime=cloudfront-js-2.0' \
            --function-code fileb://infrastructure/cf-function-slashmycloudbill.js > /dev/null

          FN_ETAG2=$(aws cloudfront describe-function --name "SlashMyCloudBill-Router" --query "ETag" --output text)
          aws cloudfront publish-function --name "SlashMyCloudBill-Router" --if-match "$FN_ETAG2" > /dev/null
          echo "✓ CloudFront function updated"

      - name: Invalidate slashmycloudbill.com CloudFront cache
        run: |
          SMB_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name slashmycloudbill-site \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text 2>/dev/null || echo "")
          if [ -n "$SMB_DIST_ID" ] && [ "$SMB_DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$SMB_DIST_ID" --paths "/*" > /dev/null
            echo "✓ slashmycloudbill.com cache invalidated (dist: $SMB_DIST_ID)"
          else
            echo "⚠ slashmycloudbill.com distribution not found yet"
          fi

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_ID }} \
            --paths "/*"
          echo "✓ Cache invalidated"

      - name: Deploy slashmycloudbill.com stack (cert + DNS + CF function)
        run: |
          echo "Deploying slashmycloudbill.com infrastructure..."
          aws cloudformation deploy \
            --template-file infrastructure/slashmycloudbill-stack.yaml \
            --stack-name slashmycloudbill-setup \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --tags Project=SlashMyCloudBill || echo "⚠ slashmycloudbill stack deploy failed (may need manual cert validation)"
          echo "✓ slashmycloudbill.com stack deployed"

      - name: Update CloudFront distribution with slashmycloudbill.com alias
        run: |
          # Get the certificate ARN from the stack output
          CERT_ARN=$(aws cloudformation describe-stacks \
            --stack-name slashmycloudbill-setup \
            --query "Stacks[0].Outputs[?OutputKey=='CertificateArn'].OutputValue" \
            --output text 2>/dev/null || echo "")

          FUNC_ARN=$(aws cloudformation describe-stacks \
            --stack-name slashmycloudbill-setup \
            --query "Stacks[0].Outputs[?OutputKey=='RouterFunctionArn'].OutputValue" \
            --output text 2>/dev/null || echo "")

          if [ -z "$CERT_ARN" ] || [ "$CERT_ARN" = "None" ]; then
            echo "⚠ Certificate not yet issued — skipping CloudFront update. Re-run after cert validates."
            exit 0
          fi

          # Check cert is ISSUED
          CERT_STATUS=$(aws acm describe-certificate --certificate-arn "$CERT_ARN" --region us-east-1 \
            --query "Certificate.Status" --output text 2>/dev/null || echo "PENDING")

          if [ "$CERT_STATUS" != "ISSUED" ]; then
            echo "⚠ Certificate status: $CERT_STATUS — skipping CloudFront update. Re-run after cert validates."
            exit 0
          fi

          echo "Certificate ISSUED. Updating CloudFront distribution..."

          # Get current distribution config
          DIST_CONFIG=$(aws cloudfront get-distribution-config --id ${{ env.CLOUDFRONT_ID }})
          ETAG=$(echo "$DIST_CONFIG" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['ETag'])")
          CONFIG=$(echo "$DIST_CONFIG" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d['DistributionConfig']))")

          # Add aliases and certificate via Python
          UPDATED_CONFIG=$(python3 << 'PYEOF'
          import json, os, sys

          config = json.loads(os.environ['CONFIG'])
          cert_arn = os.environ['CERT_ARN']
          func_arn = os.environ.get('FUNC_ARN', '')

          # Add aliases
          aliases = config.get('Aliases', {})
          items = aliases.get('Items', [])
          for domain in ['slashmycloudbill.com', 'www.slashmycloudbill.com']:
              if domain not in items:
                  items.append(domain)
          config['Aliases'] = {'Quantity': len(items), 'Items': items}

          # Update viewer certificate
          config['ViewerCertificate'] = {
              'ACMCertificateArn': cert_arn,
              'SSLSupportMethod': 'sni-only',
              'MinimumProtocolVersion': 'TLSv1.2_2021',
              'CloudFrontDefaultCertificate': False
          }

          # Add CloudFront Function to default cache behavior
          if func_arn:
              dcb = config.get('DefaultCacheBehavior', {})
              fa = dcb.get('FunctionAssociations', {'Quantity': 0, 'Items': []})
              existing = [f for f in fa.get('Items', []) if 'SlashMyCloudBill' not in f.get('FunctionARN', '')]
              existing.append({'FunctionARN': func_arn, 'EventType': 'viewer-request'})
              dcb['FunctionAssociations'] = {'Quantity': len(existing), 'Items': existing}
              config['DefaultCacheBehavior'] = dcb

          print(json.dumps(config))
          PYEOF
          )

          export CONFIG="$CONFIG"
          export CERT_ARN="$CERT_ARN"
          export FUNC_ARN="$FUNC_ARN"

          aws cloudfront update-distribution \
            --id ${{ env.CLOUDFRONT_ID }} \
            --distribution-config "$UPDATED_CONFIG" \
            --if-match "$ETAG" > /dev/null

          echo "✓ CloudFront updated with slashmycloudbill.com"

      - name: Summary
        run: |
          echo "=== Deploy Complete ==="
          echo "Website: https://www.eshkolai.com"
          echo "SlashMyBill: https://www.eshkolai.com/slashMyBill/"
          echo "SlashMyCloudBill: https://slashmycloudbill.com (after DNS propagates)"
          echo "Admin: https://www.eshkolai.com/admin/"
          echo "Member Portal: https://www.eshkolai.com/members/"
          echo "API: ${{ steps.api-url.outputs.api_endpoint }}"
