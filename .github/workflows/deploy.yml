          echo "api_endpoint=$API_URL" >> $GITHUB_OUTPUT

      - name: Configure S3 lifecycle rules
        run: |
          aws s3api put-bucket-lifecycle-configuration \
            --bucket ${{ env.STORAGE_BUCKET }} \
            --lifecycle-configuration '{
              "Rules": [
                {"ID":"DeleteReportsAfter1Day","Filter":{"Prefix":"reports/"},"Status":"Enabled","Expiration":{"Days":1}},
                {"ID":"DeleteBillsAfter1Day","Filter":{"Prefix":"bills/"},"Status":"Enabled","Expiration":{"Days":1}}
              ]
            }'
          echo "✓ Lifecycle rules set"

      # ---- Website Deployment ----
      - name: Deploy website to S3
        run: |
          echo "Deploying website files..."
          for file in *.html; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "no-cache, no-store, must-revalidate"
          done
          for file in *.css; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "no-cache, no-store, must-revalidate"
          done
          for file in *.js; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "no-cache, no-store, must-revalidate" --content-type "application/javascript; charset=utf-8"
          done
          for file in *.png *.jpg *.jpeg *.gif *.svg *.ico; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "max-age=2592000"
          done
          echo "✓ Website deployed"

      - name: Deploy redirect pages to eshkolai (slashMyBill/members/admin → slashmycloudbill.com)
        run: |
          # Create redirect HTML pages
          for path_target in "slashMyBill/:https://slashmycloudbill.com/" "members/:https://slashmycloudbill.com/members/" "admin/:https://slashmycloudbill.com/admin/"; do
            IFS=':' read -r path target <<< "$path_target"
            target="${path_target#*:}"
            path="${path_target%%:*}"
            echo "<!DOCTYPE html><html><head><meta http-equiv=\"refresh\" content=\"0;url=${target}\"><title>Redirecting...</title></head><body><p>Moved to <a href=\"${target}\">${target}</a></p></body></html>" > /tmp/redirect.html
            aws s3 cp /tmp/redirect.html "s3://${{ env.S3_BUCKET }}/${path}index.html" \
              --cache-control "no-cache" --content-type "text/html"
            aws s3 cp /tmp/redirect.html "s3://eshkolai.com/${path}index.html" \
              --cache-control "no-cache" --content-type "text/html"
          done
          # Remove old slashMyBill/members/admin JS/CSS from eshkolai buckets (keep only redirect)
          for prefix in slashMyBill/ members/ admin/; do
            aws s3 rm "s3://${{ env.S3_BUCKET }}/${prefix}" --recursive --exclude "index.html" || true
            aws s3 rm "s3://eshkolai.com/${prefix}" --recursive --exclude "index.html" || true
          done
          echo "✓ Redirect pages deployed, old files removed"

      - name: Sync eshkolai.com bucket (main site only)
        run: |
          echo "Syncing main site to eshkolai.com..."
