          aws s3 sync s3://${{ env.S3_BUCKET }} s3://eshkolai.com \
            --exclude "slashMyBill/*" --exclude "members/*" --exclude "admin/*"
          echo "✓ eshkolai.com synced"

      - name: Deploy slashmycloudbill.com site stack
        run: |
          echo "Deploying slashmycloudbill.com infrastructure..."

          ACCOUNT_ID="991105135552"
          SMB_CERT="arn:aws:acm:us-east-1:991105135552:certificate/5f9cd85b-591f-4787-963b-8f616c448588"
          SMB_HOSTED_ZONE="Z08610352PUNQ7MUZTRVI"

          # ── CloudFront function ──────────────────────────────────────────
          aws cloudfront create-function \
            --name "SlashMyCloudBill-Router" \
            --function-config 'Comment=Routes slashmycloudbill.com,Runtime=cloudfront-js-2.0' \
            --function-code fileb://infrastructure/cf-function-slashmycloudbill.js > /dev/null 2>&1 || true

          FN_ETAG=$(aws cloudfront describe-function --name "SlashMyCloudBill-Router" --query "ETag" --output text)
          aws cloudfront update-function \
            --name "SlashMyCloudBill-Router" --if-match "$FN_ETAG" \
            --function-config 'Comment=Routes slashmycloudbill.com,Runtime=cloudfront-js-2.0' \
            --function-code fileb://infrastructure/cf-function-slashmycloudbill.js > /dev/null
          FN_ETAG2=$(aws cloudfront describe-function --name "SlashMyCloudBill-Router" --query "ETag" --output text)
          aws cloudfront publish-function --name "SlashMyCloudBill-Router" --if-match "$FN_ETAG2" > /dev/null
          FN_ARN="arn:aws:cloudfront::${ACCOUNT_ID}:function/SlashMyCloudBill-Router"
          echo "✓ CloudFront function ready"

          # ── S3 bucket ────────────────────────────────────────────────────
          aws s3api create-bucket --bucket slashmycloudbill.com --region us-east-1 2>/dev/null || echo "Bucket exists"
          aws s3api put-public-access-block --bucket slashmycloudbill.com \
            --public-access-block-configuration \
            "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"
          aws s3api put-bucket-policy --bucket slashmycloudbill.com --policy \
            '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::slashmycloudbill.com/*"}]}'
          echo "✓ S3 bucket ready"

          # ── CloudFront distribution ──────────────────────────────────────
          # Check if distribution already exists
          SMB_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items,'slashmycloudbill.com')].Id" \
            --output text 2>/dev/null || echo "")

          if [ -z "$SMB_DIST_ID" ] || [ "$SMB_DIST_ID" = "None" ]; then
            echo "Creating new CloudFront distribution..."
            CALLER_REF="smb-$(date +%s)"
            SMB_DIST_ID=$(aws cloudfront create-distribution --distribution-config "{
              \"CallerReference\": \"${CALLER_REF}\",
              \"Aliases\": {\"Quantity\": 1, \"Items\": [\"slashmycloudbill.com\"]},
              \"DefaultRootObject\": \"index.html\",
              \"Origins\": {\"Quantity\": 1, \"Items\": [{
                \"Id\": \"S3Origin\",
                \"DomainName\": \"slashmycloudbill.com.s3.amazonaws.com\",
                \"S3OriginConfig\": {\"OriginAccessIdentity\": \"\"}
              }]},
              \"DefaultCacheBehavior\": {
                \"TargetOriginId\": \"S3Origin\",
                \"ViewerProtocolPolicy\": \"redirect-to-https\",
                \"ForwardedValues\": {\"QueryString\": false, \"Cookies\": {\"Forward\": \"none\"}},
                \"AllowedMethods\": {\"Quantity\": 2, \"Items\": [\"GET\",\"HEAD\"], \"CachedMethods\": {\"Quantity\": 2, \"Items\": [\"GET\",\"HEAD\"]}},
                \"Compress\": true,
                \"DefaultTTL\": 86400, \"MaxTTL\": 31536000, \"MinTTL\": 0,
                \"FunctionAssociations\": {\"Quantity\": 1, \"Items\": [{\"FunctionARN\": \"${FN_ARN}\", \"EventType\": \"viewer-request\"}]}
              },
              \"CustomErrorResponses\": {\"Quantity\": 2, \"Items\": [
                {\"ErrorCode\": 403, \"ResponseCode\": \"200\", \"ResponsePagePath\": \"/index.html\", \"ErrorCachingMinTTL\": 0},
                {\"ErrorCode\": 404, \"ResponseCode\": \"200\", \"ResponsePagePath\": \"/index.html\", \"ErrorCachingMinTTL\": 0}
              ]},
              \"Comment\": \"slashmycloudbill.com\",
              \"Enabled\": true,
              \"HttpVersion\": \"http2\",
              \"PriceClass\": \"PriceClass_100\",
              \"ViewerCertificate\": {
                \"ACMCertificateArn\": \"${SMB_CERT}\",
                \"SSLSupportMethod\": \"sni-only\",
                \"MinimumProtocolVersion\": \"TLSv1.2_2021\",
                \"CloudFrontDefaultCertificate\": false
              }
            }" --query "Distribution.Id" --output text)
            echo "✓ Distribution created: $SMB_DIST_ID"
          else
            echo "✓ Distribution already exists: $SMB_DIST_ID"
          fi

          # ── Route 53 DNS ─────────────────────────────────────────────────
          SMB_DIST_DOMAIN=$(aws cloudfront get-distribution \
            --id "$SMB_DIST_ID" \
            --query "Distribution.DomainName" --output text)

          aws route53 change-resource-record-sets \
            --hosted-zone-id "$SMB_HOSTED_ZONE" \
            --change-batch "{\"Changes\": [
              {\"Action\": \"UPSERT\", \"ResourceRecordSet\": {
                \"Name\": \"slashmycloudbill.com\", \"Type\": \"A\",
                \"AliasTarget\": {\"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                  \"DNSName\": \"${SMB_DIST_DOMAIN}\", \"EvaluateTargetHealth\": false}
              }},
              {\"Action\": \"UPSERT\", \"ResourceRecordSet\": {
                \"Name\": \"slashmycloudbill.com\", \"Type\": \"AAAA\",
                \"AliasTarget\": {\"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                  \"DNSName\": \"${SMB_DIST_DOMAIN}\", \"EvaluateTargetHealth\": false}
              }}
            ]}" > /dev/null
          echo "✓ DNS updated → $SMB_DIST_DOMAIN"
          echo "SMB_DIST_ID=$SMB_DIST_ID" >> $GITHUB_ENV

      - name: Deploy SlashMyBill files to slashmycloudbill.com bucket
        run: |
          API_URL="${{ steps.api-url.outputs.api_endpoint }}"
          echo "Deploying to slashmycloudbill.com bucket..."

          # Inject API URL into slashMyBill JS
          sed -i "s|https://YOUR_API_GATEWAY_URL|${API_URL}|g" slashMyBill/slashMyBill.js

          # Shared assets (needed by both members and slashMyBill pages)
          for f in SlashMyBill.png smallninja2.png styles.css; do
            [ -f "$f" ] && aws s3 cp "$f" s3://${{ env.SMB_BUCKET }}/$f \
              --cache-control "max-age=2592000"
          done

          # SlashMyBill landing page
          aws s3 sync slashMyBill/ s3://${{ env.SMB_BUCKET }}/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.py" --exclude "*.md" --exclude "*.js"
          for jsfile in slashMyBill/*.js; do
            [ -f "$jsfile" ] && aws s3 cp "$jsfile" "s3://${{ env.SMB_BUCKET }}/$(basename $jsfile)" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "application/javascript; charset=utf-8"
          done

          # Member Portal
          aws s3 sync members/ s3://${{ env.SMB_BUCKET }}/members/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.py" --exclude "*.js"
          # Upload JS files with explicit UTF-8 charset
          for jsfile in members/*.js; do
            [ -f "$jsfile" ] && aws s3 cp "$jsfile" "s3://${{ env.SMB_BUCKET }}/$jsfile" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "application/javascript; charset=utf-8"
          done

          # Admin Panel
          aws s3 sync admin/ s3://${{ env.SMB_BUCKET }}/admin/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.js"
          for jsfile in admin/*.js; do
            [ -f "$jsfile" ] && aws s3 cp "$jsfile" "s3://${{ env.SMB_BUCKET }}/$jsfile" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "application/javascript; charset=utf-8"
          done

          # Widget Builder Dashboard
          aws s3 sync dashboard/ s3://${{ env.SMB_BUCKET }}/dashboard/ \
