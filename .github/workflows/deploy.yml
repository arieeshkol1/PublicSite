            aws apigatewayv2 create-route --api-id $API_ID --route-key "$ROUTE" --target "integrations/$ADMIN_INT" 2>/dev/null || true
          done

          # Deploy API
          aws apigatewayv2 create-deployment --api-id $API_ID > /dev/null
          # Verify critical routes exist
          ROUTES_JSON=$(aws apigatewayv2 get-routes --api-id $API_ID --query "Items[].RouteKey" --output text)
          echo "Active routes count: $(echo "$ROUTES_JSON" | wc -w)"
          echo "✓ API Gateway routes ensured"

      - name: Seed DynamoDB knowledge base
        run: |
          pip install boto3 --quiet
          python knowledge-base/seed-dynamodb.py
          echo "✓ DynamoDB seeded"

      - name: Deploy Vendor-Neutral Bedrock Agent Action Groups
        continue-on-error: true
        run: |
          echo "=== Deploying 6 vendor-neutral action groups to agent G5VJGUOZ5W ==="
          # Ensure the role has both bedrock: and bedrock-agent: permissions
          aws iam put-role-policy \
