            echo "<!DOCTYPE html><html><head><meta http-equiv=\"refresh\" content=\"0;url=${target}\"><title>Redirecting...</title></head><body><p>Moved to <a href=\"${target}\">${target}</a></p></body></html>" > /tmp/redirect.html
