name: Deploy

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - '*.css'
      - '*.js'
      - '*.png'
      - '*.jpg'
      - '*.jpeg'
      - '*.gif'
      - '*.svg'
      - '*.ico'
      - 'slashMyBill/**'
      - 'infrastructure/viewmybill-stack.yaml'
      - 'infrastructure/slashmycloudbill-site-stack.yaml'
      - 'infrastructure/github-oidc-role.yaml'
      - 'bill-analyzer/**'
      - 'upload-handler/**'
      - 'otp-handler/**'
      - 'admin-handler/**'
      - 'admin/**'
      - 'member-handler/**'
      - 'members/**'
      - 'agent-action/**'
      - 'scheduler-executor/**'
      - '_gen_ug.py'
      - '_gen_hld.py'
      - 'knowledge-base/**'
      - 'infrastructure/update-bedrock-agent.py'
      - 'agent-action/agent-instructions.md'
      - 'agent-action/openapi-schema.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: www.eshkolai.com
  SMB_BUCKET: slashmycloudbill.com
  CLOUDFRONT_ID: E12JIHGHK40OLE
  STORAGE_BUCKET: aws-bill-analyzer-storage-991105135552
  STACK_NAME: aws-bill-analyzer-viewmybill

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ---- Ensure GitHubDeployRole has all required permissions ----
      - name: Update GitHubDeployRole permissions
        run: |
          aws iam put-role-policy \
            --role-name GitHubDeployRole \
            --policy-name SlashMyCloudBillPermissions \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "CloudFrontFull",
                  "Effect": "Allow",
                  "Action": [
                    "cloudfront:CreateDistribution",
                    "cloudfront:DeleteDistribution",
                    "cloudfront:GetDistribution",
                    "cloudfront:GetDistributionConfig",
                    "cloudfront:ListDistributions",
                    "cloudfront:UpdateDistribution",
                    "cloudfront:CreateInvalidation",
                    "cloudfront:GetInvalidation",
                    "cloudfront:CreateFunction",
                    "cloudfront:UpdateFunction",
                    "cloudfront:DeleteFunction",
                    "cloudfront:PublishFunction",
                    "cloudfront:DescribeFunction",
                    "cloudfront:GetFunction",
                    "cloudfront:ListFunctions",
                    "cloudfront:AssociateAlias",
                    "cloudfront:TagResource",
                    "cloudfront:UntagResource",
                    "cloudfront:ListTagsForResource"
                  ],
                  "Resource": "*"
                },
                {
                  "Sid": "Route53SMB",
                  "Effect": "Allow",
                  "Action": [
                    "route53:ChangeResourceRecordSets",
                    "route53:GetHostedZone",
                    "route53:ListHostedZones",
                    "route53:ListResourceRecordSets",
                    "route53:GetChange"
                  ],
                  "Resource": [
                    "arn:aws:route53:::hostedzone/Z08610352PUNQ7MUZTRVI",
                    "arn:aws:route53:::change/*"
                  ]
                },
                {
                  "Sid": "CloudFormationSMB",
                  "Effect": "Allow",
                  "Action": [
                    "cloudformation:CreateStack",
                    "cloudformation:UpdateStack",
                    "cloudformation:DeleteStack",
                    "cloudformation:DescribeStacks",
                    "cloudformation:DescribeStackEvents",
                    "cloudformation:DescribeStackResources",
                    "cloudformation:GetTemplate",
                    "cloudformation:ValidateTemplate",
                    "cloudformation:ListStacks",
                    "cloudformation:ListStackResources",
                    "cloudformation:CreateChangeSet",
                    "cloudformation:DescribeChangeSet",
                    "cloudformation:ExecuteChangeSet",
                    "cloudformation:DeleteChangeSet",
                    "cloudformation:GetTemplateSummary"
                  ],
                  "Resource": [
                    "arn:aws:cloudformation:us-east-1:991105135552:stack/slashmycloudbill-site/*",
                    "arn:aws:cloudformation:us-east-1:991105135552:stack/aws-bill-analyzer-*/*"
                  ]
                },
                {
                  "Sid": "S3SMB",
                  "Effect": "Allow",
                  "Action": [
                    "s3:CreateBucket",
                    "s3:PutBucketPolicy",
                    "s3:GetBucketPolicy",
                    "s3:PutBucketWebsite",
                    "s3:GetBucketWebsite",
                    "s3:PutBucketPublicAccessBlock",
                    "s3:GetBucketPublicAccessBlock",
                    "s3:PutBucketTagging",
                    "s3:ListBucket",
                    "s3:PutObject",
                    "s3:GetObject",
                    "s3:DeleteObject",
                    "s3:GetBucketLocation"
                  ],
                  "Resource": [
                    "arn:aws:s3:::slashmycloudbill.com",
                    "arn:aws:s3:::slashmycloudbill.com/*"
                  ]
                },
                {
                  "Sid": "BedrockAgent",
                  "Effect": "Allow",
                  "Action": [
                    "bedrock:CreateAgent",
                    "bedrock:UpdateAgent",
                    "bedrock:GetAgent",
                    "bedrock:ListAgents",
                    "bedrock:PrepareAgent",
                    "bedrock:CreateAgentActionGroup",
                    "bedrock:UpdateAgentActionGroup",
                    "bedrock:ListAgentActionGroups",
                    "bedrock:CreateAgentAlias",
                    "bedrock:UpdateAgentAlias",
                    "bedrock:ListAgentAliases",
                    "bedrock:GetAgentAlias",
                    "iam:CreateRole",
                    "iam:GetRole",
                    "iam:PutRolePolicy",
                    "iam:PassRole",
                    "lambda:AddPermission",
                    "lambda:GetPolicy"
                  ],
                  "Resource": "*"
                },
                {
                  "Sid": "DynamoDBInvoicesTable",
                  "Effect": "Allow",
                  "Action": [
                    "dynamodb:CreateTable",
                    "dynamodb:DescribeTable",
                    "dynamodb:UpdateTimeToLive",
                    "dynamodb:DescribeTimeToLive",
                    "dynamodb:TagResource",
                    "dynamodb:ListTagsOfResource"
                  ],
                  "Resource": "arn:aws:dynamodb:us-east-1:991105135552:table/MemberPortal-Invoices"
                }
              ]
            }'
          echo "✓ GitHubDeployRole permissions updated"

      # ---- SlashMyBill Infrastructure ----
      - name: Package Bill Analyzer Lambda
        run: |
          echo "Packaging Bill Analyzer Lambda..."
          pip install -r bill-analyzer/requirements.txt -t .build-bill-analyzer/ --quiet
          cp bill-analyzer/*.py .build-bill-analyzer/
          cp bill-analyzer/SlashMyBill.png .build-bill-analyzer/
          cd .build-bill-analyzer && zip -r ../bill-analyzer-lambda.zip . -q
          cd ..
          aws s3 cp bill-analyzer-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/bill-analyzer.zip
          echo "✓ Bill Analyzer packaged"

      - name: Package Upload Handler Lambda
        run: |
          echo "Packaging Upload Handler Lambda..."
          mkdir -p .build-upload-handler
          cp upload-handler/lambda_function.py .build-upload-handler/
          cd .build-upload-handler && zip -r ../upload-handler-lambda.zip . -q
          cd ..
          aws s3 cp upload-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/upload-handler.zip
          echo "✓ Upload Handler packaged"

      - name: Package OTP Handler Lambda
        run: |
          echo "Packaging OTP Handler Lambda..."
          mkdir -p .build-otp-handler
          cp otp-handler/lambda_function.py .build-otp-handler/
          cd .build-otp-handler && zip -r ../otp-handler-lambda.zip . -q
          cd ..
          aws s3 cp otp-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/otp-handler.zip
          echo "✓ OTP Handler packaged"

      - name: Package Admin Handler Lambda
        run: |
          echo "Packaging Admin Handler Lambda..."
          pip install PyJWT bcrypt -t .build-admin-handler/ --quiet
          cp admin-handler/lambda_function.py .build-admin-handler/
          cd .build-admin-handler && zip -r ../admin-handler-lambda.zip . -q
          cd ..
          aws s3 cp admin-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/admin-handler.zip
          echo "✓ Admin Handler packaged"

      - name: Package Member Handler Lambda
        run: |
          echo "Packaging Member Handler Lambda..."
          pip install PyJWT bcrypt pyyaml -t .build-member-handler/ --quiet
          cp member-handler/lambda_function.py .build-member-handler/
          cp member-handler/invoice_sync.py .build-member-handler/
          cp member-handler/invoice_validation.py .build-member-handler/
          cd .build-member-handler && zip -r ../member-handler-lambda.zip . -q
          cd ..
          aws s3 cp member-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/member-handler.zip
          echo "✓ Member Handler packaged"

      - name: Package Paddle Webhook Lambda
        run: |
          echo "Packaging Paddle Webhook Lambda..."
          mkdir -p .build-paddle-webhook
          cp paddle-webhook-handler/lambda_function.py .build-paddle-webhook/
          cd .build-paddle-webhook && zip -r ../paddle-webhook-lambda.zip . -q
          cd ..
          aws s3 cp paddle-webhook-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/paddle-webhook.zip
          echo "✓ Paddle Webhook packaged"

      - name: Package Agent Action Lambda
        run: |
          echo "Packaging Agent Action Lambda..."
          mkdir -p .build-agent-action
          cp agent-action/lambda_function.py .build-agent-action/
          cd .build-agent-action && zip -r ../agent-action-lambda.zip . -q
          cd ..
          aws s3 cp agent-action-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/agent-action.zip
          echo "✓ Agent Action packaged"

      - name: Package Scheduler Executor Lambda
        run: |
          echo "Packaging Scheduler Executor Lambda..."
          mkdir -p .build-scheduler-executor
          cp scheduler-executor/lambda_function.py .build-scheduler-executor/
          cd .build-scheduler-executor && zip -r ../scheduler-executor-lambda.zip . -q
          cd ..
          aws s3 cp scheduler-executor-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/scheduler-executor.zip
          echo "✓ Scheduler Executor packaged"

      - name: Deploy SlashMyBill CloudFormation stack
        continue-on-error: true
        run: |
          echo "Deploying SlashMyBill infrastructure..."
          aws cloudformation deploy \
            --template-file infrastructure/viewmybill-stack.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              AdminUsername='${{ secrets.ADMIN_USERNAME }}' \
              AdminPasswordHash='${{ secrets.ADMIN_PASSWORD_HASH }}' \
              JWTSecret='${{ secrets.JWT_SECRET }}' \
            --tags Project=ViewMyBill
          echo "✓ Infrastructure deployed"

      - name: Ensure MemberPortal-Invoices DynamoDB table exists
        continue-on-error: true
        run: |
          aws dynamodb describe-table --table-name MemberPortal-Invoices > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "Creating MemberPortal-Invoices table..."
            aws dynamodb create-table \
              --table-name MemberPortal-Invoices \
              --attribute-definitions \
                AttributeName=pk,AttributeType=S \
                AttributeName=sk,AttributeType=S \
                AttributeName=month,AttributeType=S \
              --key-schema \
                AttributeName=pk,KeyType=HASH \
                AttributeName=sk,KeyType=RANGE \
              --global-secondary-indexes '[{"IndexName":"month-index","KeySchema":[{"AttributeName":"pk","KeyType":"HASH"},{"AttributeName":"month","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
              --billing-mode PAY_PER_REQUEST \
              --tags Key=Project,Value=ViewMyBill
            aws dynamodb wait table-exists --table-name MemberPortal-Invoices
            aws dynamodb update-time-to-live \
              --table-name MemberPortal-Invoices \
              --time-to-live-specification Enabled=true,AttributeName=ttl
            echo "✓ MemberPortal-Invoices table created with TTL"
          else
            echo "✓ MemberPortal-Invoices table already exists"
          fi

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name aws-bill-analyzer-viewmybill \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/bill-analyzer.zip > /dev/null
          aws lambda update-function-code \
            --function-name aws-bill-analyzer-upload-handler \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/upload-handler.zip > /dev/null
          aws lambda update-function-code \
            --function-name aws-bill-analyzer-otp-handler \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/otp-handler.zip > /dev/null
          aws lambda update-function-code \
            --function-name aws-bill-analyzer-admin-api \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/admin-handler.zip > /dev/null
          aws lambda update-function-code \
            --function-name aws-bill-analyzer-member-api \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/member-handler.zip > /dev/null
          # Note: Cognito env vars are set in the CloudFormation template (viewmybill-stack.yaml)
          # Do NOT use update-function-configuration here as it replaces ALL env vars
          aws lambda update-function-code \
            --function-name SlashMyBill-AgentAction \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/agent-action.zip > /dev/null || true
          # Update Paddle webhook handler (skip if not yet created)
          aws lambda update-function-code \
            --function-name slashmybill-paddle-webhook \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/paddle-webhook.zip > /dev/null 2>&1 || true
          # Update Scheduler Executor (skip if not yet created)
          aws lambda update-function-code \
            --function-name slashmybill-scheduler-executor \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-key lambda-packages/scheduler-executor.zip > /dev/null 2>&1 || true
          echo "✓ Lambda functions updated"

      - name: Update Lambda memory and timeout (CF stack may fail to apply these)
        continue-on-error: true
        run: |
          aws lambda update-function-configuration \
            --function-name aws-bill-analyzer-member-api \
            --memory-size 2048 \
            --timeout 300 > /dev/null 2>&1 || true
          echo "✓ Member handler: 2048MB, 300s timeout"

      - name: Grant Lambda self-invoke permission (for async scan)
        continue-on-error: true
        run: |
          # Get the Lambda role ARN
          ROLE_ARN=$(aws lambda get-function-configuration --function-name aws-bill-analyzer-member-api --query "Role" --output text)
          ROLE_NAME=$(echo $ROLE_ARN | awk -F'/' '{print $NF}')
          # Add inline policy for self-invocation
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "SelfInvokePolicy" \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Action": "lambda:InvokeFunction",
                "Resource": "arn:aws:lambda:us-east-1:991105135552:function:aws-bill-analyzer-member-api"
              }]
            }'
          echo "✓ Lambda self-invoke permission granted"

      - name: Grant Lambda cost allocation tag permissions
        continue-on-error: true
        run: |
          ROLE_ARN=$(aws lambda get-function-configuration --function-name aws-bill-analyzer-member-api --query "Role" --output text)
          ROLE_NAME=$(echo $ROLE_ARN | awk -F'/' '{print $NF}')
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "CostAllocationTagsPolicy" \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Action": [
                  "ce:ListCostAllocationTags",
                  "ce:UpdateCostAllocationTagsStatus"
                ],
                "Resource": "*"
              }]
            }'
          echo "✓ Cost allocation tag permissions granted"

      - name: Grant Lambda DynamoDB Invoices table access
        continue-on-error: true
        run: |
          ROLE_ARN=$(aws lambda get-function-configuration --function-name aws-bill-analyzer-member-api --query "Role" --output text)
          ROLE_NAME=$(echo $ROLE_ARN | awk -F'/' '{print $NF}')
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "DynamoDBInvoicesCRUDAccess" \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Action": [
                  "dynamodb:GetItem",
                  "dynamodb:PutItem",
                  "dynamodb:UpdateItem",
                  "dynamodb:DeleteItem",
                  "dynamodb:Query",
                  "dynamodb:BatchWriteItem"
                ],
                "Resource": [
                  "arn:aws:dynamodb:us-east-1:991105135552:table/MemberPortal-Invoices",
                  "arn:aws:dynamodb:us-east-1:991105135552:table/MemberPortal-Invoices/index/*"
                ]
              }]
            }'
          echo "✓ DynamoDB Invoices table permissions granted"

      - name: Configure Cognito email via SES (eshkolai.com)
        continue-on-error: true
        run: |
          # SES is in production mode (50K/day). eshkolai.com is verified.
          # Configure Cognito to send verification emails via SES using eshkolai.com identity.
          aws cognito-idp update-user-pool --user-pool-id us-east-1_FlR2CmFu0 \
            --email-configuration '{
              "SourceArn": "arn:aws:ses:us-east-1:991105135552:identity/eshkolai.com",
              "ReplyToEmailAddress": "ariel@slashmycloudbill.com",
              "EmailSendingAccount": "DEVELOPER",
              "From": "SlashMyBill <noreply@eshkolai.com>"
            }' \
            --email-verification-subject "SlashMyBill - Verify Your Email" \
            --email-verification-message '<div style="font-family:Arial,sans-serif;max-width:500px;margin:0 auto;padding:20px;"><div style="text-align:center;margin-bottom:20px;"><img src="https://slashmycloudbill.com/SlashMyBill.png" alt="SlashMyBill" style="height:40px;"></div><div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:24px;text-align:center;"><h2 style="color:#1f2937;margin:0 0 12px;">Verify Your Email</h2><p style="color:#6b7280;font-size:14px;margin:0 0 20px;">Your verification code is:</p><div style="background:#1f3864;color:#fff;font-size:28px;font-weight:700;letter-spacing:6px;padding:16px 24px;border-radius:8px;display:inline-block;">{####}</div><p style="color:#6b7280;font-size:13px;margin:20px 0 0;">This code expires in 5 minutes.</p></div><p style="color:#9ca3af;font-size:11px;text-align:center;margin-top:16px;">SlashMyBill - AWS FinOps Platform<br>slashmycloudbill.com</p></div>'
          echo "✓ Cognito configured to send via SES (noreply@eshkolai.com)"

      - name: Ensure API Gateway routes exist
        run: |
          API_ID="l2fd4h481h"
          MEMBER_INT=$(aws apigatewayv2 get-integrations --api-id $API_ID --query "Items[?contains(IntegrationUri, 'member-api')].IntegrationId" --output text)
          ADMIN_INT=$(aws apigatewayv2 get-integrations --api-id $API_ID --query "Items[?contains(IntegrationUri, 'admin-api')].IntegrationId" --output text)

          # Member routes
          MEMBER_ROUTES=(
            "POST /member/add-tokens"
            "POST /member/update-tier"
            "POST /members/tags/scan"
            "POST /members/tags/apply"
            "POST /members/schedules/analyze"
            "GET /members/schedules"
            "PUT /members/schedules/status"
            "POST /members/schedules/create"
            "DELETE /members/schedules/delete"
            "PUT /members/schedules/pause"
            "PUT /members/schedules/resume"
            "PUT /members/schedules/edit"
            "POST /members/budgets/list"
            "POST /members/budgets/create"
            "PUT /members/budgets/update"
            "DELETE /members/budgets/delete"
            "GET /members/live-metrics"
            "POST /members/healthcheck/scan"
            "POST /members/healthcheck/fix"
            "GET /members/tag-policy"
            "POST /members/tag-policy"
            "POST /members/agent/invoke"
            "POST /members/spot/config"
            "POST /members/spot/qualify"
            "POST /members/spot/plan"
            "POST /members/spot/migrate"
            "GET /members/spot/dashboard"
            "POST /members/servers/analyze"
            "POST /members/servers/resize"
            "POST /members/servers/list-instances"
            "POST /members/cluster/analyze"
            "POST /members/licensing/scan"
            "POST /members/rds/optimize"
            "POST /members/lambda/optimize"
            "POST /members/ebs/optimize"
            "GET /members/tag-keys"
            "GET /members/tag-values"
            "POST /members/accounts/update-permissions"
            "GET /members/actions/scan-status"
            "POST /members/committed-discounts/scan"
            "POST /members/committed-discounts/ladder"
            "GET /members/invoices"
            "POST /members/invoices/refresh"
            "GET /members/invoices/summary"
            "GET /members/invoices/services"
          )
          for ROUTE in "${MEMBER_ROUTES[@]}"; do
            aws apigatewayv2 create-route --api-id $API_ID --route-key "$ROUTE" --target "integrations/$MEMBER_INT" 2>/dev/null || true
          done

          # Admin routes
          ADMIN_ROUTES=(
            "GET /admin/subscribers"
            "PUT /admin/subscribers/tier"
            "POST /admin/subscribers/tokens"
            "GET /admin/schedules"
          )
          for ROUTE in "${ADMIN_ROUTES[@]}"; do
            aws apigatewayv2 create-route --api-id $API_ID --route-key "$ROUTE" --target "integrations/$ADMIN_INT" 2>/dev/null || true
          done

          # Deploy API
          aws apigatewayv2 create-deployment --api-id $API_ID > /dev/null
          echo "✓ API Gateway routes ensured"

      - name: Seed DynamoDB knowledge base
        run: |
          pip install boto3 --quiet
          python knowledge-base/seed-dynamodb.py
          echo "✓ DynamoDB seeded"

      - name: Update Bedrock Agent (create/update schema + prepare)
        continue-on-error: true
        run: |
          python infrastructure/update-bedrock-agent.py
          echo "✓ Bedrock Agent updated"

      - name: Generate documentation (User Guide + HLD)
        run: |
          pip install python-docx --quiet
          python _gen_ug.py
          python _gen_hld.py
          echo "✓ Documentation generated"

      - name: Upload documentation to S3
        run: |
          for f in SlashMyBill-UserGuide-*.docx SlashMyBill-HLD-*.docx; do
            [ -f "$f" ] && aws s3 cp "$f" s3://${{ env.SMB_BUCKET }}/docs/$f \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
          done
          echo "✓ Documentation uploaded to s3://${{ env.SMB_BUCKET }}/docs/"

      - name: Get API Gateway URL
        id: api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "API Gateway URL: $API_URL"
          echo "api_endpoint=$API_URL" >> $GITHUB_OUTPUT

      - name: Configure S3 lifecycle rules
        run: |
          aws s3api put-bucket-lifecycle-configuration \
            --bucket ${{ env.STORAGE_BUCKET }} \
            --lifecycle-configuration '{
              "Rules": [
                {"ID":"DeleteReportsAfter1Day","Filter":{"Prefix":"reports/"},"Status":"Enabled","Expiration":{"Days":1}},
                {"ID":"DeleteBillsAfter1Day","Filter":{"Prefix":"bills/"},"Status":"Enabled","Expiration":{"Days":1}}
              ]
            }'
          echo "✓ Lifecycle rules set"

      # ---- Website Deployment ----
      - name: Deploy website to S3
        run: |
          echo "Deploying website files..."
          for file in *.html; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "no-cache, no-store, must-revalidate"
          done
          for file in *.css; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "no-cache, no-store, must-revalidate"
          done
          for file in *.js; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "no-cache, no-store, must-revalidate" --content-type "application/javascript"
          done
          for file in *.png *.jpg *.jpeg *.gif *.svg *.ico; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "max-age=2592000"
          done
          echo "✓ Website deployed"

      - name: Deploy redirect pages to eshkolai (slashMyBill/members/admin → slashmycloudbill.com)
        run: |
          # Create redirect HTML pages
          for path_target in "slashMyBill/:https://slashmycloudbill.com/" "members/:https://slashmycloudbill.com/members/" "admin/:https://slashmycloudbill.com/admin/"; do
            IFS=':' read -r path target <<< "$path_target"
            target="${path_target#*:}"
            path="${path_target%%:*}"
            echo "<!DOCTYPE html><html><head><meta http-equiv=\"refresh\" content=\"0;url=${target}\"><title>Redirecting...</title></head><body><p>Moved to <a href=\"${target}\">${target}</a></p></body></html>" > /tmp/redirect.html
            aws s3 cp /tmp/redirect.html "s3://${{ env.S3_BUCKET }}/${path}index.html" \
              --cache-control "no-cache" --content-type "text/html"
            aws s3 cp /tmp/redirect.html "s3://eshkolai.com/${path}index.html" \
              --cache-control "no-cache" --content-type "text/html"
          done
          # Remove old slashMyBill/members/admin JS/CSS from eshkolai buckets (keep only redirect)
          for prefix in slashMyBill/ members/ admin/; do
            aws s3 rm "s3://${{ env.S3_BUCKET }}/${prefix}" --recursive --exclude "index.html" || true
            aws s3 rm "s3://eshkolai.com/${prefix}" --recursive --exclude "index.html" || true
          done
          echo "✓ Redirect pages deployed, old files removed"

      - name: Sync eshkolai.com bucket (main site only)
        run: |
          echo "Syncing main site to eshkolai.com..."
          # Only sync root-level files (HTML, CSS, JS, images) — not slashMyBill/members/admin
          aws s3 sync s3://${{ env.S3_BUCKET }} s3://eshkolai.com \
            --exclude "slashMyBill/*" --exclude "members/*" --exclude "admin/*"
          echo "✓ eshkolai.com synced"

      - name: Deploy slashmycloudbill.com site stack
        run: |
          echo "Deploying slashmycloudbill.com infrastructure..."

          ACCOUNT_ID="991105135552"
          SMB_CERT="arn:aws:acm:us-east-1:991105135552:certificate/5f9cd85b-591f-4787-963b-8f616c448588"
          SMB_HOSTED_ZONE="Z08610352PUNQ7MUZTRVI"

          # ── CloudFront function ──────────────────────────────────────────
          aws cloudfront create-function \
            --name "SlashMyCloudBill-Router" \
            --function-config 'Comment=Routes slashmycloudbill.com,Runtime=cloudfront-js-2.0' \
            --function-code fileb://infrastructure/cf-function-slashmycloudbill.js > /dev/null 2>&1 || true

          FN_ETAG=$(aws cloudfront describe-function --name "SlashMyCloudBill-Router" --query "ETag" --output text)
          aws cloudfront update-function \
            --name "SlashMyCloudBill-Router" --if-match "$FN_ETAG" \
            --function-config 'Comment=Routes slashmycloudbill.com,Runtime=cloudfront-js-2.0' \
            --function-code fileb://infrastructure/cf-function-slashmycloudbill.js > /dev/null
          FN_ETAG2=$(aws cloudfront describe-function --name "SlashMyCloudBill-Router" --query "ETag" --output text)
          aws cloudfront publish-function --name "SlashMyCloudBill-Router" --if-match "$FN_ETAG2" > /dev/null
          FN_ARN="arn:aws:cloudfront::${ACCOUNT_ID}:function/SlashMyCloudBill-Router"
          echo "✓ CloudFront function ready"

          # ── S3 bucket ────────────────────────────────────────────────────
          aws s3api create-bucket --bucket slashmycloudbill.com --region us-east-1 2>/dev/null || echo "Bucket exists"
          aws s3api put-public-access-block --bucket slashmycloudbill.com \
            --public-access-block-configuration \
            "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"
          aws s3api put-bucket-policy --bucket slashmycloudbill.com --policy \
            '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::slashmycloudbill.com/*"}]}'
          echo "✓ S3 bucket ready"

          # ── CloudFront distribution ──────────────────────────────────────
          # Check if distribution already exists
          SMB_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items,'slashmycloudbill.com')].Id" \
            --output text 2>/dev/null || echo "")

          if [ -z "$SMB_DIST_ID" ] || [ "$SMB_DIST_ID" = "None" ]; then
            echo "Creating new CloudFront distribution..."
            CALLER_REF="smb-$(date +%s)"
            SMB_DIST_ID=$(aws cloudfront create-distribution --distribution-config "{
              \"CallerReference\": \"${CALLER_REF}\",
              \"Aliases\": {\"Quantity\": 1, \"Items\": [\"slashmycloudbill.com\"]},
              \"DefaultRootObject\": \"index.html\",
              \"Origins\": {\"Quantity\": 1, \"Items\": [{
                \"Id\": \"S3Origin\",
                \"DomainName\": \"slashmycloudbill.com.s3.amazonaws.com\",
                \"S3OriginConfig\": {\"OriginAccessIdentity\": \"\"}
              }]},
              \"DefaultCacheBehavior\": {
                \"TargetOriginId\": \"S3Origin\",
                \"ViewerProtocolPolicy\": \"redirect-to-https\",
                \"ForwardedValues\": {\"QueryString\": false, \"Cookies\": {\"Forward\": \"none\"}},
                \"AllowedMethods\": {\"Quantity\": 2, \"Items\": [\"GET\",\"HEAD\"], \"CachedMethods\": {\"Quantity\": 2, \"Items\": [\"GET\",\"HEAD\"]}},
                \"Compress\": true,
                \"DefaultTTL\": 86400, \"MaxTTL\": 31536000, \"MinTTL\": 0,
                \"FunctionAssociations\": {\"Quantity\": 1, \"Items\": [{\"FunctionARN\": \"${FN_ARN}\", \"EventType\": \"viewer-request\"}]}
              },
              \"CustomErrorResponses\": {\"Quantity\": 2, \"Items\": [
                {\"ErrorCode\": 403, \"ResponseCode\": \"200\", \"ResponsePagePath\": \"/index.html\", \"ErrorCachingMinTTL\": 0},
                {\"ErrorCode\": 404, \"ResponseCode\": \"200\", \"ResponsePagePath\": \"/index.html\", \"ErrorCachingMinTTL\": 0}
              ]},
              \"Comment\": \"slashmycloudbill.com\",
              \"Enabled\": true,
              \"HttpVersion\": \"http2\",
              \"PriceClass\": \"PriceClass_100\",
              \"ViewerCertificate\": {
                \"ACMCertificateArn\": \"${SMB_CERT}\",
                \"SSLSupportMethod\": \"sni-only\",
                \"MinimumProtocolVersion\": \"TLSv1.2_2021\",
                \"CloudFrontDefaultCertificate\": false
              }
            }" --query "Distribution.Id" --output text)
            echo "✓ Distribution created: $SMB_DIST_ID"
          else
            echo "✓ Distribution already exists: $SMB_DIST_ID"
          fi

          # ── Route 53 DNS ─────────────────────────────────────────────────
          SMB_DIST_DOMAIN=$(aws cloudfront get-distribution \
            --id "$SMB_DIST_ID" \
            --query "Distribution.DomainName" --output text)

          aws route53 change-resource-record-sets \
            --hosted-zone-id "$SMB_HOSTED_ZONE" \
            --change-batch "{\"Changes\": [
              {\"Action\": \"UPSERT\", \"ResourceRecordSet\": {
                \"Name\": \"slashmycloudbill.com\", \"Type\": \"A\",
                \"AliasTarget\": {\"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                  \"DNSName\": \"${SMB_DIST_DOMAIN}\", \"EvaluateTargetHealth\": false}
              }},
              {\"Action\": \"UPSERT\", \"ResourceRecordSet\": {
                \"Name\": \"slashmycloudbill.com\", \"Type\": \"AAAA\",
                \"AliasTarget\": {\"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                  \"DNSName\": \"${SMB_DIST_DOMAIN}\", \"EvaluateTargetHealth\": false}
              }}
            ]}" > /dev/null
          echo "✓ DNS updated → $SMB_DIST_DOMAIN"
          echo "SMB_DIST_ID=$SMB_DIST_ID" >> $GITHUB_ENV

      - name: Deploy SlashMyBill files to slashmycloudbill.com bucket
        run: |
          API_URL="${{ steps.api-url.outputs.api_endpoint }}"
          echo "Deploying to slashmycloudbill.com bucket..."

          # Inject API URL into slashMyBill JS
          sed -i "s|https://YOUR_API_GATEWAY_URL|${API_URL}|g" slashMyBill/slashMyBill.js

          # Shared assets (needed by both members and slashMyBill pages)
          for f in SlashMyBill.png smallninja2.png styles.css; do
            [ -f "$f" ] && aws s3 cp "$f" s3://${{ env.SMB_BUCKET }}/$f \
              --cache-control "max-age=2592000"
          done

          # SlashMyBill landing page
          aws s3 sync slashMyBill/ s3://${{ env.SMB_BUCKET }}/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.py" --exclude "*.md"

          # Member Portal
          aws s3 sync members/ s3://${{ env.SMB_BUCKET }}/members/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.py"

          # Admin Panel
          aws s3 sync admin/ s3://${{ env.SMB_BUCKET }}/admin/ \
            --cache-control "no-cache, no-store, must-revalidate"

          # Legal Pages
          aws s3 sync terms-and-conditions/ s3://${{ env.SMB_BUCKET }}/terms-and-conditions/ \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 sync privacy/ s3://${{ env.SMB_BUCKET }}/privacy/ \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 sync refund/ s3://${{ env.SMB_BUCKET }}/refund/ \
            --cache-control "no-cache, no-store, must-revalidate"

          echo "✓ slashmycloudbill.com files deployed"

      - name: Invalidate slashmycloudbill.com CloudFront cache
        run: |
          if [ -n "$SMB_DIST_ID" ] && [ "$SMB_DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$SMB_DIST_ID" --paths "/*" > /dev/null
            echo "✓ slashmycloudbill.com cache invalidated (dist: $SMB_DIST_ID)"
          else
            echo "⚠ slashmycloudbill.com distribution ID not set"
          fi

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_ID }} \
            --paths "/*"
          echo "✓ Cache invalidated"

      - name: Summary
        run: |
          echo "=== Deploy Complete ==="
          echo "eshkolai.com: https://www.eshkolai.com"
          echo "SlashMyCloudBill: https://slashmycloudbill.com"
          echo "Admin: https://slashmycloudbill.com/admin/"
          echo "Member Portal: https://slashmycloudbill.com/members/"
          echo "API: ${{ steps.api-url.outputs.api_endpoint }}"
