name: Deploy

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - '*.css'
      - '*.js'
      - '*.png'
      - '*.jpg'
      - '*.jpeg'
      - '*.gif'
      - '*.svg'
      - '*.ico'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: www.eshkolai.com
  CLOUDFRONT_ID: E12JIHGHK40OLE

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy website to S3
        run: |
          echo "Deploying website files..."
          # HTML — short cache
          for file in *.html; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "max-age=300"
          done
          # CSS — short cache
          for file in *.css; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "max-age=300"
          done
          # JS — short cache
          for file in *.js; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "max-age=300" --content-type "application/javascript"
          done
          # Images — long cache
          for file in *.png *.jpg *.jpeg *.gif *.svg *.ico; do
            [ -f "$file" ] && aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "max-age=2592000"
          done
          echo "✓ Website deployed"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_ID }} \
            --paths "/*"
          echo "✓ Cache invalidated"

      - name: Summary
        run: |
          echo "=== Deploy Complete ==="
          echo "S3: ${{ env.S3_BUCKET }}"
          echo "CloudFront: ${{ env.CLOUDFRONT_ID }}"
          echo "URLs: https://www.eshkolai.com | https://eshkolai.com"
