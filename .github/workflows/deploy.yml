              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Action": "lambda:InvokeFunction",
                "Resource": "arn:aws:lambda:us-east-1:991105135552:function:slashmybill-tips-sync"
              }]
            }' --no-cli-pager

      - name: Setup Tips Sync Schedule
        continue-on-error: true
        run: |
          LAMBDA_ARN="arn:aws:lambda:us-east-1:991105135552:function:slashmybill-tips-sync"
          SCHEDULE_NAME="slashmybill-tips-sync-daily"
          ROLE_NAME="slashmybill-tips-sync-scheduler-role"
          ACCOUNT_ID="991105135552"

          # Check if schedule already exists
          if aws scheduler get-schedule --name "$SCHEDULE_NAME" --no-cli-pager > /dev/null 2>&1; then
            echo "✓ Schedule $SCHEDULE_NAME already exists"
          else
            echo "Creating IAM role for EventBridge Scheduler..."
            # Create the scheduler execution role
            aws iam create-role \
              --role-name "$ROLE_NAME" \
              --assume-role-policy-document '{
                "Version": "2012-10-17",
                "Statement": [{
                  "Effect": "Allow",
                  "Principal": {"Service": "scheduler.amazonaws.com"},
                  "Action": "sts:AssumeRole",
                  "Condition": {
                    "StringEquals": {
                      "aws:SourceAccount": "'"$ACCOUNT_ID"'"
                    }
                  }
                }]
              }' --no-cli-pager 2>/dev/null || echo "Role already exists"

            # Attach inline policy to allow invoking the Lambda
            aws iam put-role-policy \
              --role-name "$ROLE_NAME" \
              --policy-name "InvokeTipsSyncLambda" \
              --policy-document '{
                "Version": "2012-10-17",
                "Statement": [{
                  "Effect": "Allow",
                  "Action": "lambda:InvokeFunction",
                  "Resource": "arn:aws:lambda:us-east-1:991105135552:function:slashmybill-tips-sync"
                }]
              }' --no-cli-pager

            # Wait for role to propagate
            sleep 10

            echo "Creating EventBridge Scheduler schedule..."
            aws scheduler create-schedule \
              --name "$SCHEDULE_NAME" \
              --schedule-expression "cron(0 2 * * ? *)" \
              --flexible-time-window '{"Mode":"FLEXIBLE","MaximumWindowInMinutes":15}' \
              --target '{
                "Arn": "arn:aws:lambda:us-east-1:991105135552:function:slashmybill-tips-sync",
                "RoleArn": "arn:aws:iam::991105135552:role/slashmybill-tips-sync-scheduler-role",
                "Input": "{\"source\": \"scheduler\", \"manual\": false}"
              }' \
              --state ENABLED \
              --no-cli-pager
            echo "✓ Schedule $SCHEDULE_NAME created (daily at 02:00 UTC)"
          fi

      - name: Configure Cognito email via SES (eshkolai.com)
