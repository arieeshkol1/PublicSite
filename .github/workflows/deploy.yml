          # Legal Pages
          aws s3 sync terms-and-conditions/ s3://${{ env.SMB_BUCKET }}/terms-and-conditions/ \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 sync privacy/ s3://${{ env.SMB_BUCKET }}/privacy/ \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 sync refund/ s3://${{ env.SMB_BUCKET }}/refund/ \
            --cache-control "no-cache, no-store, must-revalidate"

          echo "✓ slashmycloudbill.com files deployed"

      - name: Invalidate slashmycloudbill.com CloudFront cache
        run: |
          if [ -n "$SMB_DIST_ID" ] && [ "$SMB_DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$SMB_DIST_ID" --paths "/*" > /dev/null
            echo "✓ slashmycloudbill.com cache invalidated (dist: $SMB_DIST_ID)"
          else
            echo "⚠ slashmycloudbill.com distribution ID not set"
          fi

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_ID }} \
            --paths "/*"
          echo "✓ Cache invalidated"

      - name: Summary
        run: |
          echo "=== Deploy Complete ==="
          echo "eshkolai.com: https://www.eshkolai.com"
          echo "SlashMyCloudBill: https://slashmycloudbill.com"
          echo "Admin: https://slashmycloudbill.com/admin/"
          echo "Member Portal: https://slashmycloudbill.com/members/"
          echo "API: ${{ steps.api-url.outputs.api_endpoint }}"
