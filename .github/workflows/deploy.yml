          # Create IAM role if missing
          if aws iam get-role --role-name "$ROLE_NAME" > /dev/null 2>&1; then
            echo "✓ Role $ROLE_NAME already exists"
          else
            echo "Creating $ROLE_NAME..."
            aws iam create-role \
              --role-name "$ROLE_NAME" \
              --assume-role-policy-document '{
                "Version": "2012-10-17",
                "Statement": [{
                  "Effect": "Allow",
                  "Principal": {"Service": "lambda.amazonaws.com"},
                  "Action": "sts:AssumeRole"
                }]
              }' > /dev/null
            aws iam attach-role-policy --role-name "$ROLE_NAME" \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            echo "✓ Role created"
            sleep 10
          fi

          # Update role permissions (always, to ensure they're current)
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "SchemaSyncPermissions" \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Action": ["dynamodb:Scan","dynamodb:GetItem","dynamodb:PutItem","dynamodb:UpdateItem","dynamodb:GetRecords","dynamodb:GetShardIterator","dynamodb:DescribeStream","dynamodb:ListStreams"],
                  "Resource": ["arn:aws:dynamodb:us-east-1:991105135552:table/ViewMyBill-CostOptimizationTips","arn:aws:dynamodb:us-east-1:991105135552:table/ViewMyBill-CostOptimizationTips/stream/*"]
                },
                {
                  "Effect": "Allow",
                  "Action": ["s3:PutObject","s3:GetObject","s3:ListBucket"],
                  "Resource": ["arn:aws:s3:::slashmybill-schema-versions","arn:aws:s3:::slashmybill-schema-versions/*"]
                },
                {
                  "Effect": "Allow",
                  "Action": ["bedrock:UpdateAgentActionGroup","bedrock:GetAgentActionGroup","bedrock-agent:UpdateAgentActionGroup","bedrock-agent:GetAgentActionGroup"],
                  "Resource": "*"
                },
                {
                  "Effect": "Allow",
                  "Action": "sns:Publish",
                  "Resource": "'"$ALERT_TOPIC_ARN"'"
                }
              ]
            }'
          echo "✓ Role permissions updated"

          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}"

          # Get Bedrock Agent ID and Action Group ID
          AGENT_ID=$(aws bedrock-agent list-agents --query "agentSummaries[?agentName=='SlashMyBill'].agentId" --output text 2>/dev/null || echo "")
          ACTION_GROUP_ID=""
          if [ -n "$AGENT_ID" ] && [ "$AGENT_ID" != "None" ]; then
            ACTION_GROUP_ID=$(aws bedrock-agent list-agent-action-groups --agent-id "$AGENT_ID" --agent-version DRAFT --query "actionGroupSummaries[?actionGroupName=='FinOpsActions'].actionGroupId" --output text 2>/dev/null || echo "")
          fi
          echo "Agent ID: $AGENT_ID, Action Group ID: $ACTION_GROUP_ID"

          # Create or update Lambda
          if aws lambda get-function --function-name "$FUNCTION_NAME" > /dev/null 2>&1; then
            echo "✓ $FUNCTION_NAME already exists"
          else
            echo "Creating $FUNCTION_NAME Lambda..."
            aws lambda create-function \
              --function-name "$FUNCTION_NAME" \
              --runtime python3.12 \
              --handler lambda_function.lambda_handler \
              --role "$ROLE_ARN" \
              --timeout 60 \
              --memory-size 256 \
              --reserved-concurrent-executions 1 \
              --environment "Variables={TIPS_TABLE_NAME=$TIPS_TABLE,SCHEMA_BUCKET=$SCHEMA_BUCKET,AGENT_ID=$AGENT_ID,ACTION_GROUP_ID=$ACTION_GROUP_ID,ACTION_GROUP_NAME=FinOpsActions,ALERT_TOPIC_ARN=$ALERT_TOPIC_ARN}" \
              --code S3Bucket=${{ env.STORAGE_BUCKET }},S3Key=lambda-packages/schema-sync.zip \
              --tags Project=ViewMyBill Feature=SchemaDrivenSync > /dev/null
            echo "✓ Lambda created"
            aws lambda wait function-active --function-name "$FUNCTION_NAME"
          fi

          # Update Lambda env vars (in case agent/action group IDs changed)
          aws lambda wait function-updated --function-name "$FUNCTION_NAME" 2>/dev/null || sleep 5
          aws lambda update-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --environment "Variables={TIPS_TABLE_NAME=$TIPS_TABLE,SCHEMA_BUCKET=$SCHEMA_BUCKET,AGENT_ID=$AGENT_ID,ACTION_GROUP_ID=$ACTION_GROUP_ID,ACTION_GROUP_NAME=FinOpsActions,ALERT_TOPIC_ARN=$ALERT_TOPIC_ARN}" > /dev/null 2>&1 || true

          # Enable DynamoDB Stream on Tips table (if not already)
          STREAM_STATUS=$(aws dynamodb describe-table --table-name "$TIPS_TABLE" --query "Table.StreamSpecification.StreamEnabled" --output text 2>/dev/null || echo "False")
          if [ "$STREAM_STATUS" != "True" ]; then
            echo "Enabling DynamoDB Stream on $TIPS_TABLE..."
            aws dynamodb update-table \
              --table-name "$TIPS_TABLE" \
              --stream-specification StreamEnabled=true,StreamViewType=NEW_AND_OLD_IMAGES > /dev/null
            echo "Waiting for stream to be active..."
            sleep 15
          fi

          # Create event source mapping (DynamoDB Stream → Lambda) if not exists
          EXISTING_MAPPING=$(aws lambda list-event-source-mappings --function-name "$FUNCTION_NAME" --query "EventSourceMappings[0].UUID" --output text 2>/dev/null || echo "None")
          if [ "$EXISTING_MAPPING" = "None" ] || [ -z "$EXISTING_MAPPING" ]; then
            STREAM_ARN=$(aws dynamodb describe-table --table-name "$TIPS_TABLE" --query "Table.LatestStreamArn" --output text)
            if [ -n "$STREAM_ARN" ] && [ "$STREAM_ARN" != "None" ]; then
              aws lambda create-event-source-mapping \
                --function-name "$FUNCTION_NAME" \
                --event-source-arn "$STREAM_ARN" \
                --starting-position LATEST \
                --batch-size 10 \
                --maximum-batching-window-in-seconds 5 \
                --maximum-retry-attempts 3 > /dev/null
              echo "✓ DynamoDB Stream event source mapping created (5s batch window)"
            fi
          else
            echo "✓ Event source mapping already exists"
          fi
          echo "✓ Schema Sync infrastructure complete"

      - name: Run Schema Sync migration and seed
        continue-on-error: true
        run: |
          echo "Running Service ID migration + tool definition seed..."
          pip install boto3 --quiet
          # Run migration: populate serviceId on existing tip records
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          os.environ['TIPS_TABLE_NAME'] = 'ViewMyBill-CostOptimizationTips'
          from schema_sync.migrate_service_ids import migrate_tips_table
          result = migrate_tips_table()
          print(f'Migration result: {result}')
          "
          echo "✓ Service ID migration complete"
          # Run seed: populate toolDefinition for 11 existing operations
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          os.environ['TIPS_TABLE_NAME'] = 'ViewMyBill-CostOptimizationTips'
          from schema_sync.seed_tool_definitions import seed_tool_definitions
          result = seed_tool_definitions()
          print(f'Seed result: {result}')
          "
          echo "✓ Tool definitions seeded"

      - name: Trigger initial Schema Sync (dryRun validation)
        continue-on-error: true
        run: |
          echo "Invoking Schema Sync Lambda in dryRun mode..."
          aws lambda invoke \
            --function-name slashmybill-schema-sync \
            --payload '{"action": "sync", "dryRun": true}' \
            --region us-east-1 \
            /tmp/schema-sync-result.json > /dev/null 2>&1 || echo "⚠ Invoke failed"
          if [ -f /tmp/schema-sync-result.json ]; then
            echo "Schema Sync dryRun result:"
            cat /tmp/schema-sync-result.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Operations: {d.get(\"operationCount\",\"?\")} | Providers: {d.get(\"providers\",\"?\")} | DryRun: {d.get(\"dryRun\",\"?\")}')" 2>/dev/null || cat /tmp/schema-sync-result.json
          fi
          echo "✓ Schema Sync validation complete"

      - name: Ensure DynamoDB Stream triggers audit-evaluator
        continue-on-error: true
        run: |
          # Check if audit-evaluator has an event source mapping for Audit_Transaction_Log stream
          STREAM_ARN=$(aws dynamodb describe-table --table-name Audit_Transaction_Log --query "Table.LatestStreamArn" --output text 2>/dev/null || echo "")
          if [ -z "$STREAM_ARN" ] || [ "$STREAM_ARN" = "None" ]; then
            echo "⚠ No stream on Audit_Transaction_Log — enabling..."
            aws dynamodb update-table --table-name Audit_Transaction_Log \
              --stream-specification StreamEnabled=true,StreamViewType=NEW_IMAGE > /dev/null 2>&1 || true
            sleep 5
            STREAM_ARN=$(aws dynamodb describe-table --table-name Audit_Transaction_Log --query "Table.LatestStreamArn" --output text 2>/dev/null || echo "")
          fi
          if [ -z "$STREAM_ARN" ] || [ "$STREAM_ARN" = "None" ]; then
            echo "❌ Cannot get stream ARN"
            exit 0
          fi
          echo "Stream ARN: $STREAM_ARN"
          # Check if event source mapping already exists
          EXISTING=$(aws lambda list-event-source-mappings --function-name audit-evaluator --event-source-arn "$STREAM_ARN" --query "EventSourceMappings[0].UUID" --output text 2>/dev/null || echo "None")
          if [ "$EXISTING" = "None" ] || [ -z "$EXISTING" ]; then
            echo "Creating event source mapping: Audit_Transaction_Log → audit-evaluator"
            aws lambda create-event-source-mapping \
              --function-name audit-evaluator \
              --event-source-arn "$STREAM_ARN" \
              --starting-position LATEST \
              --batch-size 1 \
              --maximum-batching-window-in-seconds 0 > /dev/null 2>&1 && echo "✓ Stream mapping created" || echo "⚠ Mapping creation failed (may already exist)"
          else
            echo "✓ Stream mapping already exists: $EXISTING"
          fi

      - name: Summary
        run: |
          echo "=== Deploy Complete ==="
          echo "eshkolai.com: https://www.eshkolai.com"
          echo "SlashMyCloudBill: https://slashmycloudbill.com"
          echo "Admin: https://slashmycloudbill.com/admin/"
          echo "Member Portal: https://slashmycloudbill.com/members/"
          echo "API: ${{ steps.api-url.outputs.api_endpoint }}"
