          AGENT_CONFIG=$(aws bedrock-agent get-agent --agent-id "$AGENT_ID" --query 'agent' --output json 2>/dev/null)
          if [ -z "$AGENT_CONFIG" ]; then
            echo "⚠ Could not fetch agent config, skipping"
            exit 0
          fi
          AGENT_NAME=$(echo "$AGENT_CONFIG" | python3 -c "import sys,json; print(json.load(sys.stdin).get('agentName','SlashMyBill-Agent'))")
