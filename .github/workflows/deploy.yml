name: Deploy-CDK-Infrastructure

on:
  workflow_dispatch:   # manual runs only
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_ACCOUNT_ID: "960915223703"
  AWS_REGION: "us-east-1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CDK
        run: |
          npm install -g aws-cdk@latest
          python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          if [ -f infrastructure/requirements.txt ]; then
            pip install -r infrastructure/requirements.txt
          else
            echo "No requirements.txt found - skipping Python dependencies"
          fi

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Bootstrap (idempotent)
        run: cdk bootstrap aws://$AWS_ACCOUNT_ID/$AWS_REGION

      - name: CDK Deploy
        run: |
          if [ -f cdk.json ]; then
            cdk deploy --all --require-approval never
          else
            echo "No cdk.json found - skipping CDK deployment"
            echo "Add your CDK infrastructure code to enable deployment"
          fi
