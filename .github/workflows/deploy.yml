name: Deploy-CDK-Infrastructure

on:
  workflow_dispatch:   # manual runs only
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_ACCOUNT_ID: "991105135552"
  AWS_REGION: "us-east-1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CDK
        run: |
          npm install -g aws-cdk@latest
          python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          if [ -f infrastructure/requirements.txt ]; then
            pip install -r infrastructure/requirements.txt
          else
            echo "No requirements.txt found - skipping Python dependencies"
          fi

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Bootstrap (idempotent)
        run: cdk bootstrap aws://$AWS_ACCOUNT_ID/$AWS_REGION

      - name: CDK Deploy
        run: |
          if [ -f cdk.json ]; then
            cdk deploy --all --require-approval never
          else
            echo "No cdk.json found - skipping CDK deployment"
            echo "Add your CDK infrastructure code to enable deployment"
          fi

      - name: Deploy WMS POC EC2 Infrastructure
        run: |
          STACK_NAME="made4net-wms-poc"
          TEMPLATE_FILE=".kiro/specs/windows-ec2-poc-deployment/infrastructure.yaml"
          
          if [ -f "$TEMPLATE_FILE" ]; then
            echo "Deploying WMS POC EC2 infrastructure..."
            
            # Check if stack exists
            if aws cloudformation describe-stacks --stack-name $STACK_NAME --region $AWS_REGION 2>/dev/null; then
              echo "Stack exists - updating..."
              aws cloudformation update-stack \
                --stack-name $STACK_NAME \
                --template-body file://$TEMPLATE_FILE \
                --capabilities CAPABILITY_NAMED_IAM \
                --region $AWS_REGION || echo "No updates to perform"
              
              echo "Waiting for stack update to complete..."
              aws cloudformation wait stack-update-complete --stack-name $STACK_NAME --region $AWS_REGION 2>/dev/null || true
            else
              echo "Stack does not exist - creating..."
              aws cloudformation create-stack \
                --stack-name $STACK_NAME \
                --template-body file://$TEMPLATE_FILE \
                --capabilities CAPABILITY_NAMED_IAM \
                --region $AWS_REGION
              
              echo "Waiting for stack creation to complete..."
              aws cloudformation wait stack-create-complete --stack-name $STACK_NAME --region $AWS_REGION
            fi
            
            echo "Stack deployment complete!"
            aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs" --region $AWS_REGION
          else
            echo "WMS POC template not found - skipping EC2 deployment"
          fi
