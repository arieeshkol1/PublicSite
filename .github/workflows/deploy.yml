name: Deploy

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - '*.css'
      - '*.js'
      - '*.png'
      - '*.jpg'
      - '*.jpeg'
      - '*.gif'
      - '*.svg'
      - '*.ico'
      - 'slashMyBill/**'
      - 'infrastructure/viewmybill-stack.yaml'
      - 'infrastructure/slashmycloudbill-site-stack.yaml'
      - 'infrastructure/github-oidc-role.yaml'
      - 'bill-analyzer/**'
      - 'upload-handler/**'
      - 'otp-handler/**'
      - 'admin-handler/**'
      - 'admin/**'
      - 'member-handler/**'
      - 'members/**'
      - 'agent-action/**'
      - 'audit-evaluator/**'
      - 'openai-sync-handler/**'
      - 'transaction_logger.py'
      - 'scheduler-executor/**'
      - 'daily-refresh-handler/**'
      - 'tips-sync/**'
      - '_gen_ug.py'
      - '_gen_hld.py'
      - 'knowledge-base/**'
      - 'infrastructure/update-bedrock-agent.py'
      - 'infrastructure/register-action-group.py'
      - 'infrastructure/deploy-agent-action-groups.py'
      - 'agent-action/agent-instructions.md'
      - 'agent-action/agent-instructions.txt'
      - 'agent-action/schemas/**'
      - 'agent-action/openapi-schema.json'
      - 'dashboard-handler/**'
      - 'dashboard/**'
      - 'infrastructure/dashboard-stack.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: www.eshkolai.com
  SMB_BUCKET: slashmycloudbill.com
  CLOUDFRONT_ID: E12JIHGHK40OLE
  STORAGE_BUCKET: aws-bill-analyzer-storage-991105135552
  STACK_NAME: aws-bill-analyzer-viewmybill

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ---- Ensure GitHubDeployRole has all required permissions ----
      - name: Update GitHubDeployRole permissions
        run: |
          aws iam put-role-policy \
            --role-name GitHubDeployRole \
            --policy-name SlashMyCloudBillPermissions \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "CloudFrontFull",
                  "Effect": "Allow",
                  "Action": [
                    "cloudfront:CreateDistribution",
                    "cloudfront:DeleteDistribution",
                    "cloudfront:GetDistribution",
                    "cloudfront:GetDistributionConfig",
                    "cloudfront:ListDistributions",
                    "cloudfront:UpdateDistribution",
                    "cloudfront:CreateInvalidation",
                    "cloudfront:GetInvalidation",
                    "cloudfront:CreateFunction",
                    "cloudfront:UpdateFunction",
                    "cloudfront:DeleteFunction",
                    "cloudfront:PublishFunction",
                    "cloudfront:DescribeFunction",
                    "cloudfront:GetFunction",
                    "cloudfront:ListFunctions",
                    "cloudfront:AssociateAlias",
                    "cloudfront:TagResource",
                    "cloudfront:UntagResource",
                    "cloudfront:ListTagsForResource"
                  ],
                  "Resource": "*"
                },
                {
                  "Sid": "Route53SMB",
                  "Effect": "Allow",
                  "Action": [
                    "route53:ChangeResourceRecordSets",
                    "route53:GetHostedZone",
                    "route53:ListHostedZones",
                    "route53:ListResourceRecordSets",
                    "route53:GetChange"
                  ],
                  "Resource": [
                    "arn:aws:route53:::hostedzone/Z08610352PUNQ7MUZTRVI",
                    "arn:aws:route53:::change/*"
                  ]
                },
                {
                  "Sid": "CloudFormationSMB",
                  "Effect": "Allow",
                  "Action": [
                    "cloudformation:CreateStack",
                    "cloudformation:UpdateStack",
                    "cloudformation:DeleteStack",
                    "cloudformation:DescribeStacks",
                    "cloudformation:DescribeStackEvents",
                    "cloudformation:DescribeStackResources",
                    "cloudformation:GetTemplate",
                    "cloudformation:ValidateTemplate",
                    "cloudformation:ListStacks",
                    "cloudformation:ListStackResources",
                    "cloudformation:CreateChangeSet",
                    "cloudformation:DescribeChangeSet",
                    "cloudformation:ExecuteChangeSet",
                    "cloudformation:DeleteChangeSet",
                    "cloudformation:GetTemplateSummary"
                  ],
                  "Resource": [
                    "arn:aws:cloudformation:us-east-1:991105135552:stack/slashmycloudbill-site/*",
                    "arn:aws:cloudformation:us-east-1:991105135552:stack/aws-bill-analyzer-*/*",
                    "arn:aws:cloudformation:us-east-1:991105135552:stack/dashboard-handler-stack/*"
                  ]
                },
                {
                  "Sid": "S3SMB",
                  "Effect": "Allow",
                  "Action": [
                    "s3:CreateBucket",
                    "s3:PutBucketPolicy",
                    "s3:GetBucketPolicy",
                    "s3:PutBucketWebsite",
                    "s3:GetBucketWebsite",
                    "s3:PutBucketPublicAccessBlock",
                    "s3:GetBucketPublicAccessBlock",
                    "s3:PutBucketTagging",
                    "s3:ListBucket",
                    "s3:PutObject",
                    "s3:GetObject",
                    "s3:DeleteObject",
                    "s3:GetBucketLocation"
                  ],
                  "Resource": [
                    "arn:aws:s3:::slashmycloudbill.com",
                    "arn:aws:s3:::slashmycloudbill.com/*"
                  ]
                },
                {
                  "Sid": "BedrockAgent",
                  "Effect": "Allow",
                  "Action": [
                    "bedrock:CreateAgent",
                    "bedrock:UpdateAgent",
                    "bedrock:GetAgent",
                    "bedrock:ListAgents",
                    "bedrock:PrepareAgent",
                    "bedrock:CreateAgentActionGroup",
                    "bedrock:UpdateAgentActionGroup",
                    "bedrock:ListAgentActionGroups",
                    "bedrock:CreateAgentAlias",
                    "bedrock:UpdateAgentAlias",
                    "bedrock:ListAgentAliases",
                    "bedrock:GetAgentAlias",
                    "bedrock-agent:CreateAgent",
                    "bedrock-agent:UpdateAgent",
                    "bedrock-agent:GetAgent",
                    "bedrock-agent:ListAgents",
                    "bedrock-agent:PrepareAgent",
                    "bedrock-agent:CreateAgentActionGroup",
                    "bedrock-agent:UpdateAgentActionGroup",
                    "bedrock-agent:ListAgentActionGroups",
                    "bedrock-agent:CreateAgentAlias",
                    "bedrock-agent:UpdateAgentAlias",
                    "bedrock-agent:ListAgentAliases",
                    "bedrock-agent:GetAgentAlias",
                    "iam:CreateRole",
                    "iam:GetRole",
                    "iam:PutRolePolicy",
                    "iam:PassRole",
                    "lambda:AddPermission",
                    "lambda:GetPolicy"
                  ],
                  "Resource": "*"
                },
                {
                  "Sid": "DynamoDBInvoicesTable",
                  "Effect": "Allow",
                  "Action": [
                    "dynamodb:CreateTable",
                    "dynamodb:DescribeTable",
                    "dynamodb:UpdateTimeToLive",
                    "dynamodb:DescribeTimeToLive",
                    "dynamodb:TagResource",
                    "dynamodb:ListTagsOfResource",
                    "dynamodb:BatchWriteItem",
                    "dynamodb:PutItem",
                    "dynamodb:Query"
                  ],
                  "Resource": [
                    "arn:aws:dynamodb:us-east-1:991105135552:table/MemberPortal-Invoices",
                    "arn:aws:dynamodb:us-east-1:991105135552:table/Cost_Cache_Table",
                    "arn:aws:dynamodb:us-east-1:991105135552:table/ProviderRegistry",
                    "arn:aws:dynamodb:us-east-1:991105135552:table/ViewMyBill-CostOptimizationTips",
                    "arn:aws:dynamodb:us-east-1:991105135552:table/Audit_Transaction_Log",
                    "arn:aws:dynamodb:us-east-1:991105135552:table/Audit_Transaction_Log/index/*"
                  ]
                }
              ]
            }'
          echo "✓ GitHubDeployRole permissions updated"

      # ---- SlashMyBill Infrastructure ----
      - name: Package Bill Analyzer Lambda
        run: |
          echo "Packaging Bill Analyzer Lambda..."
          pip install -r bill-analyzer/requirements.txt -t .build-bill-analyzer/ --quiet
          cp bill-analyzer/*.py .build-bill-analyzer/
          cp bill-analyzer/SlashMyBill.png .build-bill-analyzer/
          cd .build-bill-analyzer && zip -r ../bill-analyzer-lambda.zip . -q
          cd ..
          aws s3 cp bill-analyzer-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/bill-analyzer.zip
          echo "✓ Bill Analyzer packaged"

      - name: Package Upload Handler Lambda
        run: |
          echo "Packaging Upload Handler Lambda..."
          mkdir -p .build-upload-handler
          cp upload-handler/lambda_function.py .build-upload-handler/
          cd .build-upload-handler && zip -r ../upload-handler-lambda.zip . -q
          cd ..
          aws s3 cp upload-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/upload-handler.zip
          echo "✓ Upload Handler packaged"

      - name: Package OTP Handler Lambda
        run: |
          echo "Packaging OTP Handler Lambda..."
          mkdir -p .build-otp-handler
          cp otp-handler/lambda_function.py .build-otp-handler/
          cd .build-otp-handler && zip -r ../otp-handler-lambda.zip . -q
          cd ..
          aws s3 cp otp-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/otp-handler.zip
          echo "✓ OTP Handler packaged"

      - name: Package Admin Handler Lambda
        run: |
          echo "Packaging Admin Handler Lambda..."
          pip install PyJWT bcrypt -t .build-admin-handler/ --quiet
          cp admin-handler/lambda_function.py .build-admin-handler/
          cp transaction_logger.py .build-admin-handler/
          cp member-handler/provider_registry.py .build-admin-handler/
          cp member-handler/sts_assume_role.py .build-admin-handler/
          cd .build-admin-handler && zip -r ../admin-handler-lambda.zip . -q
          cd ..
          aws s3 cp admin-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/admin-handler.zip
          echo "✓ Admin Handler packaged"

      - name: Package Member Handler Lambda
        run: |
          echo "Packaging Member Handler Lambda..."
          pip install PyJWT bcrypt pyyaml cryptography -t .build-member-handler/ --quiet
          cp member-handler/lambda_function.py .build-member-handler/
          cp transaction_logger.py .build-member-handler/
          cp member-handler/provider_registry.py .build-member-handler/
          cp member-handler/sts_assume_role.py .build-member-handler/
          cp member-handler/invoice_sync.py .build-member-handler/
          cp member-handler/invoice_validation.py .build-member-handler/
          cp member-handler/invoice_drilldown.py .build-member-handler/
          cp member-handler/cache_service.py .build-member-handler/
          cp member-handler/cache_types.py .build-member-handler/
          cp member-handler/incremental_fetch_engine.py .build-member-handler/
          cp member-handler/intent_classifier.py .build-member-handler/
          cp member-handler/provider_router.py .build-member-handler/
          cp member-handler/parallel_executor.py .build-member-handler/
          cp member-handler/tips_cache.py .build-member-handler/
          cp member-handler/tips_filter.py .build-member-handler/
          cp member-handler/tip_citation.py .build-member-handler/
          cp member-handler/cost_cache.py .build-member-handler/
          cp member-handler/cost_normalizer.py .build-member-handler/
          cp member-handler/openai_rate_limits.py .build-member-handler/
          cp member-handler/openai_recommendations.py .build-member-handler/
          cp -r member-handler/hcl_generator .build-member-handler/hcl_generator
          cp -r member-handler/connectors .build-member-handler/connectors
          rm -rf .build-member-handler/connectors/__pycache__
          cd .build-member-handler && zip -r ../member-handler-lambda.zip . -q
          cd ..
          aws s3 cp member-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/member-handler.zip
          echo "✓ Member Handler packaged"

      - name: Package Agent Action Lambda
        run: |
          echo "Packaging Agent Action Lambda..."
          mkdir -p .build-agent-action/connectors
          mkdir -p .build-agent-action/schemas
          # Core modules
          cp agent-action/lambda_function.py .build-agent-action/
          cp agent-action/legacy_mapper.py .build-agent-action/
          cp agent-action/provider_router.py .build-agent-action/
          cp agent-action/response_normalizer.py .build-agent-action/
          # Connectors package
          cp agent-action/connectors/__init__.py .build-agent-action/connectors/
          cp agent-action/connectors/aws_connector.py .build-agent-action/connectors/
          cp agent-action/connectors/azure_connector.py .build-agent-action/connectors/
          cp agent-action/connectors/gcp_connector.py .build-agent-action/connectors/
          cp agent-action/connectors/ai_vendor_connector.py .build-agent-action/connectors/
          # Schemas (needed by deployment script)
          cp agent-action/schemas/*.json .build-agent-action/schemas/
          # Agent instructions
          cp agent-action/agent-instructions.txt .build-agent-action/
          # Legacy helpers (still used by some paths)
          cp member-handler/provider_registry.py .build-agent-action/ 2>/dev/null || true
          cp member-handler/sts_assume_role.py .build-agent-action/ 2>/dev/null || true
          cd .build-agent-action && zip -r ../agent-action-lambda.zip . -q
          cd ..
          aws s3 cp agent-action-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/agent-action.zip
          echo "✓ Agent Action packaged (vendor-neutral architecture)"

      - name: Package Scheduler Executor Lambda
        run: |
          echo "Packaging Scheduler Executor Lambda..."
          mkdir -p .build-scheduler-executor
          cp scheduler-executor/lambda_function.py .build-scheduler-executor/
          cd .build-scheduler-executor && zip -r ../scheduler-executor-lambda.zip . -q
          cd ..
          aws s3 cp scheduler-executor-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/scheduler-executor.zip
          echo "✓ Scheduler Executor packaged"

      - name: Package Tips Sync Lambda
        run: |
          echo "Packaging Tips Sync Lambda..."
          mkdir -p .build-tips-sync/sources
          mkdir -p .build-tips-sync/knowledge-base
          pip install -r tips-sync/requirements.txt -t .build-tips-sync/ --quiet
          cp tips-sync/lambda_function.py .build-tips-sync/
          cp tips-sync/models.py .build-tips-sync/
          cp tips-sync/sync_engine.py .build-tips-sync/
          cp tips-sync/metrics.py .build-tips-sync/
          cp tips-sync/sources/*.py .build-tips-sync/sources/
          cp knowledge-base/aws-cost-optimization-tips.json .build-tips-sync/knowledge-base/
          cp knowledge-base/azure-cost-optimization-tips.json .build-tips-sync/knowledge-base/
          cp knowledge-base/gcp-cost-optimization-tips.json .build-tips-sync/knowledge-base/
          cd .build-tips-sync && zip -r ../tips-sync-lambda.zip . -q
          cd ..
          aws s3 cp tips-sync-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/tips-sync.zip
          echo "✓ Tips Sync packaged"

      - name: Package Audit Evaluator Lambda
        run: |
          echo "Packaging Audit Evaluator Lambda..."
          mkdir -p .build-audit-evaluator
          cp audit-evaluator/lambda_function.py .build-audit-evaluator/
          cd .build-audit-evaluator && zip -r ../audit-evaluator-lambda.zip . -q
          cd ..
          aws s3 cp audit-evaluator-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/audit-evaluator.zip
          echo "✓ Audit Evaluator packaged"

      - name: Package OpenAI Sync Handler Lambda
        run: |
          echo "Packaging OpenAI Sync Handler Lambda..."
          pip install boto3 -t .build-openai-sync/ --quiet
          cp openai-sync-handler/lambda_function.py .build-openai-sync/
          cd .build-openai-sync && zip -r ../openai-sync-lambda.zip . -q
          cd ..
          aws s3 cp openai-sync-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/openai-sync.zip
          echo "✓ OpenAI Sync Handler packaged"

      - name: Package Dashboard Handler Lambda
        run: |
          echo "Packaging Dashboard Handler Lambda..."
          pip install -r dashboard-handler/requirements.txt -t .build-dashboard-handler/ --quiet
          cp dashboard-handler/*.py .build-dashboard-handler/
          cd .build-dashboard-handler && zip -r ../dashboard-handler-lambda.zip . -q
          cd ..
          aws s3 cp dashboard-handler-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/dashboard-handler.zip
          echo "✓ Dashboard Handler packaged"

      - name: Package Daily Refresh Lambda
        run: |
          echo "Packaging Daily Refresh Lambda..."
          mkdir -p .build-daily-refresh
          cp daily-refresh-handler/lambda_function.py .build-daily-refresh/
          cd .build-daily-refresh && zip -r ../daily-refresh-lambda.zip . -q
          cd ..
          aws s3 cp daily-refresh-lambda.zip s3://${{ env.STORAGE_BUCKET }}/lambda-packages/daily-refresh.zip
          echo "✓ Daily Refresh packaged"

      - name: Deploy SlashMyBill CloudFormation stack
        continue-on-error: true
        run: |
          echo "Deploying SlashMyBill infrastructure..."
          aws cloudformation deploy \
            --template-file infrastructure/viewmybill-stack.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --s3-bucket ${{ env.STORAGE_BUCKET }} \
            --s3-prefix cloudformation-templates \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              AdminUsername='${{ secrets.ADMIN_USERNAME }}' \
              AdminPasswordHash='${{ secrets.ADMIN_PASSWORD_HASH }}' \
              JWTSecret='${{ secrets.JWT_SECRET }}' \
            --tags Project=ViewMyBill || echo "⚠ CloudFormation deploy failed (stack in UPDATE_ROLLBACK_COMPLETE) — continuing with direct CLI steps"
          echo "✓ Infrastructure step complete"

      - name: Deploy Dashboard Handler CloudFormation stack
        continue-on-error: true
        run: |
          echo "Deploying Dashboard Handler infrastructure..."
          # Delete the stack if stuck in ROLLBACK_COMPLETE (previous create failed)
          STACK_STATUS=$(aws cloudformation describe-stacks --stack-name dashboard-handler-stack --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack in ROLLBACK_COMPLETE — deleting before re-create..."
            aws cloudformation delete-stack --stack-name dashboard-handler-stack
            aws cloudformation wait stack-delete-complete --stack-name dashboard-handler-stack
            echo "✓ Old stack deleted"
          fi
          # Get existing table ARNs
          COST_ARN="arn:aws:dynamodb:us-east-1:991105135552:table/Cost_Cache_Table"
          INV_ARN="arn:aws:dynamodb:us-east-1:991105135552:table/MemberPortal-Invoices"
          ACC_ARN="arn:aws:dynamodb:us-east-1:991105135552:table/MemberPortal-Accounts"
          API_ID=$(aws cloudformation describe-stacks --stack-name ${{ env.STACK_NAME }} --query "Stacks[0].Outputs[?OutputKey=='ApiId'].OutputValue" --output text 2>/dev/null || echo "l2fd4h481h")
          aws cloudformation deploy \
            --template-file infrastructure/dashboard-stack.yaml \
            --stack-name dashboard-handler-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ExistingApiId="$API_ID" \
              CostCacheTableArn="$COST_ARN" \
              InvoicesTableArn="$INV_ARN" \
              AccountsTableArn="$ACC_ARN" \
              CognitoUserPoolId=us-east-1_FlR2CmFu0 \
              CognitoRegion=us-east-1 \
              JWTSecret='${{ secrets.JWT_SECRET }}' \
            --tags Project=ViewMyBill Feature=WidgetBuilderDashboard || echo "⚠ Dashboard stack deploy failed (non-fatal)"
          echo "✓ Dashboard Handler infrastructure step complete"

      - name: Ensure MemberPortal-Invoices DynamoDB table exists
        continue-on-error: true
        run: |
          if aws dynamodb describe-table --table-name MemberPortal-Invoices > /dev/null 2>&1; then
            echo "✓ MemberPortal-Invoices table already exists"
          else
            echo "Creating MemberPortal-Invoices table..."
            aws dynamodb create-table \
              --table-name MemberPortal-Invoices \
              --attribute-definitions \
                AttributeName=pk,AttributeType=S \
                AttributeName=sk,AttributeType=S \
                AttributeName=month,AttributeType=S \
              --key-schema \
                AttributeName=pk,KeyType=HASH \
                AttributeName=sk,KeyType=RANGE \
              --global-secondary-indexes '[{"IndexName":"month-index","KeySchema":[{"AttributeName":"pk","KeyType":"HASH"},{"AttributeName":"month","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
              --billing-mode PAY_PER_REQUEST \
              --tags Key=Project,Value=ViewMyBill
            echo "Waiting for table to become active..."
            aws dynamodb wait table-exists --table-name MemberPortal-Invoices
            aws dynamodb update-time-to-live \
              --table-name MemberPortal-Invoices \
              --time-to-live-specification Enabled=true,AttributeName=ttl
            echo "✓ MemberPortal-Invoices table created with TTL"
          fi

      - name: Ensure Cost_Cache_Table DynamoDB table exists
        continue-on-error: true
        run: |
          if aws dynamodb describe-table --table-name Cost_Cache_Table > /dev/null 2>&1; then
            echo "✓ Cost_Cache_Table already exists"
          else
            echo "Creating Cost_Cache_Table..."
            aws dynamodb create-table \
              --table-name Cost_Cache_Table \
              --attribute-definitions \
                AttributeName=pk,AttributeType=S \
                AttributeName=sk,AttributeType=S \
              --key-schema \
                AttributeName=pk,KeyType=HASH \
                AttributeName=sk,KeyType=RANGE \
              --billing-mode PAY_PER_REQUEST \
              --sse-specification Enabled=true \
              --tags Key=Project,Value=ViewMyBill
            echo "Waiting for table to become active..."
            aws dynamodb wait table-exists --table-name Cost_Cache_Table
            aws dynamodb update-time-to-live \
              --table-name Cost_Cache_Table \
              --time-to-live-specification Enabled=true,AttributeName=ttl
            echo "✓ Cost_Cache_Table created with TTL"
          fi

      - name: Ensure Audit_Transaction_Log DynamoDB table exists
        continue-on-error: true
        run: |
          if aws dynamodb describe-table --table-name Audit_Transaction_Log > /dev/null 2>&1; then
            echo "✓ Audit_Transaction_Log table already exists"
          else
            echo "Creating Audit_Transaction_Log table..."
            aws dynamodb create-table \
              --table-name Audit_Transaction_Log \
              --attribute-definitions \
                AttributeName=transaction_id,AttributeType=S \
                AttributeName=start_timestamp,AttributeType=S \
                AttributeName=user_email,AttributeType=S \
                AttributeName=function_name,AttributeType=S \
              --key-schema \
                AttributeName=transaction_id,KeyType=HASH \
                AttributeName=start_timestamp,KeyType=RANGE \
              --global-secondary-indexes \
                '[{"IndexName":"user-email-index","KeySchema":[{"AttributeName":"user_email","KeyType":"HASH"},{"AttributeName":"start_timestamp","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}},{"IndexName":"function-name-index","KeySchema":[{"AttributeName":"function_name","KeyType":"HASH"},{"AttributeName":"start_timestamp","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
              --billing-mode PAY_PER_REQUEST \
              --stream-specification StreamEnabled=true,StreamViewType=NEW_IMAGE \
              --tags Key=Project,Value=ViewMyBill
            echo "Waiting for table to become active..."
            aws dynamodb wait table-exists --table-name Audit_Transaction_Log
            aws dynamodb update-time-to-live \
              --table-name Audit_Transaction_Log \
              --time-to-live-specification Enabled=true,AttributeName=expiry_ttl
            echo "✓ Audit_Transaction_Log table created with GSIs, Stream, and TTL"
          fi

      - name: Ensure AgentAction Lambda role exists
        continue-on-error: true
        run: |
          # The AgentActionRole was deleted during CloudFormation rollback.
          # Recreate it if missing so the Lambda can be configured.
          ROLE_NAME="SlashMyBill-AgentAction-Role"
          if aws iam get-role --role-name "$ROLE_NAME" > /dev/null 2>&1; then
            echo "✓ $ROLE_NAME already exists"
          else
            echo "Creating $ROLE_NAME..."
            aws iam create-role \
              --role-name "$ROLE_NAME" \
              --assume-role-policy-document '{
                "Version": "2012-10-17",
                "Statement": [{
                  "Effect": "Allow",
                  "Principal": {"Service": "lambda.amazonaws.com"},
                  "Action": "sts:AssumeRole"
                }]
              }' \
              --tags Key=Project,Value=ViewMyBill > /dev/null
            aws iam attach-role-policy \
              --role-name "$ROLE_NAME" \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            aws iam put-role-policy \
              --role-name "$ROLE_NAME" \
              --policy-name "AgentActionPermissions" \
