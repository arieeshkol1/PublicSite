name: Deploy Website to S3

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'styles.css'
      - '*.js'
      - '*.css'
      - '*.html'
      - '*.png'
      - '*.jpg'
      - '*.jpeg'
      - '*.gif'
      - '*.svg'
      - '*.ico'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: www.eshkolai.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy website files to S3
        run: |
          echo "Deploying website files to S3..."
          aws s3 cp index.html s3://${{ env.S3_BUCKET }}/ --cache-control "max-age=300"
          aws s3 cp styles.css s3://${{ env.S3_BUCKET }}/ --cache-control "max-age=86400"
          
          # Deploy additional HTML files
          for file in *.html; do
            if [ "$file" != "index.html" ]; then
              echo "Deploying $file..."
              aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "max-age=300"
            fi
          done
          
          # Deploy JavaScript files
          for file in *.js; do
            if [ -f "$file" ]; then
              echo "Deploying $file..."
              aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "max-age=86400" --content-type "application/javascript"
            fi
          done
          
          # Deploy image files
          for file in *.png *.jpg *.jpeg *.gif *.svg *.ico; do
            if [ -f "$file" ]; then
              echo "Deploying $file..."
              aws s3 cp "$file" s3://${{ env.S3_BUCKET }}/ --cache-control "max-age=2592000"
            fi
          done
          
          echo "✓ Deployment complete!"

      - name: Verify deployment
        run: |
          echo "Verifying files in S3..."
          aws s3 ls s3://${{ env.S3_BUCKET }}/ --human-readable
          echo "✓ Verification complete!"

      - name: Get CloudFront distribution ID
        id: get-cf-id
        run: |
          # Try to get CloudFront ID from CloudFormation stack first
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name eshkolai-com-website-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
            --output text 2>/dev/null || echo "")
          
          # If not found in stack, search by alias
          if [ -z "$DIST_ID" ]; then
            DIST_ID=$(aws cloudfront list-distributions \
              --query "DistributionList.Items[?Aliases.Items[0]=='www.eshkolai.com'].Id" \
              --output text)
          fi
          
          if [ -n "$DIST_ID" ]; then
            echo "CloudFront distribution found: $DIST_ID"
            echo "dist_id=$DIST_ID" >> $GITHUB_OUTPUT
            echo "has_cloudfront=true" >> $GITHUB_OUTPUT
          else
            echo "No CloudFront distribution found"
            echo "has_cloudfront=false" >> $GITHUB_OUTPUT
          fi

      - name: Invalidate CloudFront cache
        if: steps.get-cf-id.outputs.has_cloudfront == 'true'
        run: |
          echo "Invalidating CloudFront cache..."
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.get-cf-id.outputs.dist_id }} \
            --paths "/*"
          echo "✓ CloudFront cache invalidated"

      - name: Deployment summary
        run: |
          echo "=== Deployment Summary ==="
          echo "Bucket: ${{ env.S3_BUCKET }}"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Files deployed: All HTML, CSS, JS, and image files"
          if [ "${{ steps.get-cf-id.outputs.has_cloudfront }}" == "true" ]; then
            echo "CloudFront: Cache invalidated"
          fi
          echo "Status: Success ✓"
