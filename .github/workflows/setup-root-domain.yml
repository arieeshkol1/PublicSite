name: Setup Root Domain (eshkolai.com)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: us-east-1

      - name: Check current SSL certificate
        id: check-cert
        run: |
          # Get current CloudFront config
          aws cloudfront get-distribution-config --id E12JIHGHK40OLE > cf-config-full.json
          
          ETAG=$(cat cf-config-full.json | jq -r '.ETag')
          echo "ETAG=$ETAG" >> $GITHUB_OUTPUT
          
          cat cf-config-full.json | jq '.DistributionConfig' > cf-config.json
          
          CERT_ARN=$(cat cf-config.json | jq -r '.ViewerCertificate.ACMCertificateArn')
          echo "Current cert: $CERT_ARN"
          echo "CERT_ARN=$CERT_ARN" >> $GITHUB_OUTPUT
          
          # Check if cert covers eshkolai.com
          SANS=$(aws acm describe-certificate --certificate-arn $CERT_ARN \
            --query "Certificate.SubjectAlternativeNames" --output text 2>/dev/null || echo "")
          echo "SANs: $SANS"
          
          if echo "$SANS" | grep -qw "eshkolai.com"; then
            echo "NEEDS_NEW_CERT=false" >> $GITHUB_OUTPUT
            echo "Certificate already covers eshkolai.com"
          else
            echo "NEEDS_NEW_CERT=true" >> $GITHUB_OUTPUT
            echo "Need new certificate for eshkolai.com"
          fi

      - name: Request new certificate if needed
        id: new-cert
        if: steps.check-cert.outputs.NEEDS_NEW_CERT == 'true'
        run: |
          echo "Requesting certificate for eshkolai.com + www.eshkolai.com..."
          NEW_CERT_ARN=$(aws acm request-certificate \
            --domain-name "eshkolai.com" \
            --subject-alternative-names "www.eshkolai.com" \
            --validation-method DNS \
            --query 'CertificateArn' \
            --output text)
          echo "NEW_CERT_ARN=$NEW_CERT_ARN" >> $GITHUB_OUTPUT
          echo "New cert: $NEW_CERT_ARN"
          
          sleep 15
          
          # Add DNS validation records
          VALIDATIONS=$(aws acm describe-certificate \
            --certificate-arn $NEW_CERT_ARN \
            --query "Certificate.DomainValidationOptions" \
            --output json)
          
          for row in $(echo "$VALIDATIONS" | jq -c '.[]'); do
            RNAME=$(echo $row | jq -r '.ResourceRecord.Name')
            RVALUE=$(echo $row | jq -r '.ResourceRecord.Value')
            echo "Adding validation: $RNAME -> $RVALUE"
            
            cat > /tmp/dns-change.json << EOF
          {
            "Changes": [{
              "Action": "UPSERT",
              "ResourceRecordSet": {
                "Name": "$RNAME",
                "Type": "CNAME",
                "TTL": 300,
                "ResourceRecords": [{"Value": "$RVALUE"}]
              }
            }]
          }
          EOF
            aws route53 change-resource-record-sets \
              --hosted-zone-id Z07144662HMOSSEBOKGII \
              --change-batch file:///tmp/dns-change.json
          done
          
          echo "Waiting for certificate validation (up to 5 min)..."
          for i in $(seq 1 30); do
            STATUS=$(aws acm describe-certificate \
              --certificate-arn $NEW_CERT_ARN \
              --query "Certificate.Status" \
              --output text)
            echo "  Status: $STATUS"
            if [ "$STATUS" = "ISSUED" ]; then
              echo "Certificate issued!"
              break
            fi
            sleep 10
          done

      - name: Determine certificate ARN
        id: final-cert
        run: |
          if [ "${{ steps.check-cert.outputs.NEEDS_NEW_CERT }}" == "true" ]; then
            echo "CERT=${{ steps.new-cert.outputs.NEW_CERT_ARN }}" >> $GITHUB_OUTPUT
          else
            echo "CERT=${{ steps.check-cert.outputs.CERT_ARN }}" >> $GITHUB_OUTPUT
          fi

      - name: Add eshkolai.com to CloudFront
        run: |
          ETAG="${{ steps.check-cert.outputs.ETAG }}"
          CERT_ARN="${{ steps.final-cert.outputs.CERT }}"
          
          # Check if already added
          ALIASES=$(cat cf-config.json | jq -r '.Aliases.Items[]' 2>/dev/null || echo "")
          if echo "$ALIASES" | grep -qw "eshkolai.com"; then
            echo "eshkolai.com already in CloudFront"
          else
            echo "Adding eshkolai.com to CloudFront..."
            
            # Update aliases
            cat cf-config.json | jq \
              --arg cert "$CERT_ARN" \
              '.Aliases = {"Quantity": 2, "Items": ["www.eshkolai.com", "eshkolai.com"]} | .ViewerCertificate.ACMCertificateArn = $cert' \
              > updated-config.json
            
            aws cloudfront update-distribution \
              --id E12JIHGHK40OLE \
              --if-match $ETAG \
              --distribution-config file://updated-config.json
            
            echo "CloudFront updated!"
          fi

      - name: Ensure Route 53 A record exists
        run: |
          cat > /tmp/a-record.json << 'EOF'
          {
            "Changes": [{
              "Action": "UPSERT",
              "ResourceRecordSet": {
                "Name": "eshkolai.com",
                "Type": "A",
                "AliasTarget": {
                  "HostedZoneId": "Z2FDTNDATAQYW2",
                  "DNSName": "d13k71im98zj35.cloudfront.net",
                  "EvaluateTargetHealth": false
                }
              }
            }]
          }
          EOF
          
          aws route53 change-resource-record-sets \
            --hosted-zone-id Z07144662HMOSSEBOKGII \
            --change-batch file:///tmp/a-record.json
          
          echo "Route 53 A record set for eshkolai.com"

      - name: Summary
        run: |
          echo "=========================================="
          echo "Root Domain Setup Complete!"
          echo "=========================================="
          echo "eshkolai.com now points to CloudFront"
          echo "DNS may take a few minutes to propagate"
          echo "=========================================="
