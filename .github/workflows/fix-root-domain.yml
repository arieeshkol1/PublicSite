name: Fix Root Domain SSL

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: us-east-1

      - name: Request new certificate for both domains
        id: new-cert
        run: |
          echo "=== Checking for certificate covering BOTH eshkolai.com and www.eshkolai.com ==="
          
          EXISTING=""
          for ARN in $(aws acm list-certificates --certificate-statuses ISSUED --query "CertificateSummaryList[*].CertificateArn" --output text); do
            # Get SANs as JSON array for exact matching
            SANS_JSON=$(aws acm describe-certificate --certificate-arn $ARN \
              --query "Certificate.SubjectAlternativeNames" --output json)
            echo "Cert $ARN SANs: $SANS_JSON"
            
            # Check for EXACT match - must have eshkolai.com (not just www.eshkolai.com)
            HAS_ROOT=$(echo "$SANS_JSON" | jq -r '.[] | select(. == "eshkolai.com")' | head -1)
            HAS_WWW=$(echo "$SANS_JSON" | jq -r '.[] | select(. == "www.eshkolai.com")' | head -1)
            
            if [ "$HAS_ROOT" = "eshkolai.com" ] && [ "$HAS_WWW" = "www.eshkolai.com" ]; then
              EXISTING=$ARN
              echo "Found existing cert covering BOTH domains: $ARN"
              break
            else
              echo "  -> Skipping: root=$HAS_ROOT www=$HAS_WWW (need both)"
            fi
          done
          
          if [ -n "$EXISTING" ]; then
            echo "CERT_ARN=$EXISTING" >> $GITHUB_OUTPUT
            echo "Using existing cert: $EXISTING"
            echo "NEED_WAIT=false" >> $GITHUB_OUTPUT
          else
            # Check pending certs
            for ARN in $(aws acm list-certificates --certificate-statuses PENDING_VALIDATION --query "CertificateSummaryList[*].CertificateArn" --output text 2>/dev/null); do
              SANS_JSON=$(aws acm describe-certificate --certificate-arn $ARN \
                --query "Certificate.SubjectAlternativeNames" --output json)
              HAS_ROOT=$(echo "$SANS_JSON" | jq -r '.[] | select(. == "eshkolai.com")' | head -1)
              if [ "$HAS_ROOT" = "eshkolai.com" ]; then
                echo "Found pending cert covering eshkolai.com: $ARN"
                echo "CERT_ARN=$ARN" >> $GITHUB_OUTPUT
                echo "NEED_WAIT=true" >> $GITHUB_OUTPUT
                exit 0
              fi
            done
            
            echo "No existing cert covers both domains. Requesting new certificate..."
            NEW_ARN=$(aws acm request-certificate \
              --domain-name "eshkolai.com" \
              --subject-alternative-names "www.eshkolai.com" \
              --validation-method DNS \
              --query 'CertificateArn' \
              --output text)
            echo "New cert ARN: $NEW_ARN"
            echo "CERT_ARN=$NEW_ARN" >> $GITHUB_OUTPUT
            echo "NEED_WAIT=true" >> $GITHUB_OUTPUT
          fi

      - name: Add DNS validation records
        if: steps.new-cert.outputs.NEED_WAIT == 'true'
        run: |
          CERT_ARN="${{ steps.new-cert.outputs.CERT_ARN }}"
          echo "Adding DNS validation for: $CERT_ARN"
          
          sleep 10
          
          aws acm describe-certificate --certificate-arn $CERT_ARN \
            --query "Certificate.DomainValidationOptions" --output json > validations.json
          
          cat validations.json
          
          cat validations.json | jq -c '.[]' | while read row; do
            RNAME=$(echo $row | jq -r '.ResourceRecord.Name // empty')
            RVALUE=$(echo $row | jq -r '.ResourceRecord.Value // empty')
            if [ -n "$RNAME" ] && [ -n "$RVALUE" ]; then
              echo "Adding CNAME: $RNAME -> $RVALUE"
              cat > /tmp/change.json << EOFX
          {"Changes":[{"Action":"UPSERT","ResourceRecordSet":{"Name":"${RNAME}","Type":"CNAME","TTL":300,"ResourceRecords":[{"Value":"${RVALUE}"}]}}]}
          EOFX
              aws route53 change-resource-record-sets \
                --hosted-zone-id Z07144662HMOSSEBOKGII \
                --change-batch file:///tmp/change.json || true
            fi
          done

      - name: Wait for certificate to be issued
        if: steps.new-cert.outputs.NEED_WAIT == 'true'
        run: |
          CERT_ARN="${{ steps.new-cert.outputs.CERT_ARN }}"
          echo "Waiting for certificate to be issued..."
          
          for i in $(seq 1 60); do
            STATUS=$(aws acm describe-certificate --certificate-arn $CERT_ARN \
              --query "Certificate.Status" --output text)
            echo "  Attempt $i/60: $STATUS"
            if [ "$STATUS" = "ISSUED" ]; then
              echo "Certificate issued!"
              exit 0
            fi
            sleep 10
          done
          
          echo "ERROR: Certificate still not issued after 10 minutes"
          echo "Current status: $STATUS"
          aws acm describe-certificate --certificate-arn $CERT_ARN --output json
          exit 1

      - name: Update CloudFront with new certificate
        run: |
          CERT_ARN="${{ steps.new-cert.outputs.CERT_ARN }}"
          
          # Verify cert is issued
          STATUS=$(aws acm describe-certificate --certificate-arn $CERT_ARN \
            --query "Certificate.Status" --output text)
          echo "Certificate status: $STATUS"
          
          if [ "$STATUS" != "ISSUED" ]; then
            echo "ERROR: Certificate not issued yet. Run again later."
            exit 1
          fi
          
          echo "Updating CloudFront distribution..."
          
          aws cloudfront get-distribution-config --id E12JIHGHK40OLE > cf-full.json
          ETAG=$(cat cf-full.json | jq -r '.ETag')
          cat cf-full.json | jq '.DistributionConfig' > cf-config.json
          
          echo "Before:"
          cat cf-config.json | jq '{Aliases: .Aliases, Cert: .ViewerCertificate.ACMCertificateArn}'
          
          cat cf-config.json | jq \
            --arg cert "$CERT_ARN" \
            '.Aliases = {"Quantity": 2, "Items": ["www.eshkolai.com", "eshkolai.com"]} | .ViewerCertificate.ACMCertificateArn = $cert' \
            > updated.json
          
          echo "After:"
          cat updated.json | jq '{Aliases: .Aliases, Cert: .ViewerCertificate.ACMCertificateArn}'
          
          aws cloudfront update-distribution \
            --id E12JIHGHK40OLE \
            --if-match $ETAG \
            --distribution-config file://updated.json
          
          echo "CloudFront updated! Will take 5-15 minutes to deploy."

      - name: Ensure Route 53 A record
        run: |
          aws route53 change-resource-record-sets \
            --hosted-zone-id Z07144662HMOSSEBOKGII \
            --change-batch '{
              "Changes": [{
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "eshkolai.com",
                  "Type": "A",
                  "AliasTarget": {
                    "HostedZoneId": "Z2FDTNDATAQYW2",
                    "DNSName": "d13k71im98zj35.cloudfront.net",
                    "EvaluateTargetHealth": false
                  }
                }
              }]
            }'

      - name: Done
        run: |
          echo "=========================================="
          echo "Root domain fix complete!"
          echo "Certificate: ${{ steps.new-cert.outputs.CERT_ARN }}"
          echo "CloudFront deploying - wait 5-15 minutes"
          echo "Then eshkolai.com should work!"
          echo "=========================================="
