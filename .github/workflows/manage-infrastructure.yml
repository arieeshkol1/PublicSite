name: Manage Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What do you want to do?'
        required: true
        type: choice
        options:
          - check-status
          - deploy-stack
          - update-stack
          - delete-stack
          - fix-root-domain-ssl
          - setup-cloudfront-https
          - setup-root-domain
          - deploy-contact-form
          - setup-root-domain-redirect

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: www.eshkolai.com
  HOSTED_ZONE_ID: Z07144662HMOSSEBOKGII
  CLOUDFRONT_ID: E12JIHGHK40OLE
  CLOUDFRONT_DOMAIN: d13k71im98zj35.cloudfront.net
  STACK_NAME: eshkolai-com-website-stack
  DOMAIN_NAME: www.eshkolai.com
  ROOT_DOMAIN: eshkolai.com

jobs:
  # ─── Check Status ───
  check-status:
    if: github.event.inputs.action == 'check-status'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Check CloudFront distribution
        run: |
          echo "=== CloudFront Distribution ==="
          aws cloudfront get-distribution --id ${{ env.CLOUDFRONT_ID }} \
            --query "Distribution.{Status:Status,DomainName:DomainName,Aliases:DistributionConfig.Aliases,CertARN:DistributionConfig.ViewerCertificate.ACMCertificateArn}" \
            --output json

      - name: Check ALL certificates
        run: |
          echo "=== All ACM Certificates ==="
          for CERT in $(aws acm list-certificates --query "CertificateSummaryList[*].CertificateArn" --output text); do
            echo "--- Certificate: $CERT ---"
            aws acm describe-certificate --certificate-arn $CERT \
              --query "Certificate.{Domain:DomainName,SANs:SubjectAlternativeNames,Status:Status,Type:Type}" --output json
          done

      - name: Check Route 53 records
        run: |
          echo "=== Route 53 Records ==="
          aws route53 list-resource-record-sets --hosted-zone-id ${{ env.HOSTED_ZONE_ID }} --output json

      - name: Test DNS resolution
        run: |
          echo "=== DNS Resolution ==="
          echo "${{ env.ROOT_DOMAIN }}:"
          dig ${{ env.ROOT_DOMAIN }} +short || echo "dig not available"
          echo "${{ env.DOMAIN_NAME }}:"
          dig ${{ env.DOMAIN_NAME }} +short || echo "dig not available"

      - name: Check CloudFormation stack
        run: |
          echo "=== CloudFormation Stack ==="
          aws cloudformation describe-stacks --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].{Status:StackStatus,Outputs:Outputs}' --output json 2>/dev/null || echo "Stack not found"

  # ─── Deploy/Update/Delete CloudFormation Stack ───
  deploy-stack:
    if: github.event.inputs.action == 'deploy-stack' || github.event.inputs.action == 'update-stack'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if stack exists
        id: check-stack
        run: |
          if aws cloudformation describe-stacks --stack-name ${{ env.STACK_NAME }} 2>/dev/null; then
            echo "stack_exists=true" >> $GITHUB_OUTPUT
          else
            echo "stack_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create or Update Stack
        run: |
          if [ "${{ steps.check-stack.outputs.stack_exists }}" == "true" ]; then
            echo "Updating stack..."
            UPDATE_OUTPUT=$(aws cloudformation update-stack \
              --stack-name ${{ env.STACK_NAME }} \
              --template-body file://infrastructure/unified-stack.yaml \
              --capabilities CAPABILITY_IAM 2>&1) || true
            if echo "$UPDATE_OUTPUT" | grep -q "No updates are to be performed"; then
              echo "✓ No updates needed"
              exit 0
            fi
            echo "Waiting for update..."
            aws cloudformation wait stack-update-complete --stack-name ${{ env.STACK_NAME }}
          else
            echo "Creating stack..."
            aws cloudformation create-stack \
              --stack-name ${{ env.STACK_NAME }} \
              --template-body file://infrastructure/unified-stack.yaml \
              --capabilities CAPABILITY_IAM \
              --tags Key=ManagedBy,Value=CloudFormation Key=Project,Value=EshkolaiWebsite
            echo "Waiting for creation (20-40 min)..."
            aws cloudformation wait stack-create-complete --stack-name ${{ env.STACK_NAME }}
          fi
          echo "✓ Done"

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' --output table

  delete-stack:
    if: github.event.inputs.action == 'delete-stack'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete Stack
        run: |
          echo "WARNING: Deleting all resources (S3, CloudFront, Certificate, DNS)"
          aws cloudformation delete-stack --stack-name ${{ env.STACK_NAME }}
          aws cloudformation wait stack-delete-complete --stack-name ${{ env.STACK_NAME }}
          echo "✓ Stack deleted"

  # ─── Fix Root Domain SSL ───
  fix-root-domain-ssl:
    if: github.event.inputs.action == 'fix-root-domain-ssl'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Find or request certificate for both domains
        id: cert
        run: |
          EXISTING=""
          for ARN in $(aws acm list-certificates --certificate-statuses ISSUED --query "CertificateSummaryList[*].CertificateArn" --output text); do
            SANS_JSON=$(aws acm describe-certificate --certificate-arn $ARN --query "Certificate.SubjectAlternativeNames" --output json)
            HAS_ROOT=$(echo "$SANS_JSON" | jq -r '.[] | select(. == "eshkolai.com")' | head -1)
            HAS_WWW=$(echo "$SANS_JSON" | jq -r '.[] | select(. == "www.eshkolai.com")' | head -1)
            if [ "$HAS_ROOT" = "eshkolai.com" ] && [ "$HAS_WWW" = "www.eshkolai.com" ]; then
              EXISTING=$ARN; break
            fi
          done

          if [ -n "$EXISTING" ]; then
            echo "cert_arn=$EXISTING" >> $GITHUB_OUTPUT
            echo "need_wait=false" >> $GITHUB_OUTPUT
          else
            echo "Requesting new certificate..."
            NEW_ARN=$(aws acm request-certificate --domain-name "eshkolai.com" \
              --subject-alternative-names "www.eshkolai.com" --validation-method DNS \
              --query 'CertificateArn' --output text)
            echo "cert_arn=$NEW_ARN" >> $GITHUB_OUTPUT
            echo "need_wait=true" >> $GITHUB_OUTPUT
          fi

      - name: Add DNS validation records
        if: steps.cert.outputs.need_wait == 'true'
        run: |
          sleep 10
          aws acm describe-certificate --certificate-arn ${{ steps.cert.outputs.cert_arn }} \
            --query "Certificate.DomainValidationOptions" --output json | jq -c '.[]' | while read row; do
            RNAME=$(echo $row | jq -r '.ResourceRecord.Name // empty')
            RVALUE=$(echo $row | jq -r '.ResourceRecord.Value // empty')
            if [ -n "$RNAME" ] && [ -n "$RVALUE" ]; then
              echo '{"Changes":[{"Action":"UPSERT","ResourceRecordSet":{"Name":"'$RNAME'","Type":"CNAME","TTL":300,"ResourceRecords":[{"Value":"'$RVALUE'"}]}}]}' > /tmp/change.json
              aws route53 change-resource-record-sets --hosted-zone-id ${{ env.HOSTED_ZONE_ID }} --change-batch file:///tmp/change.json || true
            fi
          done

      - name: Wait for certificate
        if: steps.cert.outputs.need_wait == 'true'
        run: |
          for i in $(seq 1 60); do
            STATUS=$(aws acm describe-certificate --certificate-arn ${{ steps.cert.outputs.cert_arn }} --query "Certificate.Status" --output text)
            echo "Attempt $i/60: $STATUS"
            [ "$STATUS" = "ISSUED" ] && exit 0
            sleep 10
          done
          echo "ERROR: Certificate not issued after 10 minutes"; exit 1

      - name: Update CloudFront with certificate
        run: |
          STATUS=$(aws acm describe-certificate --certificate-arn ${{ steps.cert.outputs.cert_arn }} --query "Certificate.Status" --output text)
          [ "$STATUS" != "ISSUED" ] && echo "Certificate not issued" && exit 1

          aws cloudfront get-distribution-config --id ${{ env.CLOUDFRONT_ID }} > cf-full.json
          ETAG=$(jq -r '.ETag' cf-full.json)
          jq '.DistributionConfig' cf-full.json | jq --arg cert "${{ steps.cert.outputs.cert_arn }}" \
            '.Aliases = {"Quantity": 2, "Items": ["www.eshkolai.com", "eshkolai.com"]} | .ViewerCertificate.ACMCertificateArn = $cert' > updated.json
          aws cloudfront update-distribution --id ${{ env.CLOUDFRONT_ID }} --if-match $ETAG --distribution-config file://updated.json
          echo "✓ CloudFront updated"

      - name: Ensure Route 53 A record
        run: |
          aws route53 change-resource-record-sets --hosted-zone-id ${{ env.HOSTED_ZONE_ID }} --change-batch '{
            "Changes": [{"Action": "UPSERT", "ResourceRecordSet": {
              "Name": "eshkolai.com", "Type": "A",
              "AliasTarget": {"HostedZoneId": "Z2FDTNDATAQYW2", "DNSName": "'${{ env.CLOUDFRONT_DOMAIN }}'", "EvaluateTargetHealth": false}
            }}]}'
          echo "✓ Root domain fix complete"

  # ─── Setup CloudFront HTTPS ───
  setup-cloudfront-https:
    if: github.event.inputs.action == 'setup-cloudfront-https'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Request or find SSL certificate
        id: cert
        run: |
          CERT_ARN=$(aws acm list-certificates --query "CertificateSummaryList[?DomainName=='${{ env.DOMAIN_NAME }}'].CertificateArn" --output text)
          if [ -n "$CERT_ARN" ]; then
            echo "cert_arn=$CERT_ARN" >> $GITHUB_OUTPUT
          else
            CERT_ARN=$(aws acm request-certificate --domain-name ${{ env.DOMAIN_NAME }} --validation-method DNS --query 'CertificateArn' --output text)
            echo "cert_arn=$CERT_ARN" >> $GITHUB_OUTPUT
            sleep 10
          fi

      - name: DNS validation
        run: |
          VALIDATION=$(aws acm describe-certificate --certificate-arn ${{ steps.cert.outputs.cert_arn }} --query 'Certificate.DomainValidationOptions[0].ResourceRecord' --output json)
          RNAME=$(echo $VALIDATION | jq -r '.Name')
          RVALUE=$(echo $VALIDATION | jq -r '.Value')
          echo '{"Changes":[{"Action":"UPSERT","ResourceRecordSet":{"Name":"'$RNAME'","Type":"CNAME","TTL":300,"ResourceRecords":[{"Value":"'$RVALUE'"}]}}]}' > change.json
          aws route53 change-resource-record-sets --hosted-zone-id ${{ env.HOSTED_ZONE_ID }} --change-batch file://change.json

      - name: Wait for certificate
        run: |
          for i in $(seq 1 60); do
            STATUS=$(aws acm describe-certificate --certificate-arn ${{ steps.cert.outputs.cert_arn }} --query 'Certificate.Status' --output text)
            echo "Status: $STATUS ($i/60)"
            [ "$STATUS" = "ISSUED" ] && exit 0
            [ "$STATUS" = "FAILED" ] && exit 1
            sleep 30
          done
          exit 1

      - name: Create or verify CloudFront distribution
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items[0]=='${{ env.DOMAIN_NAME }}'].Id" --output text)
          if [ -n "$DIST_ID" ]; then
            echo "CloudFront already exists: $DIST_ID"
          else
            echo "Create CloudFront via deploy-stack action instead"
          fi

      - name: Update Route 53 CNAME
        run: |
          echo '{"Changes":[{"Action":"UPSERT","ResourceRecordSet":{"Name":"${{ env.DOMAIN_NAME }}","Type":"CNAME","TTL":300,"ResourceRecords":[{"Value":"${{ env.CLOUDFRONT_DOMAIN }}"}]}}]}' > change.json
          aws route53 change-resource-record-sets --hosted-zone-id ${{ env.HOSTED_ZONE_ID }} --change-batch file://change.json
          echo "✓ HTTPS setup complete"

  # ─── Setup Root Domain ───
  setup-root-domain:
    if: github.event.inputs.action == 'setup-root-domain'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Check and setup certificate
        id: cert
        run: |
          aws cloudfront get-distribution-config --id ${{ env.CLOUDFRONT_ID }} > cf-full.json
          ETAG=$(jq -r '.ETag' cf-full.json)
          echo "ETAG=$ETAG" >> $GITHUB_OUTPUT
          jq '.DistributionConfig' cf-full.json > cf-config.json

          CERT_ARN=$(jq -r '.ViewerCertificate.ACMCertificateArn' cf-config.json)
          SANS=$(aws acm describe-certificate --certificate-arn $CERT_ARN --query "Certificate.SubjectAlternativeNames" --output text 2>/dev/null || echo "")

          if echo "$SANS" | grep -qw "eshkolai.com"; then
            echo "cert=$CERT_ARN" >> $GITHUB_OUTPUT
            echo "need_new=false" >> $GITHUB_OUTPUT
          else
            NEW=$(aws acm request-certificate --domain-name "eshkolai.com" --subject-alternative-names "www.eshkolai.com" --validation-method DNS --query 'CertificateArn' --output text)
            echo "cert=$NEW" >> $GITHUB_OUTPUT
            echo "need_new=true" >> $GITHUB_OUTPUT
            sleep 15
            aws acm describe-certificate --certificate-arn $NEW --query "Certificate.DomainValidationOptions" --output json | jq -c '.[]' | while read row; do
              RNAME=$(echo $row | jq -r '.ResourceRecord.Name')
              RVALUE=$(echo $row | jq -r '.ResourceRecord.Value')
              echo '{"Changes":[{"Action":"UPSERT","ResourceRecordSet":{"Name":"'$RNAME'","Type":"CNAME","TTL":300,"ResourceRecords":[{"Value":"'$RVALUE'"}]}}]}' > /tmp/dns.json
              aws route53 change-resource-record-sets --hosted-zone-id ${{ env.HOSTED_ZONE_ID }} --change-batch file:///tmp/dns.json
            done
            for i in $(seq 1 30); do
              STATUS=$(aws acm describe-certificate --certificate-arn $NEW --query "Certificate.Status" --output text)
              [ "$STATUS" = "ISSUED" ] && break; sleep 10
            done
          fi

      - name: Add eshkolai.com to CloudFront
        run: |
          ALIASES=$(jq -r '.Aliases.Items[]' cf-config.json 2>/dev/null || echo "")
          if echo "$ALIASES" | grep -qw "eshkolai.com"; then
            echo "Already configured"
          else
            jq --arg cert "${{ steps.cert.outputs.cert }}" \
              '.Aliases = {"Quantity": 2, "Items": ["www.eshkolai.com", "eshkolai.com"]} | .ViewerCertificate.ACMCertificateArn = $cert' \
              cf-config.json > updated.json
            aws cloudfront update-distribution --id ${{ env.CLOUDFRONT_ID }} --if-match ${{ steps.cert.outputs.ETAG }} --distribution-config file://updated.json
          fi

      - name: Ensure Route 53 A record
        run: |
          aws route53 change-resource-record-sets --hosted-zone-id ${{ env.HOSTED_ZONE_ID }} --change-batch '{
            "Changes": [{"Action": "UPSERT", "ResourceRecordSet": {
              "Name": "eshkolai.com", "Type": "A",
              "AliasTarget": {"HostedZoneId": "Z2FDTNDATAQYW2", "DNSName": "'${{ env.CLOUDFRONT_DOMAIN }}'", "EvaluateTargetHealth": false}
            }}]}'
          echo "✓ Root domain setup complete"

  # ─── Deploy Contact Form ───
  deploy-contact-form:
    if: github.event.inputs.action == 'deploy-contact-form'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/contact-form-stack.yaml \
            --stack-name contact-form-stack \
            --parameter-overrides RecipientEmail=ariel.eshkol@gmail.com SenderEmail=ariel.eshkol@gmail.com \
            --capabilities CAPABILITY_NAMED_IAM --no-fail-on-empty-changeset

      - name: Verify Email in SES
        run: aws ses verify-email-identity --email-address ariel.eshkol@gmail.com || true

      - name: Get API Endpoint
        run: |
          API=$(aws cloudformation describe-stacks --stack-name contact-form-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' --output text)
          echo "✓ Contact form deployed. API: $API"

  # ─── Setup Root Domain Redirect (eshkol.ai) ───
  setup-root-domain-redirect:
    if: github.event.inputs.action == 'setup-root-domain-redirect'
    runs-on: ubuntu-latest
    env:
      ROOT_BUCKET: eshkol.ai
      WWW_BUCKET: www.eshkol.ai
      REDIRECT_ZONE_ID: Z06481861W6WD32QMETRV
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::991105135552:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Create and configure redirect bucket
        run: |
          aws s3api head-bucket --bucket ${{ env.ROOT_BUCKET }} 2>/dev/null || \
            aws s3api create-bucket --bucket ${{ env.ROOT_BUCKET }} --region ${{ env.AWS_REGION }}

          echo '{"RedirectAllRequestsTo":{"HostName":"${{ env.WWW_BUCKET }}","Protocol":"http"}}' > redirect.json
          aws s3api put-bucket-website --bucket ${{ env.ROOT_BUCKET }} --website-configuration file://redirect.json

          aws s3api put-public-access-block --bucket ${{ env.ROOT_BUCKET }} \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"

          echo '{"Version":"2012-10-17","Statement":[{"Sid":"Public","Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::'${{ env.ROOT_BUCKET }}'/*"}]}' > policy.json
          aws s3api put-bucket-policy --bucket ${{ env.ROOT_BUCKET }} --policy file://policy.json

      - name: Create A record
        run: |
          EXISTING=$(aws route53 list-resource-record-sets --hosted-zone-id ${{ env.REDIRECT_ZONE_ID }} \
            --query "ResourceRecordSets[?Name=='${{ env.ROOT_BUCKET }}.' && Type=='A']" --output json)
          if [ "$EXISTING" = "[]" ]; then
            echo '{"Changes":[{"Action":"CREATE","ResourceRecordSet":{"Name":"'${{ env.ROOT_BUCKET }}'","Type":"A","AliasTarget":{"HostedZoneId":"Z3AQBSTGFYJSTF","DNSName":"s3-website-us-east-1.amazonaws.com","EvaluateTargetHealth":false}}}]}' > change.json
            aws route53 change-resource-record-sets --hosted-zone-id ${{ env.REDIRECT_ZONE_ID }} --change-batch file://change.json
          fi
          echo "✓ Root domain redirect configured"
