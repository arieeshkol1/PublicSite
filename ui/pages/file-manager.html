<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TSG — JP2 File Manager</title>

  <style>
    /* ===== TSG theme tokens (align to your other page) ===== */
    :root{
      --bg:#0a1420;            /* page background */
      --panel:#0f1e2e;         /* panels/cards */
      --panel-2:#0c1a28;       /* header/footer bars */
      --border:#1e3a5a;        /* borders, dividers */
      --text:#e6eef5;          /* primary text */
      --muted:#9bb3c9;         /* secondary text */
      --link:#b7d8ff;          /* link text */
      --primary:#2a6fb3;       /* primary button bg */
      --primary-ink:#eaf3ff;   /* primary button text */
      --danger:#a4354a;        /* danger button bg */
      --danger-ink:#ffecef;    /* danger button text */
      --btn:#14314c;           /* default button bg */
      --btn-ink:#e6eef5;       /* default button text */
      --radius:10px;           /* consistent rounding */
      --pad:12px;              /* base spacing */
      --shadow:0 1px 0 rgba(255,255,255,0.03) inset, 0 8px 24px rgba(0,0,0,0.25);
    }

    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font:14px/1.45 Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    /* ===== Header ===== */
    .header{
      display:flex;align-items:center;gap:12px;
      padding:10px 16px;
      background:var(--panel-2);
      border-bottom:1px solid var(--border);
      box-shadow:var(--shadow);
    }
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{height:22px;width:auto;display:block}
    .title{font-weight:700;font-size:15px;letter-spacing:.2px}
    .sub{margin-left:auto;font-size:12px;color:var(--muted)}

    /* ===== Containers / cards ===== */
    .wrap{max-width:1280px;margin:0 auto;padding:12px}
    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:var(--pad);
      box-shadow:var(--shadow);
    }
    .row{display:flex;gap:12px;align-items:center}
    .row.spread{justify-content:space-between}

    /* ===== Buttons ===== */
    .btn{
      appearance:none; border:1px solid var(--border);
      background:var(--btn); color:var(--btn-ink);
      border-radius:var(--radius); padding:8px 12px;
      cursor:pointer; font-weight:600; font-size:13px;
    }
    .btn.primary{ background:var(--primary); border-color:var(--primary); color:var(--primary-ink); }
    .btn.danger{  background:var(--danger);  border-color:var(--danger);  color:var(--danger-ink); }
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn:focus{outline:2px solid rgba(183,216,255,.25); outline-offset:1px}

    /* ===== Split layout ===== */
    .layout{display:grid;grid-template-columns:260px 1fr;gap:12px}
    .pane{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;min-height:60vh;box-shadow:var(--shadow)}
    .pane .head{padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel-2);font-weight:600}
    .crumbs{padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)}
    .tree{padding:8px 12px;font-size:12px}
    .tree a{color:var(--link);text-decoration:none}
    .tree a:hover{text-decoration:underline}

    /* ===== Table ===== */
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{
      text-align:left;color:var(--muted);font-weight:600;
      padding:8px 10px;border-bottom:1px solid var(--border);
      background:var(--panel-2);
    }
    tbody td{padding:9px 10px;border-bottom:1px solid var(--border)}
    tbody tr:hover{background:#0d2033}
    tbody tr:nth-child(even){background:#0e1c2c}

    /* ===== Pager / notes ===== */
    .pager{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-top:1px solid var(--border);background:var(--panel-2)}
    .note{font-size:12px;color:var(--muted)}

    /* ===== Banners ===== */
    .banner{margin-top:10px;border-radius:var(--radius);padding:8px 12px;border:1px solid var(--border)}
    .alert{background:#35121a;border-color:#6a2334;color:#ffd9df}
    .ok{background:#0e2236;border-color:#2b5177;color:#cde6ff}

    /* Small tweaks for compactness like the other page */
    code{background:#0b1c2d;border:1px solid var(--border);border-radius:6px;padding:1px 6px}
    .tight{gap:8px}
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="brand">
      <img src="../assets/tsg-logo.svg" alt="TSG" />
      <div class="title">JP2 File Manager</div>
    </div>
    <div class="sub">Output → Input · us-east-1</div>
  </header>

  <main class="wrap">
    <!-- Top info card -->
    <section class="card">
      <div class="note">
        Using existing API routes:
        <code>GET /list-output</code> (browse),
        <code>POST /copy-files</code>,
        <code>POST /delete-files</code>,
        <code>POST /download-file</code>.
      </div>
      <div class="row tight" style="margin-top:8px">
        <button class="btn" id="btnPing">Test list-output</button>
        <div class="note">API_BASE: <code id="apiShow">—</code></div>
      </div>
      <div id="banner" class="banner" style="display:none"></div>
    </section>

    <!-- Two-pane manager -->
    <section class="layout">
      <!-- Left: Folders -->
      <aside class="pane">
        <div class="head">Folders</div>
        <div class="crumbs">/output/<span id="crumbPrefix"></span></div>
        <div class="tree" id="tree"></div>
      </aside>

      <!-- Right: Objects -->
      <section class="pane">
        <div class="head">
          <div class="row spread">
            <div class="row tight">
              <button class="btn primary" id="btnMove" disabled>Copy to Input &amp; Delete Source</button>
              <button class="btn danger" id="btnDelete" disabled>Delete</button>
              <button class="btn" id="btnDownload" disabled>Download</button>
            </div>
            <div id="selCount" class="note">0 selected</div>
          </div>
        </div>

        <div style="overflow:auto;flex:1">
          <table>
            <thead>
              <tr>
                <th style="width:28px"><input type="checkbox" id="chkAll"/></th>
                <th>Name</th><th>Size</th><th>Last Modified</th><th>Class</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>

        <div class="pager">
          <div id="pageInfo" class="note">—</div>
          <div class="row tight">
            <button class="btn" id="btnPrev" disabled>Prev</button>
            <button class="btn" id="btnNext" disabled>Next</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <!-- Activity (kept for parity; hidden until used) -->
  <section id="activity" style="display:none"></section>

<script>
  // ===== CONFIG (unchanged) =====
  const API_BASE = "https://xui5toa569.execute-api.us-east-1.amazonaws.com";
  const OUTPUT_BUCKET = "jp2-output-991105135552-us-east-1"; // required by /list-output
  document.getElementById('apiShow').textContent = API_BASE;

  // ===== STATE =====
  let prefix = "";
  let nextToken = null;
  let prevStack = [];
  let selection = new Set();
  let objectsCache = [];

  // ===== DOM =====
  const rows = document.getElementById('rows');
  const tree = document.getElementById('tree');
  const pageInfo = document.getElementById('pageInfo');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const btnMove = document.getElementById('btnMove');
  const btnDelete = document.getElementById('btnDelete');
  const btnDownload = document.getElementById('btnDownload');
  const selCount = document.getElementById('selCount');
  const chkAll = document.getElementById('chkAll');
  const crumbs = document.getElementById('crumbPrefix');
  const banner = document.getElementById('banner');
  const btnPing = document.getElementById('btnPing');

  function showBanner(msg, ok=false) {
    banner.style.display = 'block';
    banner.className = 'banner ' + (ok ? 'ok' : 'alert');
    banner.innerHTML = msg;
    setTimeout(()=>{ banner.style.display='none'; }, ok ? 2500 : 6000);
  }

  function setButtons() {
    const hasSel = selection.size > 0;
    btnMove.disabled = !hasSel;
    btnDelete.disabled = !hasSel;
    btnDownload.disabled = !hasSel;
    selCount.textContent = `${selection.size} selected`;
  }

  function render(objects, prefixes, token) {
    rows.innerHTML = "";
    objectsCache = objects || [];
    crumbs.textContent = prefix || "";

    // Left tree
    tree.innerHTML = (prefix ? `<div><a href="#" onclick="goPrefix('')">/</a> ${prefix}</div>` : `<div>/</div>`);
    (prefixes || []).forEach(next => {
      const name = typeof next === 'string' ? next : (next.Prefix || next.prefix || next);
      const label = name.replace(prefix, "");
      const clean = label.endsWith('/') ? label.slice(0, -1) : label;
      tree.innerHTML += `<div><a href="#" onclick="goPrefix('${name}')">${clean}/</a></div>`;
    });

    // Table
    objectsCache.forEach(o => {
      const key = o.Key || o.key || o.name || "";
      const size = (o.Size ?? o.size ?? 0);
      const lm = o.LastModified ?? o.lastModified ?? '';
      const sc = o.StorageClass ?? o.storageClass ?? '';
      const checked = selection.has(key) ? 'checked' : '';
      rows.innerHTML += `<tr>
        <td><input type="checkbox" data-key="${key}" ${checked} /></td>
        <td>${key.substring(prefix.length)}</td>
        <td>${Number(size).toLocaleString()}</td>
        <td>${lm}</td>
        <td>${sc}</td>
      </tr>`;
    });

    nextToken = token || null;
    pageInfo.textContent = `Prefix: /${prefix || ''} | Objects: ${objectsCache.length}`;
    btnPrev.disabled = prevStack.length === 0;
    btnNext.disabled = !nextToken;
    chkAll.checked = false;
    setButtons();
    rows.querySelectorAll('input[type=checkbox]').forEach(ch => {
      ch.addEventListener('change', (e) => {
        const k = e.target.getAttribute('data-key');
        if (e.target.checked) selection.add(k); else selection.delete(k);
        setButtons();
      });
    });
  }

  async function listOutput({ forward=false } = {}) {
    try {
      const url = new URL(API_BASE + "/list-output");
      url.searchParams.set("bucket", OUTPUT_BUCKET);
      url.searchParams.set("prefix", prefix);
      if (forward && nextToken) {
        url.searchParams.set("continuationToken", nextToken);
        url.searchParams.set("token", nextToken);
      }
      const res = await fetch(url.toString(), { method: "GET" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      if (forward && nextToken) prevStack.push(nextToken);

      render(
        data.objects || data.Contents || data.items || data.files || data.keys || [],
        data.commonPrefixes || data.CommonPrefixes || data.prefixes || data.Prefixes || [],
        data.nextToken || data.NextContinuationToken || data.token || data.continuationToken || null
      );
      showBanner("list-output OK", true);
    } catch (e) {
      console.error(e);
      showBanner("list-output failed: " + e.message, false);
    }
  }

  function goPrefix(p) {
    prefix = p;
    nextToken = null;
    prevStack = [];
    selection.clear();
    listOutput({ forward:false });
  }

  // Pagination + selection
  btnPrev.onclick = () => {
    if (prevStack.length === 0) return;
    nextToken = prevStack.pop();
    listOutput({ forward:false });
  };
  btnNext.onclick = () => listOutput({ forward:true });
  chkAll.onchange = () => {
    selection.clear();
    if (chkAll.checked) objectsCache.forEach(o => selection.add(o.Key || o.key || o.name));
    render(objectsCache, [], nextToken);
  };
  btnPing.onclick = () => listOutput({forward:false});

  // Actions (unchanged)
  function flashOk(msg) { showBanner(msg, true); }

  btnMove.onclick = async () => {
    const keys = Array.from(selection);
    if (!keys.length) return;
    try {
      const res = await fetch(API_BASE + "/copy-files", {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ keys })
      });
      const j = await res.json();
      if (!res.ok) throw new Error(j.error || res.status);
      flashOk(`Moved ${j.completed || 0}/${keys.length} → Input (deleted from Output).`);
      selection.clear(); setButtons(); listOutput({forward:false});
    } catch (e) {
      showBanner("copy-files failed: " + e.message, false);
    }
  };

  btnDelete.onclick = async () => {
    const keys = Array.from(selection);
    if (!keys.length) return;
    try {
      const res = await fetch(API_BASE + "/delete-files", {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ keys })
      });
      const j = await res.json();
      if (!res.ok) throw new Error(j.error || res.status);
      flashOk(`Deleted ${j.completed || 0}/${keys.length} from Output.`);
      selection.clear(); setButtons(); listOutput({forward:false});
    } catch (e) {
      showBanner("delete-files failed: " + e.message, false);
    }
  };

  btnDownload.onclick = async () => {
    const keys = Array.from(selection);
    if (!keys.length) return;
    try {
      const res = await fetch(API_BASE + "/download-file", {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ keys })
      });
      const j = await res.json();
      if (!res.ok) throw new Error(j.error || res.status);
      if (j.url) {
        window.open(j.url, "_blank");
        flashOk("Download URL ready.");
      } else if (Array.isArray(j.urls)) {
        window.open(j.urls[0], "_blank");
        flashOk(`Generated ${j.urls.length} download link(s).`);
      } else {
        showBanner("No URL(s) returned.", false);
      }
    } catch (e) {
      showBanner("download-file failed: " + e.message, false);
    }
  };

  // Initial auto-load
  listOutput({forward:false});
</script>
</body>
</html>
