<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JP2 File Manager</title>

  <style>
    :root{
      --bg:#0a1420;--panel:#0f1e2e;--panel-2:#0c1a28;
      --border:#1e3a5a;--text:#e6eef5;--muted:#9bb3c9;
      --link:#b7d8ff;--primary:#2a6fb3;--primary-ink:#eaf3ff;
      --danger:#a4354a;--danger-ink:#ffecef;--btn:#14314c;
      --btn-ink:#e6eef5;--radius:10px;--pad:12px;
      --shadow:0 1px 0 rgba(255,255,255,0.03) inset,0 8px 24px rgba(0,0,0,0.25);
    }
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--text);
      font:14px/1.45 Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .header{display:flex;align-items:center;gap:12px;
      padding:10px 16px;background:var(--panel-2);
      border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{height:22px;width:auto;display:block}
    .title{font-weight:700;font-size:15px;letter-spacing:.2px}
    .sub{margin-left:auto;font-size:12px;color:var(--muted)}
    .wrap{max-width:1280px;margin:0 auto;padding:12px}
    .card{background:var(--panel);border:1px solid var(--border);
      border-radius:var(--radius);padding:var(--pad);box-shadow:var(--shadow)}
    .row{display:flex;gap:12px;align-items:center}
    .row.spread{justify-content:space-between}
    .btn{appearance:none;border:1px solid var(--border);
      background:var(--btn);color:var(--btn-ink);border-radius:var(--radius);
      padding:8px 12px;cursor:pointer;font-weight:600;font-size:13px}
    .btn.primary{background:var(--primary);border-color:var(--primary);color:var(--primary-ink)}
    .btn.danger{background:var(--danger);border-color:var(--danger);color:var(--danger-ink)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn:focus{outline:2px solid rgba(183,216,255,.25);outline-offset:1px}
    .layout{display:grid;grid-template-columns:260px 1fr;gap:12px}
    .pane{background:var(--panel);border:1px solid var(--border);
      border-radius:var(--radius);display:flex;flex-direction:column;
      min-height:60vh;box-shadow:var(--shadow)}
    .pane .head{padding:10px 12px;border-bottom:1px solid var(--border);
      background:var(--panel-2);font-weight:600}
    .crumbs{padding:8px 12px;border-bottom:1px solid var(--border);
      font-size:12px;color:var(--muted)}
    .tree{padding:8px 12px;font-size:12px}
    .tree a{color:var(--link);text-decoration:none}
    .tree a:hover{text-decoration:underline}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{text-align:left;color:var(--muted);font-weight:600;
      padding:8px 10px;border-bottom:1px solid var(--border);
      background:var(--panel-2)}
    tbody td{padding:9px 10px;border-bottom:1px solid var(--border)}
    tbody tr:hover{background:#0d2033}
    tbody tr:nth-child(even){background:#0e1c2c}
    .pager{display:flex;justify-content:space-between;align-items:center;
      padding:8px 12px;border-top:1px solid var(--border);background:var(--panel-2)}
    .note{font-size:12px;color:var(--muted)}
    .banner{margin-top:10px;border-radius:var(--radius);padding:8px 12px;border:1px solid var(--border)}
    .alert{background:#35121a;border-color:#6a2334;color:#ffd9df}
    .ok{background:#0e2236;border-color:#2b5177;color:#cde6ff}
    code{background:#0b1c2d;border:1px solid var(--border);
      border-radius:6px;padding:1px 6px}
    .tight{gap:8px}
  </style>
</head>
<body>
  <header class="header">
    <div class="brand">
      <img src="../assets/logo.svg" alt="JP2 File Manager" />
      <div class="title">JP2 File Manager</div>
    </div>
    <div class="sub">Output → Input · us-east-1 · Times in Asia/Jerusalem</div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="note">
        Using existing API routes:
        <code>GET /list-output</code>,
        <code>POST /copy-files</code>,
        <code>POST /delete-files</code>,
        <code>POST /download-file</code>.
      </div>
      <div class="row tight" style="margin-top:8px">
        <button class="btn" id="btnPing">Test list-output</button>
        <div class="note">API_BASE: <code id="apiShow">—</code></div>
      </div>
      <div id="banner" class="banner" style="display:none"></div>
    </section>

    <section class="layout">
      <aside class="pane">
        <div class="head">Folders</div>
        <div class="crumbs">/output/<span id="crumbPrefix"></span></div>
        <div class="tree" id="tree"></div>
      </aside>

      <section class="pane">
        <div class="head">
          <div class="row spread">
            <div class="row tight">
              <button class="btn primary" id="btnMove" disabled>Copy to Input &amp; Delete Source</button>
              <button class="btn danger" id="btnDelete" disabled>Delete</button>
              <button class="btn" id="btnDownload" disabled>Download</button>
            </div>
            <div id="selCount" class="note">0 selected</div>
          </div>
        </div>

        <div style="overflow:auto;flex:1">
          <table>
            <thead>
              <tr>
                <th style="width:28px"><input type="checkbox" id="chkAll"/></th>
                <th>Name</th><th>Size</th><th>Last Modified (Jerusalem)</th><th>Class</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>

        <div class="pager">
          <div id="pageInfo" class="note">—</div>
          <div class="row tight">
            <button class="btn" id="btnPrev" disabled>Prev</button>
            <button class="btn" id="btnNext" disabled>Next</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <section id="activity" style="display:none"></section>

<script>
  const API_BASE = "https://qmiu91xhgk.execute-api.us-east-1.amazonaws.com";
  const OUTPUT_BUCKET = "jp2-output-991105135552-us-east-1";
  document.getElementById('apiShow').textContent = API_BASE;

  let prefix = "", nextToken = null, prevStack = [], selection = new Set(), objectsCache = [];

  const rows=document.getElementById('rows'),tree=document.getElementById('tree'),
        pageInfo=document.getElementById('pageInfo'),btnPrev=document.getElementById('btnPrev'),
        btnNext=document.getElementById('btnNext'),btnMove=document.getElementById('btnMove'),
        btnDelete=document.getElementById('btnDelete'),btnDownload=document.getElementById('btnDownload'),
        selCount=document.getElementById('selCount'),chkAll=document.getElementById('chkAll'),
        crumbs=document.getElementById('crumbPrefix'),banner=document.getElementById('banner'),
        btnPing=document.getElementById('btnPing');

  // --- Time helpers (Asia/Jerusalem) ---
  const JERUSALEM_TZ='Asia/Jerusalem';
  function parseTime(v){
    if(!v) return null;
    if(typeof v==='number') return new Date(v>1e12?v:v*1000);
    if(typeof v==='object'&&v.date) return new Date(v.date);
    return new Date(v);
  }
  function formatJerusalem(dt){
    if(!dt||isNaN(+dt)) return '';
    return new Intl.DateTimeFormat('en-GB',{
      timeZone:JERUSALEM_TZ,
      year:'numeric',month:'short',day:'2-digit',
      hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false
    }).format(dt);
  }
  function isoZ(dt){return(!dt||isNaN(+dt))?'':dt.toISOString();}

  function showBanner(msg,ok=false){
    banner.style.display='block';
    banner.className='banner '+(ok?'ok':'alert');
    banner.innerHTML=msg;
    setTimeout(()=>{banner.style.display='none';},ok?2500:6000);
  }

  function setButtons(){
    const hasSel=selection.size>0;
    btnMove.disabled=!hasSel;btnDelete.disabled=!hasSel;btnDownload.disabled=!hasSel;
    selCount.textContent=`${selection.size} selected`;
  }

  function render(objects,prefixes,token){
    rows.innerHTML="";objectsCache=objects||[];crumbs.textContent=prefix||"";
    tree.innerHTML=(prefix?`<div><a href="#" onclick="goPrefix('')">/</a> ${prefix}</div>`:`<div>/</div>`);
    (prefixes||[]).forEach(next=>{
      const name=typeof next==='string'?next:(next.Prefix||next.prefix||next);
      const label=name.replace(prefix,"");
      const clean=label.endsWith('/')?label.slice(0,-1):label;
      tree.innerHTML+=`<div><a href="#" onclick="goPrefix('${name}')">${clean}/</a></div>`;
    });

    objectsCache.forEach(o=>{
      const key=o.Key||o.key||o.name||"";
      const size=(o.Size??o.size??0);
      const lm=o.LastModified??o.lastModified??'';
      const sc=o.StorageClass??o.storageClass??'';
      const checked=selection.has(key)?'checked':'';
      const dt=parseTime(lm);
      const lmLocal=formatJerusalem(dt);
      const lmIso=isoZ(dt);
      rows.innerHTML+=`<tr>
        <td><input type="checkbox" data-key="${key}" ${checked}/></td>
        <td>${key.substring(prefix.length)}</td>
        <td>${Number(size).toLocaleString()}</td>
        <td title="${lmIso}">${lmLocal}</td>
        <td>${sc}</td>
      </tr>`;
    });

    nextToken=token||null;
    pageInfo.textContent=`Prefix: /${prefix||''} | Objects: ${objectsCache.length}`;
    btnPrev.disabled=prevStack.length===0;btnNext.disabled=!nextToken;
    chkAll.checked=false;setButtons();
    rows.querySelectorAll('input[type=checkbox]').forEach(ch=>{
      ch.addEventListener('change',e=>{
        const k=e.target.getAttribute('data-key');
        if(e.target.checked)selection.add(k);else selection.delete(k);
        setButtons();
      });
    });
  }

  async function listOutput({forward=false}={}){
    try{
      const url=new URL(API_BASE+"/list-output");
      url.searchParams.set("bucket",OUTPUT_BUCKET);
      url.searchParams.set("prefix",prefix);
      if(forward&&nextToken){
        url.searchParams.set("continuationToken",nextToken);
        url.searchParams.set("token",nextToken);
      }
      const res=await fetch(url.toString(),{method:"GET"});
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const data=await res.json();
      if(forward&&nextToken)prevStack.push(nextToken);
      render(
        data.objects||data.Contents||data.items||data.files||data.keys||[],
        data.commonPrefixes||data.CommonPrefixes||data.prefixes||data.Prefixes||[],
        data.nextToken||data.NextContinuationToken||data.token||data.continuationToken||null
      );
      showBanner("list-output OK",true);
    }catch(e){console.error(e);showBanner("list-output failed: "+e.message,false);}
  }

  function goPrefix(p){prefix=p;nextToken=null;prevStack=[];selection.clear();listOutput({forward:false});}

  btnPrev.onclick=()=>{if(prevStack.length===0)return;nextToken=prevStack.pop();listOutput({forward:false});};
  btnNext.onclick=()=>listOutput({forward:true});
  chkAll.onchange=()=>{selection.clear();if(chkAll.checked)objectsCache.forEach(o=>selection.add(o.Key||o.key||o.name));render(objectsCache,[],nextToken);};
  btnPing.onclick=()=>listOutput({forward:false});

  function flashOk(msg){showBanner(msg,true);}

  btnMove.onclick=async()=>{
    const keys=Array.from(selection);if(!keys.length)return;
    try{
      const res=await fetch(API_BASE+"/copy-files",{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keys})});
      const j=await res.json();if(!res.ok)throw new Error(j.error||res.status);
      flashOk(`Moved ${j.completed||0}/${keys.length} → Input (deleted from Output).`);
      selection.clear();setButtons();listOutput({forward:false});
    }catch(e){showBanner("copy-files failed: "+e.message,false);}
  };

  btnDelete.onclick=async()=>{
    const keys=Array.from(selection);if(!keys.length)return;
    try{
      const res=await fetch(API_BASE+"/delete-files",{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keys})});
      const j=await res.json();if(!res.ok)throw new Error(j.error||res.status);
      flashOk(`Deleted ${j.completed||0}/${keys.length} from Output.`);
      selection.clear();setButtons();listOutput({forward:false});
    }catch(e){showBanner("delete-files failed: "+e.message,false);}
  };

  btnDownload.onclick=async()=>{
    const keys=Array.from(selection);if(!keys.length)return;
    try{
      const res=await fetch(API_BASE+"/download-file",{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keys})});
      const j=await res.json();if(!res.ok)throw new Error(j.error||res.status);
      if(j.url){window.open(j.url,"_blank");flashOk("Download URL ready.");}
      else if(Array.isArray(j.urls)){window.open(j.urls[0],"_blank");flashOk(`Generated ${j.urls.length} download link(s).`);}
      else{showBanner("No URL(s) returned.",false);}
    }catch(e){showBanner("download-file failed: "+e.message,false);}
  };

  listOutput({forward:false});
</script>
</body>
</html>
