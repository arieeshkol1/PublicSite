<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Convert — TSG</title>
  <!-- Optionally set your API base here so S3 static hosting can reach the API Gateway domain -->
  <meta name="api-base" content="">
  <link rel="icon" href="/assets/tsg-logo.svg">
  <style>
    :root{ --bg:#0b1020; --panel:#121a34; --accent:#45a1ff; --text:#e7ecf7; --muted:#96a2c0; --border:#233059; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--text); background:linear-gradient(180deg,#0b1020, #0d1330 40%, #0b1020 100%); }
    .container{ max-width:1100px; margin:0 auto; padding:1rem 1.25rem; }
    h2{ margin: .25rem 0 1rem; }
    .card{ border:1px solid var(--border); background:rgba(10,16,36,.4); border-radius:1rem; padding:1rem; }
    .grid{ display:grid; gap:1rem; grid-template-columns: repeat(12, 1fr); }
    .col-12{ grid-column: span 12; }
    .col-8{ grid-column: span 8; }
    .col-4{ grid-column: span 4; }
    label{ font-size:.9rem; color:var(--muted); }
    select,input[type="text"]{ width:100%; padding:.55rem .6rem; border-radius:.55rem; color:var(--text); border:1px solid var(--border); background:rgba(255,255,255,.03); }
    .btn{ appearance:none; border:1px solid var(--border); background:rgba(255,255,255,.02); color:var(--text); padding:.6rem .9rem; border-radius:.6rem; cursor:pointer; }
    .btn:hover{ border-color:var(--accent); }
    .table{ width:100%; border-collapse:collapse; }
    .table th,.table td{ border-bottom:1px solid var(--border); padding:.5rem .25rem; font-size:.92rem; }
    .hint{ color:var(--muted); }
    .log{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size:.9rem; white-space:pre-wrap; background:rgba(0,0,0,.25); border:1px dashed var(--border); border-radius:.6rem; padding:.75rem; min-height:4rem; }
    .badge{ border:1px solid var(--border); padding:.15rem .45rem; border-radius:.5rem; color:var(--muted); font-size:.75rem; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Convert</h2>
    <div class="card">
      <div class="grid">
        <div class="col-8">
          <label>Step 1 — Prefix in <span class="badge">input</span> bucket</label>
          <input id="prefix" type="text" placeholder="e.g. inbound/images/" />
        </div>
        <div class="col-4" style="display:flex; align-items:end; gap:.5rem;">
          <button class="btn" id="btn-list">List files</button>
          <button class="btn" id="btn-clear">Clear</button>
        </div>

        <div class="col-12">
          <table class="table">
            <thead>
              <tr>
                <th style="width:32px"><input type="checkbox" id="check-all" /></th>
                <th>Key</th>
                <th style="width:140px">Size</th>
              </tr>
            </thead>
            <tbody id="files-body">
              <tr><td colspan="3"><span class="hint">No files loaded yet.</span></td></tr>
            </tbody>
          </table>
        </div>

        <div class="col-12">
          <label>Step 2 — Target format</label>
          <select id="format">
            <option value="JPEG2">JPEG2</option>
            <option value="TIFF">TIFF</option>
            <option value="RAW">RAW</option>
            <option value="XML">XML</option>
            <option value="TXT">TXT</option>
            <option value="JSON">JSON</option>
          </select>
        </div>

        <div class="col-12">
          <button class="btn" id="btn-submit">Submit</button>
        </div>

        <div class="col-12">
          <label>Log</label>
          <div id="log" class="log">–</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Resolve API base in this order:
    // window.API_BASE → ?api= URL param → <meta name="api-base"> → localStorage → '' (same origin)
    (function(){
      const url = new URL(window.location.href);
      const paramApi = url.searchParams.get('api');
      const metaApi  = (document.querySelector('meta[name="api-base"]')||{}).content || '';
      const lsApi    = localStorage.getItem('API_BASE') || '';
      const apiBase  = (window.API_BASE || paramApi || metaApi || lsApi || '').replace(/\/$/, '');
      if (paramApi && paramApi !== lsApi) localStorage.setItem('API_BASE', apiBase);
      window.__API_BASE__ = apiBase; // debug
    })();

    const api = (p)=> (window.__API_BASE__ ? window.__API_BASE__ : '') + p;
    const fmt = (b)=>{const u=['B','KB','MB','GB','TB'];let i=0,v=b||0;while(v>1024&&i<u.length-1){v/=1024;i++;}return `${v.toFixed(1)} ${u[i]}`;};
    const log = (m)=>{ document.getElementById('log').textContent = m; };

    async function listFiles(){
      const prefix = document.getElementById('prefix').value || '';
      log('Listing…');
      try{
        const r = await fetch(api(`/list-input?prefix=${encodeURIComponent(prefix)}`));
        if(!r.ok){ log(`List failed: HTTP ${r.status}`); return; }
        const d = await r.json();
        const body = document.getElementById('files-body');
        body.innerHTML = '';
        if(!d.files || !d.files.length){ body.innerHTML = '<tr><td colspan="3"><span class="hint">No files.</span></td></tr>'; return; }
        for(const f of d.files){
          const tr = document.createElement('tr');
          tr.innerHTML = `<td><input type="checkbox" class="pick" data-key="${f.key}"></td>`+
                         `<td>${f.key}</td>`+
                         `<td>${fmt(f.size)}</td>`;
          body.appendChild(tr);
        }
        log(`Loaded ${d.files.length} file(s).`);
      }catch(e){ log('List error: '+ e); }
    }

    async function submitConvert(){
      const picks = Array.from(document.querySelectorAll('.pick:checked')).map(cb=>cb.dataset.key);
      const target = document.getElementById('format').value;
      if(!picks.length){ log('Select at least one file.'); return; }
      log('Submitting conversion…');
      try{
        const payload = { keys: picks, target_format: target };
        const r = await fetch(api('/convert'), { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await r.json().catch(()=>({}));
        if(!r.ok){ log(`Submit failed (${r.status}). ${data.error||''}`); return; }
        log(`Job ${data.job_id} submitted. Tracking…`);
        poll(data.job_id);
      }catch(e){ log('Submit error: '+ e); }
    }

    async function poll(jobId){
      try{
        const r = await fetch(api(`/status/${encodeURIComponent(jobId)}`));
        const d = await r.json().catch(()=>({}));
        if(!r.ok){ log(`Status error: HTTP ${r.status}`); return; }
        const lines = [
          `status: ${d.status || '—'}`,
          `started_at: ${d.started_at || '—'}`,
          `finished_at: ${d.finished_at || '—'}`,
          `duration_sec: ${d.duration_sec ?? '—'}`,
          `cpu.avg: ${d.cpu?.avg ?? '—'} | cpu.p95: ${d.cpu?.p95 ?? '—'}`,
          `outputs: ${(d.outputs||[]).join(', ') || '—'}`,
          `error: ${d.error || '—'}`
        ];
        log(lines.join('\\n'));
        if(d.status === 'queued' || d.status === 'running') setTimeout(()=>poll(jobId), 1500);
      }catch(e){ log('Poll error: '+ e); }
    }

    document.getElementById('btn-list').addEventListener('click', listFiles);
    document.getElementById('btn-clear').addEventListener('click', ()=>{ document.getElementById('files-body').innerHTML=''; log('–'); });
    document.getElementById('btn-submit').addEventListener('click', submitConvert);
    document.getElementById('check-all').addEventListener('change', (e)=>{
      document.querySelectorAll('.pick').forEach(cb=> cb.checked = e.target.checked);
    });

    // Auto-list on load if API base is known
    if (window.__API_BASE__) listFiles();
  </script>
</body>
</html>
