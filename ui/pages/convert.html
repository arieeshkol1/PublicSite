<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Convert — TSG</title>
  <link rel="icon" href="/assets/tsg-logo.svg">
  <style>
    :root{ --bg:#0b1020; --panel:#121a34; --accent:#45a1ff; --text:#e7ecf7; --muted:#96a2c0; --border:#233059; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--text); background:linear-gradient(180deg,#0b1020, #0d1330 40%, #0b1020 100%); }
    .container{ max-width:1100px; margin:0 auto; padding:1rem 1.25rem; }
    h2{ margin: .25rem 0 1rem; }
    .card{ border:1px solid var(--border); background:rgba(10,16,36,.4); border-radius:1rem; padding:1rem; }
    .grid{ display:grid; gap:1rem; grid-template-columns: repeat(12, 1fr); }

    .col-8{ grid-column: span 8; }

    .btn{ appearance:none; border:1px solid var(--border); background:rgba(255,255,255,.02); color:var(--text); padding:.6rem .9rem; border-radius:.6rem; cursor:pointer; }
    .btn:hover{ border-color:var(--accent); }

    .badge{ border:1px solid var(--border); padding:.15rem .45rem; border-radius:.5rem; color:var(--muted); font-size:.75rem; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Convert</h2>
    <div class="card">
      <div class="grid">
        <div class="col-8">
          <label>Step 1 — Prefix in <span class="badge">input</span> bucket</label>
          <input id="prefix" type="text" placeholder="e.g. inbound/images/" />
        </div>
        <div class="col-4" style="display:flex; align-items:end; gap:.5rem;">
          <button class="btn" id="btn-list">List files</button>
          <button class="btn" id="btn-clear">Clear</button>
        </div>

        <div class="col-12">
          <table class="table">
            <thead>
              <tr>
                <th style="width:32px"><input type="checkbox" id="check-all" /></th>
                <th>Key</th>
                <th style="width:140px">Size</th>
              </tr>
            </thead>
            <tbody id="files-body">
              <tr><td colspan="3"><span class="hint">No files loaded yet.</span></td></tr>
            </tbody>
          </table>
        </div>

        <div class="col-12">
          <label>Step 2 — Target format</label>
          <select id="format">
            <option value="JPEG2">JPEG2</option>
            <option value="TIFF">TIFF</option>
            <option value="RAW">RAW</option>
            <option value="XML">XML</option>
            <option value="TXT">TXT</option>
            <option value="JSON">JSON</option>
          </select>
        </div>

        <div class="col-12">
          <button class="btn" id="btn-submit">Submit</button>
        </div>

        <div class="col-12">
          <label>Log</label>
          <div id="log" class="log">–</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // API base: if your API is on a different domain, set window.API_BASE = "https://xxxx.execute-api.REGION.amazonaws.com" before including this page.
    const API_BASE = window.API_BASE || '';
    const api = (p) => (API_BASE ? API_BASE : '') + p;
    const fmt = (b)=>{const u=['B','KB','MB','GB'];let i=0,v=b;while(v>1024&&i<u.length-1){v/=1024;i++;}return `${v.toFixed(1)} ${u[i]}`;};
    const log = (m)=>{ document.getElementById('log').textContent = m; };

    async function listFiles(){
      const prefix = document.getElementById('prefix').value || '';
      log('Listing…');
      const r = await fetch(api(`/list-input?prefix=${encodeURIComponent(prefix)}`));
      if(!r.ok){ log(`List failed: ${r.status}`); return; }
      const d = await r.json();
      const body = document.getElementById('files-body');
      body.innerHTML = '';
      if(!d.files || !d.files.length){ body.innerHTML = '<tr><td colspan="3"><span class="hint">No files.</span></td></tr>'; return; }
      for(const f of d.files){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="checkbox" class="pick" data-key="${f.key}"></td>`+
                       `<td>${f.key}</td>`+
                       `<td>${fmt(f.size||0)}</td>`;
        body.appendChild(tr);
      }
      log(`Loaded ${d.files.length} file(s).`);
    }

    async function submitConvert(){
      const picks = Array.from(document.querySelectorAll('.pick:checked')).map(cb=>cb.dataset.key);
      const target = document.getElementById('format').value;
      if(!picks.length){ log('Select at least one file.'); return; }
      log('Submitting conversion…');
      const payload = { keys: picks, target_format: target };
      const r = await fetch(api('/convert'), { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      const data = await r.json().catch(()=>({}));
      if(!r.ok){ log(`Submit failed (${r.status}). ${data.error||''}`); return; }
      log(`Job ${data.job_id} submitted. Tracking…`);
      poll(data.job_id);
    }

    async function poll(jobId){
      const r = await fetch(api(`/status/${encodeURIComponent(jobId)}`));
      const d = await r.json().catch(()=>({}));
      if(!r.ok){ log(`Status error: ${r.status}`); return; }
      const lines = [
        `status: ${d.status || '—'}`,
        `started_at: ${d.started_at || '—'}`,
        `finished_at: ${d.finished_at || '—'}`,
        `duration_sec: ${d.duration_sec ?? '—'}`,
        `cpu.avg: ${d.cpu?.avg ?? '—'} | cpu.p95: ${d.cpu?.p95 ?? '—'}`,
        `outputs: ${(d.outputs||[]).join(', ') || '—'}`,
        `error: ${d.error || '—'}`
      ];
      document.getElementById('log').textContent = lines.join('
');
      if(d.status === 'queued' || d.status === 'running') setTimeout(()=>poll(jobId), 1500);
    }

    document.getElementById('btn-list').addEventListener('click', listFiles);
    document.getElementById('btn-clear').addEventListener('click', ()=>{ document.getElementById('files-body').innerHTML=''; log('–'); });
    document.getElementById('btn-submit').addEventListener('click', submitConvert);
    document.getElementById('check-all').addEventListener('change', (e)=>{ document.querySelectorAll('.pick').forEach(cb=> cb.checked = e.target.checked); });
  </script>
</body>
</html>

</head>
<body>
  <div class="container">
    <h2>Convert</h2>
    <div class="card">
      <label>Step 1 — Select files from input bucket</label>
      <button onclick="listFiles()">Refresh list</button>
      <table id="files"><thead><tr><th></th><th>Key</th><th>Size</th></tr></thead><tbody><tr><td colspan="3"><i>No files yet</i></td></tr></tbody></table>

      <label>Step 2 — Choose format</label>
      <select id="format">
        <option value="JPEG2">JPEG2</option>
        <option value="TIFF">TIFF</option>
        <option value="RAW">RAW</option>
        <option value="XML">XML</option>
        <option value="TXT">TXT</option>
        <option value="JSON">JSON</option>
      </select>

      <button onclick="submitConvert()">Submit</button>
      <div class="log" id="log">–</div>
    </div>
  </div>
  <script>
    async function listFiles(){
      const res = await fetch('/list-input');
      const data = await res.json();
      const tbody = document.querySelector('#files tbody');
      tbody.innerHTML = '';
      if(!data.files || !data.files.length){
        tbody.innerHTML = '<tr><td colspan="3"><i>No files</i></td></tr>';
        return;
      }
      for(const f of data.files){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type=checkbox data-key="${f.key}"></td><td>${f.key}</td><td>${(f.size/1024).toFixed(1)} KB</td>`;
        tbody.appendChild(tr);
      }
    }
    async function submitConvert(){
      const picks = Array.from(document.querySelectorAll('input[type=checkbox]:checked')).map(cb=>cb.dataset.key);
      const fmt = document.getElementById('format').value;
      if(!picks.length){ setLog('Select at least one file.'); return; }
      setLog('Submitting...');
      const res = await fetch('/convert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keys:picks,target_format:fmt})});
      const data = await res.json();
      if(!res.ok){ setLog('Error: '+JSON.stringify(data)); return; }
      setLog('Job '+data.job_id+' submitted.');
      pollJob(data.job_id);
    }
    async function pollJob(job){
      const res = await fetch('/status/'+job);
      const d = await res.json();
      const lines = [`status: ${d.status}`,`started: ${d.started_at}`,`finished: ${d.finished_at}`,`cpu: ${JSON.stringify(d.cpu)}`,`outputs: ${d.outputs}`];
      setLog(lines.join('\n'));
      if(d.status==='queued' || d.status==='running') setTimeout(()=>pollJob(job),2000);
    }
    function setLog(msg){ document.getElementById('log').textContent=msg; }
  </script>
</body>
</html>
