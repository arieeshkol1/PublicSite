<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TSG JP2 Pipeline — Convert (Old API)</title>
  <style>
    :root { --bg:#000; --card:#111; --muted:#9ca3af; --text:#fff; --accent:#3b82f6; --ok:#16a34a; --warn:#f59e0b; --err:#ef4444; }
    html,body { height:100%; background:var(--bg); color:var(--text); font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial; margin:0; }
    .wrap { max-width:1100px; margin:24px auto; padding:0 16px; }
    .card { background:var(--card); border-radius:16px; padding:20px; box-shadow:0 6px 24px rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); color:var(--text); margin-bottom:20px; }
    header { margin-bottom:8px; }
    h1 { font-size:22px; margin:0; }
    h2 { font-size:16px; margin:18px 0 10px; color:var(--muted); font-weight:600; }
    .btn { border:1px solid rgba(255,255,255,.2); background:#1f2937; color:#fff; padding:8px 12px; border-radius:10px; cursor:pointer; }
    .btn.primary { background:var(--accent); border-color:var(--accent); }
    .btn:disabled { opacity:.6; cursor:not-allowed; }
    table { width:100%; border-collapse:collapse; }
    th,td { border-bottom:1px solid rgba(255,255,255,.15); padding:8px 10px; text-align:left; vertical-align:top; }
    th { color:var(--muted); font-weight:600; }
    .mono { font-family:ui-monospace,Menlo,Consolas,monospace; }
    .row-2 { display:grid; grid-template-columns:1fr 200px; gap:8px; align-items:end; }
    .muted { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; line-height:18px; }
    .pill.run { background:rgba(59,130,246,.12); border:1px solid rgba(59,130,246,.35); }
    .pill.ok  { background:rgba(22,163,74,.12); border:1px solid rgba(22,163,74,.35); }
    .pill.err { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.35); }
    progress { width:120px; height:10px; }
    a { color:#93c5fd; text-decoration:none; }
    a:hover { text-decoration:underline; }
    .small { font-size:12px; color:var(--muted); }
    .right { text-align:right; }
    .log { background:#0b1220; border:1px dashed rgba(255,255,255,.3); border-radius:10px; padding:10px; color:#fff; white-space:pre-wrap; min-height:60px; }
    .details { background:#0b1220; border:1px dashed rgba(255,255,255,.25); border-radius:10px; padding:10px; margin-top:8px; }
    .expand-btn { cursor:pointer; border:1px solid rgba(255,255,255,.2); background:#0f172a; border-radius:8px; padding:4px 8px; }
    .expand-btn[aria-expanded="true"] { background:#13203a; }
  </style>
  <!-- Old, working API base -->
  <script>
    window.API_BASE = "https://qmiu91xhgk.execute-api.us-east-1.amazonaws.com";
    const INPUT_BUCKET  = 'jp2-input-991105135552-us-east-1';
    const OUTPUT_BUCKET = 'jp2-output-991105135552-us-east-1';
  </script>
</head>
<body>
  <div class="wrap">
    <header><h1>TSG JP2 Pipeline — Convert</h1></header>

    <!-- STEP 1: PICK INPUTS -->
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>1) Choose file(s) from Input Bucket</h2>
        <button id="btnRefresh" class="btn">Refresh</button>
      </div>
      <div class="row-2" style="margin-top:6px;">
        <div>
          <div class="muted">Prefix filter (optional)</div>
          <input id="prefix" type="text" placeholder="e.g. inbound/images/" />
        </div>
        <div>
          <div class="muted">Input bucket</div>
          <input id="inBucket" type="text" value="jp2-input-991105135552-us-east-1" />
        </div>
      </div>
      <div class="well" style="margin-top:10px;">
        <table aria-label="Input objects">
          <thead>
            <tr><th style="width:32px;"><input type="checkbox" id="checkAll"></th><th>Object Key</th><th style="width:160px;">Size</th></tr>
          </thead>
          <tbody id="inputTbody"><tr><td colspan="3" class="muted">Click Refresh</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- STEP 2: FORMAT -->
    <div class="card">
      <h2>2) Select Format</h2>
      <select id="format" class="btn">
        <option value="JPEG2000">JPEG2000 (keep)</option>
        <option value="TIFF" selected>TIFF</option>
        <option value="RAW">RAW</option>
      </select>
      <div class="small" style="margin-top:6px;">(Uses old API: keep/tiff/raw)</div>
    </div>

    <!-- STEP 3: RUN CONVERT (tiles=1 == no split) -->
    <div class="card">
      <h2>3) Run Convert</h2>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <button id="btnConvert" class="btn primary" disabled>Convert</button>
        <div class="small">Tiles</div>
        <select id="tilesTotal" class="btn">
          <option value="1" selected>1 (no split)</option>
          <option value="4">4 (2×2)</option>
          <option value="9">9 (3×3)</option>
          <option value="16">16 (4×4)</option>
          <option value="25">25 (5×5)</option>
          <option value="36">36 (6×6)</option>
        </select>
      </div>
    </div>

    <!-- PROGRESS -->
    <div class="card">
      <h2>Conversion Progress</h2>
      <table>
        <thead>
          <tr>
            <th style="width:28px;"></th>
            <th>#</th>
            <th>Input</th>
            <th>Job ID</th>
            <th>Status</th>
            <th style="width:140px;">Progress</th>
            <th>Execution</th>
            <th class="right" style="width:80px;">Tiles</th>
          </tr>
        </thead>
        <tbody id="progTbody"><tr><td colspan="8" class="small">No jobs yet</td></tr></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Log</h2>
      <div id="logBox" class="log">—</div>
    </div>
  </div>

  <script>
    const $=id=>document.getElementById(id);
    function humanSize(n){ if(n==null) return '—'; const kb=1024, mb=kb*1024, gb=mb*1024; if(n>=gb) return (n/gb).toFixed(2)+' GB'; if(n>=mb) return (n/mb).toFixed(2)+' MB'; if(n>=kb) return (n/kb).toFixed(2)+' KB'; return n+' B'; }
    function ts(){ return new Date().toISOString().replace('T',' ').replace('Z',''); }
    function logLine(s){ const b=$('logBox'); b.textContent=(b.textContent==='—'?'':b.textContent+'\n')+`[${ts()}] ${s}`; b.scrollTop=b.scrollHeight; }

    async function getJSON(url){ const r=await fetch(url); const t=await r.text(); try{ return JSON.parse(t);}catch{ throw new Error(`Expected JSON from ${url}. Got: ${t.slice(0,200).replace(/\s+/g,' ')}`);} }
    async function postJSON(url,body){
      const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const t=await r.text(); let j; try{ j=JSON.parse(t);}catch{ j={_raw:t}; }
      if(!r.ok){ const et=r.headers.get('x-amzn-errortype')||''; const rid=r.headers.get('x-amzn-requestid')||r.headers.get('x-amz-request-id')||''; throw new Error(`${j.error||j.message||j._raw||('HTTP '+r.status)}\nPOST ${url}\nStatus:${r.status}\n${et?('AWS-ErrorType:'+et+'\n'):''}${rid?('RequestId:'+rid+'\n'):''}Body:${JSON.stringify(body)}\nResp:${t.slice(0,800)}`); }
      return j;
    }

    // state
    let selectedKeys=[], jobs=[], pollTimer=null;

    function renderList(objs){
      const tbody=$('inputTbody');
      if(!objs||!objs.length){tbody.innerHTML='<tr><td colspan="3" class="muted">No objects</td></tr>';return;}
      const items=(objs||[]).map(o=>({key:o.key||o.Key,size:o.size||o.Size}));
      tbody.innerHTML=items.map(o=>`<tr><td><input type="checkbox" class="pick" data-key="${o.key}"></td><td class="mono">${o.key}</td><td>${humanSize(o.size)}</td></tr>`).join('');
      tbody.querySelectorAll('.pick').forEach(cb=>cb.addEventListener('change',updateSelection));
      $('checkAll').onchange=e=>{document.querySelectorAll('.pick').forEach(cb=>cb.checked=e.target.checked);updateSelection();};
    }
    function updateSelection(){ selectedKeys=Array.from(document.querySelectorAll('.pick:checked')).map(cb=>cb.dataset.key); $('btnConvert').disabled=selectedKeys.length===0; }

    async function listInput(){
      const bucket=$('inBucket').value.trim()||INPUT_BUCKET;
      const prefix=$('prefix').value.trim();
      const url=`${window.API_BASE}/list-input?bucket=${encodeURIComponent(bucket)}${prefix?`&prefix=${encodeURIComponent(prefix)}`:''}`;
      const tbody=$('inputTbody');tbody.innerHTML='<tr><td colspan=3>Loading…</td></tr>';
      try{
        const j=await getJSON(url);
        const items=j.objects||j.items||[];
        renderList(items);
        logLine(`Listed ${items.length} object(s) from ${bucket}${prefix?` with prefix "${prefix}"`:''}.`);
      }catch(e){tbody.innerHTML=`<tr><td colspan=3>Error: ${e.message}</td></tr>`;logLine(`list-input failed: ${e.message}`);}
    }

    function fmtToOption(v){
      if(v==='JPEG2000')return'keep';
      if(v==='TIFF')return'tiff';
      if(v==='RAW')return'raw';
      return'keep';
    }

    function statusPill(s){
      s=(s||'RUNNING').toUpperCase();
      if(s==='SUCCEEDED'||s==='COMPLETED') return `<span class="pill ok">SUCCEEDED</span>`;
      if(s==='FAILED') return `<span class="pill err">FAILED</span>`;
      if(s==='PENDING'||s==='QUEUED') return `<span class="pill run">QUEUED</span>`;
      return `<span class="pill run">${s}</span>`;
    }

    function renderJobs(){
      const tbody=$('progTbody');
      if(jobs.length===0){ tbody.innerHTML='<tr><td colspan="8" class="small">No jobs yet</td></tr>'; return; }
      tbody.innerHTML=jobs.map((j,i)=>`
        <tr>
          <td><button class="expand-btn" data-idx="${i}" aria-expanded="false">Details</button></td>
          <td>${i+1}</td>
          <td class="mono">${j.key}</td>
          <td class="mono">${j.jobId||'—'}</td>
          <td>${statusPill(j.status)}</td>
          <td>
            <progress max="100" value="${j.percent||0}"></progress>
            <div class="small">${j.percent||0}%</div>
          </td>
          <td>${j.exec? `<a href="${j.exec}" target="_blank" rel="noreferrer">Execution</a>`:'—'}</td>
          <td class="right"><span class="small">${j.tilesCount||0}/${j.expected||0}</span></td>
        </tr>
        <tr class="detail-row" id="detail-${i}" style="display:none;">
          <td></td>
          <td colspan="7">
            <div class="details">
              <div class="small">Final file name:</div>
              <div class="mono">${j.output_key || '—'}</div>
              <div class="small" style="margin-top:6px;">Final file size:</div>
              <div>${j.output_size!=null ? humanSize(j.output_size) : '—'}</div>
              <div class="small" style="margin-top:6px;">Time to convert:</div>
              <div>${j.duration_ms!=null ? `${Math.round(j.duration_ms/1000)}s (${j.duration_ms} ms)` : '—'}</div>
              <div class="small" style="margin-top:6px;">ECS Task/Container ID:</div>
              <div class="mono">${j.task_arn || '—'}</div>
            </div>
          </td>
        </tr>
      `).join('');

      // wire expanders
      tbody.querySelectorAll('.expand-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const idx=btn.dataset.idx;
          const row=$(`detail-${idx}`);
          const open=row.style.display!=='none';
          row.style.display=open?'none':'table-row';
          btn.setAttribute('aria-expanded', String(!open));
          btn.textContent = !open ? 'Hide' : 'Details';
        });
      });
    }

    async function doConvert(){
      if(selectedKeys.length===0) return;
      const tilesTotal=parseInt($('tilesTotal').value,10)||1; // 1 = no split
      const tilesGrid=Math.sqrt(tilesTotal)|0;
      const formatOption=fmtToOption($('format').value);

      logLine(`Submitting ${selectedKeys.length} job(s): tiles=${tilesTotal}, format=${formatOption}`);

      // Launch one /split per file (parallel)
      const submissions=selectedKeys.map(async(key)=>{
        const body={
          inputBucket: INPUT_BUCKET,
          inputKey: key,
          outputBucket: OUTPUT_BUCKET,
          params: { tilesTotal, tilesGrid, formatOption }
        };
        try{
          const res=await postJSON(`${window.API_BASE}/split`, body);
          const jobId=res.jobId||res.job_id||null;
          const expected=res.expectedTiles||tilesTotal;
          const exec=res.links?.execution;
          const j={ key, jobId, expected, tilesCount:0, percent:0, status:'RUNNING', exec,
            // details (will be filled from status-progress if provided)
            output_key:null, output_size:null, duration_ms:null, task_arn:null
          };
          jobs.push(j);
          logLine(`Started job ${jobId} for ${key}`);
        }catch(e){
          const j={ key, jobId:null, expected:0, tilesCount:0, percent:0, status:'FAILED', exec:null };
          jobs.push(j);
          logLine(`Failed to start for ${key}: ${e.message}`);
        }
        renderJobs();
      });

      await Promise.all(submissions);
      startPolling();
    }

    function startPolling(){
      if(pollTimer) clearInterval(pollTimer);
      pollTimer=setInterval(async()=>{
        for(const j of jobs){
          if(!j.jobId) continue;
          try{
            const s=await getJSON(`${window.API_BASE}/status-progress?jobId=${encodeURIComponent(j.jobId)}&expected=${j.expected}`);
            j.tilesCount = s.tilesCount||0;
            j.percent    = s.percent ?? (j.expected? Math.round((j.tilesCount/j.expected)*100): 0);
            j.status     = (s.state||s.status|| (j.percent===100?'SUCCEEDED':'RUNNING')).toUpperCase();

            // OPTIONAL: details if backend provides them on status-progress
            // Support several common field names
            j.output_key  = s.output_key || s.final_key || j.output_key;
            j.output_size = s.output_size || s.size_final || j.output_size;
            j.duration_ms = s.duration_ms || s.time_ms || j.duration_ms;
            j.task_arn    = s.task_arn || s.ecs_task_arn || s.container_id || j.task_arn;

          }catch(e){
            // keep trying
          }
        }
        renderJobs();

        if(jobs.length>0 && jobs.every(x => ['SUCCEEDED','COMPLETED','FAILED','CANCELLED'].includes((x.status||'').toUpperCase()))){
          clearInterval(pollTimer); pollTimer=null;
          logLine('All jobs finished.');
        }
      },1500);
    }

    $('btnRefresh').addEventListener('click', listInput);
    $('btnConvert').addEventListener('click', doConvert);
    listInput();
  </script>
</body>
</html>
