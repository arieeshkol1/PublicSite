<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TSG JP2 Pipeline — Convert</title>
  <style>
    :root { --bg:#000000; --card:#111111; --muted:#9ca3af; --text:#ffffff; --accent:#3b82f6; --ok:#16a34a; --warn:#f59e0b; --err:#ef4444; }
    html,body { height:100%; background:var(--bg); color:var(--text); font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial; margin:0; }
    .wrap { max-width:1100px; margin:24px auto; padding:0 16px; }
    .card { background:var(--card); border-radius:16px; padding:20px; box-shadow:0 6px 24px rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); color:var(--text); margin-bottom:20px; }
    header { margin-bottom:8px; }
    h1 { font-size:22px; margin:0; }
    h2 { font-size:16px; margin:18px 0 10px; color:var(--muted); font-weight:600; }
    .btn { border:1px solid rgba(255,255,255,.2); background:#1f2937; color:#fff; padding:8px 12px; border-radius:10px; cursor:pointer; }
    .btn.primary { background:var(--accent); border-color:var(--accent); }
    .btn:disabled { opacity:.6; cursor:not-allowed; }
    table { width:100%; border-collapse:collapse; }
    th,td { border-bottom:1px solid rgba(255,255,255,.15); padding:8px 10px; text-align:left; vertical-align:top; }
    th { color:var(--muted); font-weight:600; }
    .mono { font-family:ui-monospace,Menlo,Consolas,monospace; }
    .row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; align-items:end; }
    .row-2 { display:grid; grid-template-columns:1fr 200px; gap:8px; align-items:end; }
    .muted { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; line-height:18px; }
    .pill.run { background:rgba(59,130,246,.12); border:1px solid rgba(59,130,246,.35); }
    .pill.ok  { background:rgba(22,163,74,.12); border:1px solid rgba(22,163,74,.35); }
    .pill.err { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.35); }
    progress { width:120px; height:10px; }
    a { color:#93c5fd; text-decoration:none; }
    a:hover { text-decoration:underline; }
    .small { font-size:12px; color:var(--muted); }
    .right { text-align:right; }
    .log { background:#0b1220; border:1px dashed rgba(255,255,255,.3); border-radius:10px; padding:10px; color:#fff; white-space:pre-wrap; min-height:60px; }
    .details { background:#0b1220; border:1px dashed rgba(255,255,255,.25); border-radius:10px; padding:10px; margin-top:8px; }
    .expand-btn { cursor:pointer; border:1px solid rgba(255,255,255,.2); background:#0f172a; border-radius:8px; padding:4px 8px; }
    .expand-btn[aria-expanded="true"] { background:#13203a; }
  </style>
  <script>
    // API + buckets
    window.API_BASE = "https://xui5toa569.execute-api.us-east-1.amazonaws.com"; // new convert API
    const INPUT_BUCKET  = 'jp2-input-991105135552-us-east-1';
    const OUTPUT_BUCKET = 'jp2-output-991105135552-us-east-1';
  </script>
</head>
<body>
  <div class="wrap">
    <header><h1>TSG JP2 Pipeline — Convert</h1></header>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>1) Choose file(s) from Input Bucket</h2>
        <button id="btnRefresh" class="btn">Refresh</button>
      </div>
      <div class="row-2" style="margin-top:6px;">
        <div>
          <div class="muted">Prefix filter (optional)</div>
          <input id="prefix" type="text" placeholder="e.g. inbound/images/" />
        </div>
        <div>
          <div class="muted">Input bucket</div>
          <input id="inBucket" type="text" value="jp2-input-991105135552-us-east-1" />
        </div>
      </div>
      <div class="well" style="margin-top:10px;">
        <table aria-label="Input objects">
          <thead>
            <tr><th style="width:32px;"><input type="checkbox" id="checkAll"></th><th>Object Key</th><th style="width:160px;">Size</th></tr>
          </thead>
          <tbody id="inputTbody"><tr><td colspan="3" class="muted">Click Refresh</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>2) Select Format</h2>
      <select id="format" class="btn">
        <option value="JPEG2000">JPEG2000</option>
        <option value="TIFF" selected>TIFF</option>
        <option value="RAW">RAW</option>
        <option value="XML">XML</option>
        <option value="TXT">TXT</option>
        <option value="JSON">JSON</option>
      </select>
    </div>

    <div class="card">
      <h2>3) Run Convert</h2>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <button id="btnConvert" class="btn primary" disabled>Convert</button>
        <div class="small">Tiles (1 = no split)</div>
        <select id="tiles" class="btn">
          <option value="1" selected>1 (no split)</option>
          <option value="4">4 (2×2)</option>
          <option value="9">9 (3×3)</option>
          <option value="16">16 (4×4)</option>
          <option value="25">25 (5×5)</option>
          <option value="36">36 (6×6)</option>
        </select>
        <div class="small">Output prefix</div>
        <input id="outPrefix" class="btn" type="text" placeholder="converted/" style="min-width:160px;">
        <label class="small"><input id="overwrite" type="checkbox"/> Overwrite</label>
      </div>
    </div>

    <div class="card">
      <h2>Conversion Progress</h2>
      <table>
        <thead>
          <tr>
            <th style="width:28px;"></th>
            <th>#</th>
            <th>Input</th>
            <th>Status</th>
            <th style="width:140px;">Progress</th>
            <th>Task</th>
            <th>Output</th>
            <th class="right" style="width:80px;">Size</th>
          </tr>
        </thead>
        <tbody id="progTbody">
          <tr><td colspan="8" class="small">No job yet</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <h2>Log</h2>
      <div id="logBox" class="log">—</div>
    </div>
  </div>

  <script>
    const $=id=>document.getElementById(id);
    function humanSize(n){ if(n==null) return '—'; const kb=1024, mb=kb*1024, gb=mb*1024; if(n>=gb) return (n/gb).toFixed(2)+' GB'; if(n>=mb) return (n/mb).toFixed(2)+' MB'; if(n>=kb) return (n/kb).toFixed(2)+' KB'; return n+' B'; }
    function ts(){ return new Date().toISOString().replace('T',' ').replace('Z',''); }
    function logLine(s){ const b=$('logBox'); b.textContent=(b.textContent==='—'?'':b.textContent+'\n')+`[${ts()}] ${s}`; b.scrollTop=b.scrollHeight; }

    async function getJSON(url){ const r=await fetch(url,{headers:{'Accept':'application/json'}}); const t=await r.text(); let j; try{ j=JSON.parse(t);}catch{ j={_raw:t}; } if(!r.ok) throw new Error(j.error||j.message||j._raw||`HTTP ${r.status}`); return j; }
    async function postJSON(url,body){ const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(body)}); const t=await r.text(); let j; try{ j=JSON.parse(t);}catch{ j={_raw:t}; } if(!r.ok) throw new Error(j.error||j.message||j._raw||`HTTP ${r.status}`); return j; }

    let selectedKeys=[], currentJobId=null, pollTimer=null;

    function statusPill(s){
      s=(s||'RUNNING').toUpperCase();
      if(s==='SUCCEEDED'||s==='COMPLETED') return `<span class="pill ok">SUCCEEDED</span>`;
      if(s==='FAILED') return `<span class="pill err">FAILED</span>`;
      if(s==='PENDING'||s==='QUEUED') return `<span class="pill run">QUEUED</span>`;
      return `<span class="pill run">${s}</span>`;
    }

    function renderList(objs){
      const tbody=$('inputTbody');
      if(!objs||!objs.length){tbody.innerHTML='<tr><td colspan="3" class="muted">No objects</td></tr>';return;}
      const items=(objs||[]).map(o=>({key:o.key||o.Key,size:o.size||o.Size}));
      tbody.innerHTML=items.map(o=>`<tr><td><input type="checkbox" class="pick" data-key="${o.key}"></td><td class="mono">${o.key}</td><td>${humanSize(o.size)}</td></tr>`).join('');
      tbody.querySelectorAll('.pick').forEach(cb=>cb.addEventListener('change',updateSelection));
      $('checkAll').onchange=e=>{document.querySelectorAll('.pick').forEach(cb=>cb.checked=e.target.checked);updateSelection();};
    }

    function updateSelection(){
      selectedKeys=Array.from(document.querySelectorAll('.pick:checked')).map(cb=>cb.dataset.key);
      $('btnConvert').disabled=selectedKeys.length===0;
    }

    async function listInput(){
      const bucket=$('inBucket').value.trim()||INPUT_BUCKET;
      const prefix=$('prefix').value.trim();
      const url=`${window.API_BASE}/list-input?bucket=${encodeURIComponent(bucket)}${prefix?`&prefix=${encodeURIComponent(prefix)}`:''}`;
      const tbody=$('inputTbody');tbody.innerHTML='<tr><td colspan=3>Loading…</td></tr>';
      try{
        const j=await getJSON(url);
        const items=j.objects||j.items||[];
        renderList(items);
        logLine(`Listed ${items.length} object(s) from ${bucket}${prefix?` with prefix "${prefix}"`:''}.`);
      }catch(e){tbody.innerHTML=`<tr><td colspan=3>Error: ${e.message}</td></tr>`;logLine(`list-input failed: ${e.message}`);}
    }

    function normalizeStatus(resp){
      const job_id = resp.job_id || resp.jobId || resp.id || null;
      const state  = (resp.state || resp.status || 'RUNNING').toUpperCase();
      const items  = (resp.items || resp.objects || resp.entries || []).map((it, idx)=>({
        idx,
        key: it.key || it.input_key || it.name || '',
        size: it.size || it.input_size || null,
        status: (it.status || it.state || '').toUpperCase() || 'RUNNING',
        progress: typeof it.progress==='number' ? it.progress : (it.progress_percent ?? null),
        task_arn: it.task_arn || it.ecs_task_arn || it.container_id || null,
        output_key: it.output_key || it.output || null,
        output_size: it.output_size || it.size_final || null,
        duration_ms: it.duration_ms || it.time_ms || null,
        logs_url: it.logs_url || it.log_url || null,
        error: it.error || it.err || null
      }));
      return { job_id, state, items };
    }

    function renderProgress(resp){
      const tbody=$('progTbody');
      if(!resp || !resp.items || !resp.items.length){
        tbody.innerHTML='<tr><td colspan="8" class="small">No items</td></tr>';
        return;
      }
      tbody.innerHTML = resp.items.map((it,i)=>`
        <tr>
          <td><button class="expand-btn" data-idx="${i}" aria-expanded="false">Details</button></td>
          <td>${i+1}</td>
          <td class="mono">${it.key}</td>
          <td>${statusPill(it.status)}${it.error?`<div class="small" style="color:var(--err)">${it.error}</div>`:''}</td>
          <td>
            <progress max="100" value="${(it.progress?? (it.status==='SUCCEEDED'?100:0))}"></progress>
            <div class="small">${(it.progress!=null?it.progress: (it.status==='SUCCEEDED'?100:0))}%</div>
          </td>
          <td class="small">${it.task_arn?`<span class="mono">${it.task_arn.split('/').pop()}</span>`:'—'}${it.logs_url?`<div><a href="${it.logs_url}" target="_blank" rel="noreferrer">logs</a></div>`:''}</td>
          <td class="small">${it.output_key?`<span class="mono">${it.output_key}</span>`:'—'}</td>
          <td class="right">${humanSize(it.size)}</td>
        </tr>
        <tr class="detail-row" id="detail-${i}" style="display:none;">
          <td></td>
          <td colspan="7">
            <div class="details">
              <div class="small">Final file name:</div>
              <div class="mono">${it.output_key || '—'}</div>
              <div class="small" style="margin-top:6px;">Final file size:</div>
              <div>${humanSize(it.output_size)}</div>
              <div class="small" style="margin-top:6px;">Time to convert:</div>
              <div>${it.duration_ms!=null ? `${Math.round(it.duration_ms/1000)}s (${it.duration_ms} ms)` : '—'}</div>
              <div class="small" style="margin-top:6px;">ECS Task/Container ID:</div>
              <div class="mono">${it.task_arn || '—'}</div>
            </div>
          </td>
        </tr>
      `).join('');

      // wire expanders
      tbody.querySelectorAll('.expand-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const idx=btn.dataset.idx;
          const row=$(`detail-${idx}`);
          const open=row.style.display!=='none';
          row.style.display=open?'none':'table-row';
          btn.setAttribute('aria-expanded', String(!open));
          btn.textContent = !open ? 'Hide' : 'Details';
        });
      });
    }

    function summarize(resp){
      const n=resp.items.length;
      const done=resp.items.filter(x=>x.status==='SUCCEEDED'||x.status==='COMPLETED').length;
      const failed=resp.items.filter(x=>x.status==='FAILED').length;
      const running=n-done-failed;
      logLine(`Job ${resp.job_id||'—'} • ${done}/${n} done • ${running} running • ${failed} failed`);
    }

    function allFinished(resp){
      return resp.items.length>0 && resp.items.every(x => ['SUCCEEDED','COMPLETED','FAILED','CANCELLED'].includes(x.status));
    }

    async function doConvert(){
      if(selectedKeys.length===0) return;
      const fmt=$('format').value;
      const tiles=parseInt($('tiles').value,10)||1; // 1 = no split
      const body={
        keys:selectedKeys,
        target_format:fmt,
        output_bucket:OUTPUT_BUCKET,
        output_prefix: $('outPrefix').value.trim() || 'converted/',
        overwrite: $('overwrite').checked===true,
        tiles: tiles // backend: treat 1 as "no split"
      };
      $('btnConvert').disabled=true;
      try{
        const j=await postJSON(`${window.API_BASE}/convert`, body);
        const jobId=j.job_id||j.jobId;
        if(!jobId) throw new Error("No job_id returned from /convert");
        currentJobId=jobId;
        logLine(`Job ${jobId} submitted (${selectedKeys.length} file(s), tiles=${tiles}).`);
        startPolling(jobId);
      }catch(e){
        logLine(`Convert error: ${e.message}`);
      }finally{
        $('btnConvert').disabled=false;
      }
    }

    function startPolling(jobId){
      clearInterval(pollTimer);
      pollTimer=setInterval(async()=>{
        try{
          const raw=await getJSON(`${window.API_BASE}/status/${encodeURIComponent(jobId)}?detailed=1`);
          const norm=normalizeStatus(raw);
          renderProgress(norm);
          summarize(norm);
          if(allFinished(norm)){ clearInterval(pollTimer); pollTimer=null; logLine(`Job ${norm.job_id} finished.`); }
        }catch(e){
          logLine(`Status error: ${e.message}`);
        }
      }, 2000);
    }

    $('btnRefresh').addEventListener('click', listInput);
    $('btnConvert').addEventListener('click', doConvert);
    listInput();
  </script>
</body>
</html>
