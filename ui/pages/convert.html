<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TSG · Convert (Hardened)</title>
  <style>
    body{font:14px/1.5 system-ui,Segoe UI,Roboto,Arial;color:#e7ecf7;background:#0b1020;margin:0}
    .wrap{max-width:1100px;margin:24px auto;padding:0 16px}
    .card{background:#121a34;border:1px solid #233059;border-radius:16px;padding:16px;margin-bottom:16px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    input,select,button{background:#0f172a;color:#e7ecf7;border:1px solid #233059;border-radius:10px;padding:8px 10px}
    button.primary{background:#1e3a8a;border-color:#1e3a8a}
    code,kbd{background:#0f172a;border:1px solid #233059;border-radius:6px;padding:2px 6px}
    .ok{color:#22c55e}.warn{color:#f59e0b}.err{color:#ef4444}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    .small{font-size:12px;color:#96a2c0}
  </style>
  <script>
    // IMPORTANT: set your real API base (stage URL)
    window.API_BASE = "https://<your-api-id>.execute-api.us-east-1.amazonaws.com";
    const INPUT_BUCKET  = 'jp2-input-991105135552-us-east-1';
    const OUTPUT_BUCKET = 'jp2-output-991105135552-us-east-1';

    async function postJSON(url, body){
      const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});
      if(!r.ok) throw new Error(await r.text()); return r.json();
    }
    async function getJSON(url){ const r = await fetch(url); if(!r.ok) throw new Error(await r.text()); return r.json(); }
    function el(id){return document.getElementById(id);}

    async function startConvert(){
      el('status').textContent = 'Submitting convert...';
      const key = el('inputKey').value.trim();
      const tiles = parseInt(el('tiles').value||'16',10);
      if(!key){ el('status').textContent='Pick an input key first'; return; }
      const res = await postJSON(`${window.API_BASE}/convert`, { keys:[key], tiles, format:'raw', preview:false });
      el('jobId').textContent = res.job_id;
      el('status').innerHTML = '<span class=ok>Launched</span>. Waiting for RAW artifacts...';
      pollForRaw(res.job_id, tiles);
    }

    async function listOutput(prefix){
      const url = `${window.API_BASE}/list-output?bucket=${encodeURIComponent(OUTPUT_BUCKET)}&prefix=${encodeURIComponent(prefix||'')}`;
      const json = await getJSON(url);
      return json.objects||[];
    }
    function countRaw(objects){
      const bins = objects.filter(o=>o.key.endsWith('.bin')).length;
      const hdrs = objects.filter(o=>o.key.endsWith('.hdr')).length;
      return {bin:bins, hdr:hdrs};
    }
    async function pollForRaw(jobId, expectedTiles){
      const prefix = `tiles/${jobId}/`;
      let tries = 0; const maxTries = 90;
      while(tries++ < maxTries){
        const objs = await listOutput(prefix);
        const c = countRaw(objs);
        el('progress').textContent = `RAW: ${c.bin} bins / ${c.hdr} hdrs (expected ${expectedTiles})`;
        if(c.bin===expectedTiles && c.hdr===expectedTiles){
          el('status').innerHTML = '<span class=ok>Convert COMPLETE</span> — RAW pairs ready.';
          return;
        }
        await new Promise(r=>setTimeout(r, 2000));
      }
      el('status').innerHTML = '<span class=warn>Timeout</span> waiting for RAW pairs. Check task logs.';
    }
    async function refreshInputs(){
      const data = await getJSON(`${window.API_BASE}/list-input`);
      const sel = el('inputKey'); sel.innerHTML='';
      (data.objects||[]).forEach(o=>{
        const opt = document.createElement('option'); opt.value=o.key; opt.textContent=`${o.key} (${o.size}B)`; sel.appendChild(opt);
      });
    }
    window.addEventListener('load', ()=>{ refreshInputs(); });
  </script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Convert (TIFF → RAW)</h2>
      <div class="row">
        <label>Input object
          <select id="inputKey" style="min-width:360px"></select>
        </label>
        <label>Tiles
          <select id="tiles">
            <option>4</option><option selected>16</option><option>25</option><option>36</option>
          </select>
        </label>
        <button class="primary" onclick="startConvert()">Start Convert</button>
      </div>
      <div class="small">Contract: convert ALWAYS emits <code>.bin + .hdr</code> pairs and forbids <code>.jp2</code> under <code>tiles/convert-*</code>.</div>
      <div class="mono small" id="jobId"></div>
      <div id="status" class="small"></div>
      <div id="progress" class="small"></div>
    </div>
  </div>
</body>
</html>
