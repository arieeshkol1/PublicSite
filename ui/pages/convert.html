<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Convert — TSG</title>
  <!-- Optionally set your API base here so S3 static hosting can reach the API Gateway domain -->
  <meta name="api-base" content="">
  <link rel="icon" href="/assets/tsg-logo.svg">
  <style>
    :root{ --bg:#0b1020; --panel:#121a34; --accent:#45a1ff; --text:#e7ecf7; --muted:#96a2c0; --border:#233059; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--text); background:linear-gradient(180deg,#0b1020, #0d1330 40%, #0b1020 100%); }
    .container{ max-width:1100px; margin:0 auto; padding:1rem 1.25rem; }
    h2{ margin: .25rem 0 1rem; }
    .card{ border:1px solid var(--border); background:rgba(10,16,36,.4); border-radius:1rem; padding:1rem; }
    .grid{ display:grid; gap:1rem; grid-template-columns: repeat(12, 1fr); }
    .col-12{ grid-column: span 12; }
    .col-8{ grid-column: span 8; }
    .col-4{ grid-column: span 4; }
    label{ font-size:.9rem; color:var(--muted); }
    select,input[type="text"]{ width:100%; padding:.55rem .6rem; border-radius:.55rem; color:var(--text); border:1px solid var(--border); background:rgba(255,255,255,.03); }
    .btn{ appearance:none; border:1px solid var(--border); background:rgba(255,255,255,.02); color:var(--text); padding:.6rem .9rem; border-radius:.6rem; cursor:pointer; }
    .btn:hover{ border-color:var(--accent); }
    .table{ width:100%; border-collapse:collapse; }
    .table th,.table td{ border-bottom:1px solid var(--border); padding:.5rem .25rem; font-size:.92rem; }
    .hint{ color:var(--muted); }
    .log{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size:.9rem; white-space:pre-wrap; background:rgba(0,0,0,.25); border:1px dashed var(--border); border-radius:.6rem; padding:.75rem; min-height:4rem; }
    .badge{ border:1px solid var(--border); padding:.15rem .45rem; border-radius:.5rem; color:var(--muted); font-size:.75rem; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Convert</h2>
    <div class="card">
      <div class="grid">
        <div class="col-8">
          <label>Step 1 — Prefix in <span class="badge">input</span> bucket</label>
          <input id="prefix" type="text" placeholder="e.g. inbound/images/" />
        </div>
        <div class="col-4" style="display:flex; align-items:end; gap:.5rem;">
          <button class="btn" id="btn-list">List files</button>
          <button class="btn" id="btn-clear">Clear</button>
        </div>

        <div class="col-12">
          <table class="table">
            <thead>
              <tr>
                <th style="width:32px"><input type="checkbox" id="check-all" /></th>
                <th>Key</th>
                <th style="width:140px">Size</th>
              </tr>
            </thead>
            <tbody id="files-body">
              <tr><td colspan="3"><span class="hint">No files loaded yet.</span></td></tr>
            </tbody>
          </table>
        </div>

        <div class="col-12">
          <label>Step 2 — Target format</label>
          <select id="format">
            <option value="JPEG2">JPEG2</option>
            <option value="TIFF">TIFF</option>
            <option value="RAW">RAW</option>
            <option value="XML">XML</option>
            <option value="TXT">TXT</option>
            <option value="JSON">JSON</option>
          </select>
        </div>

        <div class="col-12">
          <button class="btn" id="btn-submit">Submit</button>
        </div>

        <div class="col-12">
          <label>Log</label>
          <div id="log" class="log">–</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Resolve API base in this order:
    // window.API_BASE → ?api= URL param → <meta name="api-base"> → localStorage → '' (same origin)
    (function(){
      const url = new URL(window.location.href);
      const paramApi = url.searchParams.get('api');
      const metaApi  = (document.querySelector('meta[name="api-base"]')||{}).content || '';
      const lsApi    = localStorage.getItem('API_BASE') || '';
      const apiBase  = (window.API_BASE || paramApi || metaApi || lsApi || '').replace(/\/$/, '');
      if (paramApi && paramApi !== lsApi) localStorage.setItem('API_BASE', apiBase);
      window.__API_BASE__ = apiBase; // debug
    })();

    const api = (p)=> (window.__API_BASE__ ? window.__API_BASE__ : '') + p;
    const fmt = (b)=>{const u=['B','KB','MB','GB','TB'];let i=0,v=b||0;while(v>1024&&i<u.length-1){v/=1024;i++;}return `${v.toFixed(1)} ${u[i]}`;};
    const log = (m)=>{ document.getElementById('log').textContent = m; };

    async function listFiles(){
      const prefix = document.getElementById('prefix').value || '';
      log('Listing…');
      try{
        const r = await fetch(api(`/list-input?prefix=${encodeURIComponent(prefix)}`));
        if(!r.ok){ log(`List failed: HTTP ${r.status}`); return; }
        const d = await r.json();
        const body = document.getElementById('files-body');
        body.innerHTML = '';
        if(!d.files || !d.files.length){ body.innerHTML = '<tr><td colspan="3"><span class="hint">No files.</span></td></tr>'; return; }
        for(const f of d.files){
          const tr = document.createElement('tr');
          tr.innerHTML = `<td><input type="checkbox" class="pick" data-key="${f.key}"></td>`+
                         `<td>${f.key}</td>`+
                         `<td>${fmt(f.size)}</td>`;
          body.appendChild(tr);
        }
        log(`Loaded ${d.files.length} file(s).`);
      }catch(e){ log('List error: '+ e); }
    }

    async function submitConvert(){
      const picks = Array.from(document.querySelectorAll('.pick:checked')).map(cb=>cb.dataset.key);
      const target = document.getElementById('format').value;
      if(!picks.length){ log('Select at least one file.'); return; }
      log('Submitting conversion…');
      try{
        const payload = { keys: picks, target_format: target };
        const r = await fetch(api('/convert'), { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await r.json().catch(()=>({}));
        if(!r.ok){ log(`Submit failed (${r.status}). ${data.error||''}`); return; }
        log(`Job ${data.job_id} submitted. Tracking…`);
        poll(data.job_id);
      }catch(e){ log('Submit error: '+ e); }
    }

    async function poll(jobId){
      try{
        const r = await fetch(api(`/status/${encodeURIComponent(jobId)}`));
        const d = await r.json().catch(()=>({}));
        if(!r.ok){ log(`Status error: HTTP ${r.status}`); return; }
        const lines = [
          `status: ${d.status || '—'}`,
          `started_at: ${d.started_at || '—'}`,
          `finished_at: ${d.finished_at || '—'}`,
          `duration_sec: ${d.duration_sec ?? '—'}`,
          `cpu.avg: ${d.cpu?.avg ?? '—'} | cpu.p95: ${d.cpu?.p95 ?? '—'}`,
          `outputs: ${(d.outputs||[]).join(', ') || '—'}`,
          `error: ${d.error || '—'}`
        ];
        log(lines.join('\\n'));
        if(d.status === 'queued' || d.status === 'running') setTimeout(()=>poll(jobId), 1500);
      }catch(e){ log('Poll error: '+ e); }
    }

    document.getElementById('btn-list').addEventListener('click', listFiles);
    document.getElementById('btn-clear').addEventListener('click', ()=>{ document.getElementById('files-body').innerHTML=''; log('–'); });
    document.getElementById('btn-submit').addEventListener('click', submitConvert);
    document.getElementById('check-all').addEventListener('change', (e)=>{
      document.querySelectorAll('.pick').forEach(cb=> cb.checked = e.target.checked);
    });

    // Auto-list on load if API base is known
    if (window.__API_BASE__) listFiles();
  </script>
</body>
</html>
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TSG JP2 Pipeline — Convert</title>
  <style>
    :root {
      --bg:#000000;
      --card:#111111;
      --muted:#d1d5db;
      --text:#ffffff;
      --accent:#3b82f6;
    }
    html,body { height:100%; background:var(--bg); color:var(--text);
      font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial; margin:0; }
    .wrap { max-width:1100px; margin:24px auto; padding:0 16px; }
    .card { background:var(--card); border-radius:16px; padding:20px;
      box-shadow:0 6px 24px rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); color:var(--text); }
    header { margin-bottom:8px; }
    h1 { font-size:22px; margin:0; }
    h2 { font-size:16px; margin:18px 0 10px; color:var(--muted); font-weight:600; }
    .row { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; }
    .muted { color:var(--muted); }
    .mono { font-family:ui-monospace,Menlo,Consolas,monospace; }
    .btn { border:1px solid rgba(255,255,255,.2); background:#1f2937; color:#fff; padding:8px 12px; border-radius:10px; cursor:pointer; }
    .btn.primary { background:var(--accent); border-color:var(--accent); }
    .btn:disabled { opacity:.6; cursor:not-allowed; }
    table { width:100%; border-collapse:collapse; }
    th,td { border-bottom:1px solid rgba(255,255,255,.2); padding:8px 10px; text-align:left; }
    th { color:var(--muted); font-weight:600; }
    .well { background:#1f2937; border:1px dashed rgba(255,255,255,.3); border-radius:10px; padding:10px; color:#fff; }
    .log { white-space:pre-wrap; }
    select, input[type="text"] { width:100%; padding:8px 10px; border-radius:10px; border:1px solid rgba(255,255,255,.2); background:#0f172a; color:#fff; }
    .row-2 { display:grid; grid-template-columns:1fr 200px; gap:8px; align-items:end; }
  </style>
  <script>
    // Ensure API base is set to your execute-api domain (no trailing slash).
    window.API_BASE = window.API_BASE || "https://xui5toa569.execute-api.us-east-1.amazonaws.com";
  </script>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>TSG JP2 Pipeline — Convert</h1>
      <div class="muted">API: <span class="mono" id="apiBaseLbl"></span></div>
    </header>

    <!-- STEP 1: pick file(s) from input bucket -->
    <div class="card">
      <div class="row">
        <h2>1) Choose file(s) from Input Bucket</h2>
        <button id="btnRefresh" class="btn">Refresh</button>
      </div>

      <div class="row-2" style="margin-top:6px;">
        <div>
          <div class="muted">Prefix filter (optional)</div>
          <input id="prefix" type="text" placeholder="e.g. inbound/images/" />
        </div>
        <div>
          <div class="muted">Input bucket</div>
          <input id="inBucket" type="text" value="jp2-input-991105135552-us-east-1" />
        </div>
      </div>

      <div class="well" style="margin-top:10px;">
        <table aria-label="Input objects">
          <thead>
            <tr>
              <th style="width:32px;"><input type="checkbox" id="checkAll"></th>
              <th>Object Key</th>
              <th style="width:140px;">Size</th>
            </tr>
          </thead>
          <tbody id="inputTbody">
            <tr><td colspan="3" class="muted">Click Refresh</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- STEP 2: target format -->
    <div class="card">
      <h2>2) Target Format</h2>
      <div style="max-width:360px;">
        <select id="format">
          <option value="JPEG2">JPEG2</option>
          <option value="TIFF">TIFF</option>
          <option value="RAW">RAW</option>
          <option value="XML">XML</option>
          <option value="TXT">TXT</option>
          <option value="JSON">JSON</option>
        </select>
      </div>
    </div>

    <!-- STEP 3: submit + log -->
    <div class="card">
      <div class="row">
        <h2>3) Submit</h2>
        <button id="btnSubmit" class="btn primary" disabled>Convert</button>
      </div>
      <div class="muted">Selected files: <span id="selectedCount" class="mono">0</span></div>
      <div class="well" style="margin-top:10px;">
        <div id="log" class="mono log">—</div>
      </div>
    </div>

    <div class="muted" style="text-align:center; margin:20px 0;">TSG © Secure JP2 Pipeline</div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const setText=(id,v)=>{const n=$(id);if(n)n.textContent=v??''};
    function humanSize(n){ if(n==null) return '—'; const kb=1024, mb=kb*1024, gb=mb*1024;
      if(n>=gb) return (n/gb).toFixed(2)+' GB'; if(n>=mb) return (n/mb).toFixed(2)+' MB'; if(n>=kb) return (n/kb).toFixed(2)+' KB'; return n+' B'; }
    async function getJSON(url){
      const r=await fetch(url,{credentials:'omit'});
      const t=await r.text(); let j; try{ j=JSON.parse(t);}catch(err){ j={ _raw:t }; }
      if(!r.ok) throw new Error(j.error||j._raw||`HTTP ${r.status}`);
      return j;
    }
    async function postJSON(url, body){
      const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),credentials:'omit'});
      const t=await r.text(); let j; try{ j=JSON.parse(t);}catch(err){ j={ _raw:t }; }
      if(!r.ok) throw new Error(j.error||j._raw||`HTTP ${r.status}`);
      return j;
    }
    function log(msg){ const el=$('log'); if(el){ el.textContent = String(msg); } console.log(msg); }

    setText('apiBaseLbl', window.API_BASE);

    // Selections
    let selectedKeys = [];

    function renderList(objs){
      const tbody=$('inputTbody');
      if(!tbody) return;
      if(!objs || !objs.length){
        tbody.innerHTML = '<tr><td colspan="3" class="muted">No objects</td></tr>';
        return;
      }
      tbody.innerHTML = objs.map(o => `
        <tr>
          <td><input type="checkbox" class="pick" data-key="${o.key}"></td>
          <td class="mono">${o.key}</td>
          <td>${humanSize(o.size)}</td>
        </tr>`).join('');

      // events
      tbody.addEventListener('change', onPickChange, { once:true, passive:true });
      $('checkAll').onchange = e => {
        document.querySelectorAll('.pick').forEach(cb => cb.checked = e.target.checked);
        updateSelection();
      };
      updateSelection();
    }

    function updateSelection(){
      selectedKeys = Array.from(document.querySelectorAll('.pick:checked')).map(cb => cb.dataset.key);
      setText('selectedCount', selectedKeys.length);
      $('btnSubmit').disabled = selectedKeys.length === 0;
    }

    function onPickChange(){
      document.querySelectorAll('.pick').forEach(cb => cb.addEventListener('change', updateSelection));
      updateSelection();
    }

    async function listInput(){
      const bucket = $('inBucket').value.trim();
      const prefix = $('prefix').value.trim();
      const url = `${window.API_BASE}/list-input?bucket=${encodeURIComponent(bucket)}${prefix?`&prefix=${encodeURIComponent(prefix)}`:''}`;
      const tbody=$('inputTbody'); if(tbody) tbody.innerHTML='<tr><td colspan="3" class="muted">Loading…</td></tr>';
      try{
        const j = await getJSON(url);
        // split/merge returns {objects:[{key,size},...]}
        const items = Array.isArray(j.objects) ? j.objects : [];
        renderList(items);
      }catch(e){
        if(tbody) tbody.innerHTML = `<tr><td colspan="3">Error: ${e.message}</td></tr>`;
        log(`list-input failed: ${e.message}`);
      }
    }

    async function submitConvert(){
      if(!selectedKeys.length){ log('Select at least one file.'); return; }
      const payload = { keys: selectedKeys, target_format: $('format').value };
      log('Submitting conversion…');
      try{
        const j = await postJSON(`${window.API_BASE}/convert`, payload);
        log(`Job ${j.job_id || '—'} submitted.`);
      }catch(e){
        log(`Submit failed: ${e.message}`);
      }
    }

    // Wire & init
    $('btnRefresh')?.addEventListener('click', listInput);
    $('btnSubmit')?.addEventListener('click', submitConvert);
    // optional: auto-list on load if bucket is set
    listInput();
  </script>
</body>
</html>
