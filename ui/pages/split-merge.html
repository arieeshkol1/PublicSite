<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TSG JP2 Pipeline — Split / Merge</title>
  <style>
    :root {
      --bg:#000000;
      --card:#111111;
      --muted:#d1d5db;
      --text:#ffffff;
      --accent:#3b82f6;
      --danger:#ef4444;
    }
    html,body { height:100%; background:var(--bg); color:var(--text);
      font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial; margin:0; }
    .wrap { max-width:1200px; margin:24px auto; padding:0 16px; }
    .card { background:var(--card); border-radius:16px; padding:20px;
      box-shadow:0 6px 24px rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); color:var(--text); }
    header { margin-bottom:8px; }
    h1 { font-size:22px; margin:0; }
    h2 { font-size:16px; margin:18px 0 10px; color:var(--muted); font-weight:600; }
    .row { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; }
    .muted { color:var(--muted); }
    .mono { font-family:ui-monospace,Menlo,Consolas,monospace; }
    .btn { border:1px solid rgba(255,255,255,.2); background:#1f2937; color:#fff; padding:8px 12px; border-radius:10px; cursor:pointer; }
    .btn.primary { background:var(--accent); border-color:var(--accent); }
    .btn:disabled { opacity:.6; cursor:not-allowed; }
    table { width:100%; border-collapse:collapse; }
    th,td { border-bottom:1px solid rgba(255,255,255,.2); padding:8px 10px; text-align:left; }
    th { color:var(--muted); font-weight:600; }
    .grid { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:6px; }
    .opt { padding:8px 10px; border:1px solid rgba(255,255,255,.2); border-radius:10px; text-align:center; cursor:pointer; user-select:none; }
    .opt.active { outline:2px solid var(--accent); }
    .bar { height:10px; border-radius:999px; background:#374151; border:1px solid rgba(255,255,255,.2); overflow:hidden; }
    .bar > i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#60a5fa,var(--accent)); }
    .links { display:flex; gap:10px; flex-wrap:wrap; }
    .links a { color:var(--accent); text-decoration:none; }
    .well { background:#1f2937; border:1px dashed rgba(255,255,255,.3); border-radius:10px; padding:10px; color:#fff; }
    .err { background:#7f1d1d; border:1px solid #fecaca; color:#fee2e2; padding:10px; border-radius:10px; margin-bottom:10px; display:none; white-space:pre-wrap; }
    .split-merge { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  </style>
  <script>
    window.API_BASE = "https://qmiu91xhgk.execute-api.us-east-1.amazonaws.com";
    window.UNITE_API_ARN = "arn:aws:apigateway:us-east-1::/apis/xui5toa569/routes/ir66u0r";
  </script>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>TSG JP2 Pipeline — Split / Merge</h1>
    </header>

    <div id="errorBox" class="err"></div>
    <div class="muted">API: <span class="mono" id="apiBaseLbl"></span> • Output: <span id="outBucketLbl" class="mono"></span></div>

    <div class="split-merge">
      <!-- Split on left -->
      <div>
        <!-- Split panels ... unchanged -->
      </div>

      <!-- Unite on right -->
      <div>
        <!-- Unite panels ... unchanged -->
      </div>
    </div>

    <div class="muted" style="text-align:center; margin:20px 0;">TSG © Secure JP2 Pipeline</div>
  </div>

  <script>
    const INPUT_BUCKET = 'jp2-input-991105135552-us-east-1';
    const OUTPUT_BUCKET = 'jp2-output-991105135552-us-east-1';
    const $ = id => document.getElementById(id);
    const setText=(id,v)=>{const n=$(id);if(n)n.textContent=v??''};
    const termTypes = new Set(['ExecutionSucceeded','ExecutionFailed','ExecutionAborted','ExecutionTimedOut']);
    let uPollTimer=null;

    async function listUnite(){
      const tbody=$('uniteTbody');
      if(tbody) tbody.innerHTML='<tr><td colspan=2>Loading…</td></tr>';
      try{
        const j=await fetch(`${window.API_BASE}/list-output?bucket=${OUTPUT_BUCKET}`).then(r=>r.json());
        const folders=new Set();
        (j.objects||[]).forEach(o=>{
          const m=o.key.match(/^tiles\/(.+?)\//);
          if(m) folders.add(m[1]);
        });
        if(!folders.size){ tbody.innerHTML='<tr><td colspan=2>No tile folders</td></tr>'; return; }
        tbody.innerHTML=[...folders].map(f=>`<tr><td class="mono">${f}</td><td><button class="btn" data-folder="${f}">Select</button></td></tr>`).join('');
        tbody.onclick=ev=>{
          const b=ev.target.closest('button[data-folder]'); if(!b)return;
          const folder=b.getAttribute('data-folder');
          setText('uJobId',folder);
          $('btnUnite').disabled=false;
        };
      }catch(e){tbody.innerHTML=`<tr><td colspan=2>Error: ${e}</td></tr>`;}
    }

    async function doUnite(){
      const jobId=$('uJobId').textContent; if(!jobId||jobId==='—') return;
      try{
        const body={outputBucket:OUTPUT_BUCKET,jobId};
        const r=await fetch(`${window.API_BASE}/unite`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const j=await r.json();
        setText('uFinalKey',j.expectedFinalKey||`final/unite-${jobId}.jp2`);
        setText('uExecArn',j.executionArn||'—');
        const le=$('linkExecUnite'); if(le) le.href=j.links?.execution||'#';
        startUnitePolling(jobId);
      }catch(e){setText('uFinalKey',`Error: ${e}`)}
    }

    function startUnitePolling(jobId){
      stopUnitePolling();
      const el=$('uStepsLive'); if(el) el.textContent='—';
      uPollTimer=setInterval(()=>refreshUniteStatus(jobId),1500);
      refreshUniteStatus(jobId);
    }
    function stopUnitePolling(){ if(uPollTimer){ clearInterval(uPollTimer); uPollTimer=null; } }

    async function refreshUniteStatus(jobId){
      try{
        const out = await fetch(`${window.API_BASE}/status-history/${encodeURIComponent(jobId)}`).then(r=>r.json());
        const events = Array.isArray(out?.events) ? out.events : [];
        renderUSteps(events);
        if(events.some(e=> termTypes.has(e.type))){ stopUnitePolling(); }
      }catch(_){ $('uStepsLive').textContent='Status error'; }
    }

    function renderUSteps(steps){
      const el=$('uStepsLive');
      if(!el)return;
      if(!steps.length){el.textContent='—';return;}
      el.textContent=steps.map(e=>`[${e.time}] ${e.type}${e.detail?` — ${e.detail}`:''}`).join('\n');
    }

    $('btnRefreshUnite')?.addEventListener('click',listUnite);
    $('btnUnite')?.addEventListener('click',doUnite);

    listUnite();
  </script>
</body>
</html>
