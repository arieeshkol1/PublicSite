<!-- Hard-wire API base (CDK output: ApiEndpoint) -->
<script>window.API_BASE="https://<YOUR-API-ID>.execute-api.us-east-1.amazonaws.com";</script>
<script>
  // Fixed buckets (existing ones you chose to reuse)
  const INPUT_BUCKET  = 'jp2-input-991105135552-us-east-1';
  const OUTPUT_BUCKET = 'jp2-output-991105135552-us-east-1';

  // Helpers
  const $ = (id) => document.getElementById(id);
  const setText = (id, v) => { const n=$(id); if(n) n.textContent = v ?? ''; };
  function humanSize(n){ if(n==null) return '—'; const kb=1024, mb=kb*1024, gb=mb*1024; if(n>=gb) return (n/gb).toFixed(2)+' GB'; if(n>=mb) return (n/mb).toFixed(2)+' MB'; if(n>=kb) return (n/kb).toFixed(2)+' KB'; return n+' B'; }
  async function getJSON(url){
    const r = await fetch(url);
    const text = await r.text();
    try { return JSON.parse(text); }
    catch { throw new Error(`Expected JSON from ${url}. Got: ${text.slice(0,120).replace(/\s+/g,' ')}`); }
  }

  // State
  let selectedKey = null, tilesTotal = 16, jobId = null, expected = 0, pollTimer = null;

  function buildTileOptions(){
    const root = $('tileOpts'); if(!root) return; root.innerHTML = '';
    [9,16,25,36].forEach(val => {
      const d = document.createElement('div');
      d.className = 'opt' + (val===tilesTotal ? ' active' : '');
      d.textContent = `${val} (${Math.sqrt(val)}×${Math.sqrt(val)})`;
      d.onclick = () => { tilesTotal = val; [...root.children].forEach(c=>c.classList.remove('active')); d.classList.add('active'); };
      root.appendChild(d);
    });
  }

  async function listInput(){
    setText('inBucketLbl', INPUT_BUCKET);
    setText('outBucketLbl', OUTPUT_BUCKET);
    if ($('inputTbody')) $('inputTbody').innerHTML = '<tr><td colspan="3" class="muted">Loading…</td></tr>';
    try{
      const j = await getJSON(`${window.API_BASE}/list-input?bucket=${encodeURIComponent(INPUT_BUCKET)}`);
      const items = (j.objects||[]).filter(o => String(o.key||'').toLowerCase().endsWith('.jp2'));
      if(!items.length){ if ($('inputTbody')) $('inputTbody').innerHTML = '<tr><td colspan="3" class="muted">No JP2 objects</td></tr>'; return; }
      if ($('inputTbody')) $('inputTbody').innerHTML = items.map(o => `
        <tr>
          <td class="mono">${o.key}</td>
          <td>${humanSize(o.size)}</td>
          <td><button class="btn" data-key="${o.key}">Select</button></td>
        </tr>`).join('');
      if ($('inputTbody')) $('inputTbody').onclick = (ev)=>{
        const b = ev.target.closest('button[data-key]'); if(!b) return;
        selectedKey = b.getAttribute('data-key');
        setText('selectedKey', selectedKey);
        if ($('btnSplit')) $('btnSplit').disabled = !selectedKey;
      };
    } catch(e){
      if ($('inputTbody')) $('inputTbody').innerHTML = `<tr><td colspan="3">Error: ${e.message}</td></tr>`;
    }
  }

  async function doSplit(){
    if(!selectedKey) return;
    if ($('btnSplit')) $('btnSplit').disabled = true;
    setText('splitMsg','Starting…');
    try{
      const fmtEl = $('fmt');
      const formatOption = (fmtEl && fmtEl.value) ? fmtEl.value : 'tiff';
      const body = {
        inputBucket: INPUT_BUCKET,
        inputKey: selectedKey,
        outputBucket: OUTPUT_BUCKET,
        params: {
          tilesTotal: tilesTotal,
          tilesGrid: Math.sqrt(tilesTotal)|0,
          formatOption: formatOption
        }
      };
      const r = await fetch(`${window.API_BASE}/split`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      const text = await r.text();
      let j; try { j = JSON.parse(text); }
      catch { throw new Error(`Bad JSON from /split: ${text.slice(0,120).replace(/\s+/g,' ')}`); }
      if(!r.ok) throw new Error(j.error||'split failed');

      setText('splitMsg','Split started.');
      setText('execArn', j.executionArn||'—');
      setText('jobId', j.jobId||'—'); setText('jobId2', j.jobId||'—');
      expected = j.expectedTiles||tilesTotal; setText('tilesExpected', expected); setText('tilesCount','0');
      jobId = j.jobId; if ($('linkExec')) $('linkExec').href = j.links?.execution || '#';
      setText('finalKey', `final/unite-${jobId}.jp2`);
      startPolling();
    } catch(e){
      setText('splitMsg', `Error: ${e.message}`);
    } finally {
      if ($('btnSplit')) $('btnSplit').disabled = !selectedKey;
    }
  }

  function startPolling(){ stopPolling(); pollTimer = setInterval(tick, 1500); tick(); }
  function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer = null; } }

  async function tick(){
    if(!jobId) return;
    try{
      const j1 = await getJSON(`${window.API_BASE}/status-progress?jobId=${encodeURIComponent(jobId)}&expected=${expected}`);
      const done = j1.tilesCount||0; const pct = j1.percent ?? (expected? Math.round((done/expected)*100): 0);
      setText('tilesCount', done); const barFill = $('barFill'); if (barFill) barFill.style.width = `${pct}%`;
      await refreshFiles(jobId);
      await refreshHistory($('execArn')?.textContent);
    }catch(e){ const fl = $('filesLive'); if (fl) fl.textContent = `Status error: ${e.message}`; }
  }

  async function refreshFiles(jid){
    if(!jid) return;
    const prefix = `tiles/${jid}/`;
    try{
      const j = await getJSON(`${window.API_BASE}/list-output?bucket=${encodeURIComponent(OUTPUT_BUCKET)}&prefix=${encodeURIComponent(prefix)}`);
      renderFiles(j.objects||[]);
    }catch(e){ const fl = $('filesLive'); if (fl) fl.textContent = `List error: ${e.message}`; }
  }

  function renderFiles(objs){
    const out = $('filesLive'); if(!out) return;
    if(!objs || !objs.length){ out.textContent = '—'; return; }
    const rx = /_(\d+)\.(?:jp2|tif|tiff|bin|hdr)$/i;
    const lines = objs.slice().sort((a,b)=>{
      const ak=String(a.key||''), bk=String(b.key||'');
      const am=ak.match(rx), bm=bk.match(rx);
      const ai = am? parseInt(am[1],10) : Number.MAX_SAFE_INTEGER;
      const bi = bm? parseInt(bm[1],10) : Number.MAX_SAFE_INTEGER;
      return ai===bi ? ak.localeCompare(bk) : ai-bi;
    }).map(o => `${o.key}${o.size!=null ? `  (${humanSize(o.size)})` : ''}`);
    out.textContent = lines.join('\n');
  }

  async function refreshHistory(execArn){
    if(!execArn || execArn==='—') return;
    try {
      const out = await getJSON(`${window.API_BASE}/status-history/${encodeURIComponent(execArn)}`);
      const steps = Array.isArray(out?.events) ? out.events.map(e => `[${e.time}] ${e.type}${e.detail? ` — ${e.detail}`:''}`) : [];
      renderSteps(steps);
    } catch (_) { /* ignore */ }
  }

  function renderSteps(steps){
    const el = $('stepsLive'); if(!el) return;
    if(!Array.isArray(steps) || !steps.length){ el.textContent = '—'; return; }
    el.textContent = steps.join('\n');
  }

  async function doUnite(){
    if(!jobId) return;
    try{
      const body = { outputBucket: OUTPUT_BUCKET, jobId };
      const r = await fetch(`${window.API_BASE}/unite`, { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(body) });
      const text = await r.text(); const j = JSON.parse(text);
      if(!r.ok) throw new Error(j.error||'unite failed');
      setText('finalKey', j.expectedFinalKey || `final/unite-${jobId}.jp2`);
      if ($('linkExec')) $('linkExec').href = j.links?.execution || '#';
    } catch(e){ console.error(e); }
  }

  // Wire
  $('btnRefresh')?.addEventListener('click', listInput);
  $('btnSplit')?.addEventListener('click', doSplit);
  $('btnUnite')?.addEventListener('click', doUnite);

  // Init
  buildTileOptions();
  listInput();
</script>
