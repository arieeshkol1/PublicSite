AWSTemplateFormatVersion: '2010-09-09'
Description: 'API Gateway for Mobile Knowledge Assistant'

Parameters:
  QueryHandlerLambdaArn:
    Type: String
    Description: ARN of the Query Handler Lambda function

Resources:
  # REST API
  MobileKnowledgeAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: mobile-knowledge-assistant-api
      Description: API for Mobile Knowledge Assistant
      EndpointConfiguration:
        Types:
          - REGIONAL
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 'execute-api:Invoke'
            Resource: '*'

  # /query Resource
  QueryResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MobileKnowledgeAPI
      ParentId: !GetAtt MobileKnowledgeAPI.RootResourceId
      PathPart: query

  # /health Resource
  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MobileKnowledgeAPI
      ParentId: !GetAtt MobileKnowledgeAPI.RootResourceId
      PathPart: health

  # POST /query Method
  QueryPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MobileKnowledgeAPI
      ResourceId: !Ref QueryResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestValidatorId: !Ref RequestValidator
      RequestModels:
        application/json: !Ref QueryRequestModel
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${QueryHandlerLambdaArn}/invocations'
        IntegrationResponses:
          - StatusCode: 200
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: !Ref QueryResponseModel
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
        - StatusCode: 400
        - StatusCode: 401
        - StatusCode: 429
        - StatusCode: 500

  # OPTIONS /query Method (CORS)
  QueryOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MobileKnowledgeAPI
      ResourceId: !Ref QueryResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # GET /health Method
  HealthGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MobileKnowledgeAPI
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: false
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: '{"status": "healthy", "timestamp": "$context.requestTime"}'
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200

  # Request Validator
  RequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      RestApiId: !Ref MobileKnowledgeAPI
      Name: query-request-validator
      ValidateRequestBody: true
      ValidateRequestParameters: true

  # Request Model for /query
  QueryRequestModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref MobileKnowledgeAPI
      Name: QueryRequest
      ContentType: application/json
      Schema:
        $schema: 'http://json-schema.org/draft-04/schema#'
        type: object
        required:
          - question
        properties:
          question:
            type: string
            minLength: 1
            maxLength: 1000
          mode:
            type: string
            enum:
              - multiple_choice
              - conversation
            default: conversation
          format:
            type: string
            enum:
              - short
              - long
            default: short
          language:
            type: string
            enum:
              - he
              - en
              - auto

  # Response Model for /query
  QueryResponseModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref MobileKnowledgeAPI
      Name: QueryResponse
      ContentType: application/json
      Schema:
        $schema: 'http://json-schema.org/draft-04/schema#'
        type: object
        required:
          - answer
          - language
        properties:
          answer:
            type: string
          language:
            type: string
          sourceDocumentId:
            type: string
          transcriptId:
            type: string

  # API Deployment
  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - QueryPostMethod
      - QueryOptionsMethod
      - HealthGetMethod
    Properties:
      RestApiId: !Ref MobileKnowledgeAPI
      Description: Production deployment

  # API Stage
  ProductionStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref MobileKnowledgeAPI
      DeploymentId: !Ref APIDeployment
      StageName: prod
      Description: Production stage
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50

  # CloudWatch Log Group for API Gateway
  APILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${MobileKnowledgeAPI}'
      RetentionInDays: 7

  # API Gateway Account (for CloudWatch logging)
  APIGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt APIGatewayCloudWatchRole.Arn

  # IAM Role for API Gateway CloudWatch logging
  APIGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # Usage Plan (100 requests per hour)
  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ProductionStage
    Properties:
      UsagePlanName: mobile-ka-usage-plan
      Description: Usage plan with 100 requests per hour limit
      ApiStages:
        - ApiId: !Ref MobileKnowledgeAPI
          Stage: !Ref ProductionStage
      Quota:
        Limit: 2400
        Period: DAY
      Throttle:
        BurstLimit: 10
        RateLimit: 100

  # API Key
  APIKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: ProductionStage
    Properties:
      Name: mobile-ka-api-key
      Description: API Key for Mobile Knowledge Assistant
      Enabled: true

  # Usage Plan Key (associate API Key with Usage Plan)
  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref APIKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

  # Lambda Permission for API Gateway
  QueryHandlerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref QueryHandlerLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MobileKnowledgeAPI}/*/*/*'

Outputs:
  APIEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${MobileKnowledgeAPI}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: !Sub '${AWS::StackName}-APIEndpoint'

  APIKeyId:
    Description: API Key ID
    Value: !Ref APIKey
    Export:
      Name: !Sub '${AWS::StackName}-APIKeyId'

  APIKeyValue:
    Description: API Key Value (retrieve from console)
    Value: !Sub 'Retrieve from AWS Console: API Gateway > API Keys > ${APIKey}'

  QueryEndpoint:
    Description: Query endpoint URL
    Value: !Sub 'https://${MobileKnowledgeAPI}.execute-api.${AWS::Region}.amazonaws.com/prod/query'

  HealthEndpoint:
    Description: Health check endpoint URL
    Value: !Sub 'https://${MobileKnowledgeAPI}.execute-api.${AWS::Region}.amazonaws.com/prod/health'
