AWSTemplateFormatVersion: '2010-09-09'
Description: 'Lambda functions for Mobile Knowledge Assistant'

Parameters:
  KnowledgeBaseTableName:
    Type: String
    Description: Name of the KnowledgeBase DynamoDB table
  TranscriptsTableName:
    Type: String
    Description: Name of the Transcripts DynamoDB table
  DocumentsBucketName:
    Type: String
    Description: Name of the S3 documents bucket
  DocumentIngestionRoleArn:
    Type: String
    Description: ARN of the IAM role for Document Ingestion Lambda
  AnswerRetrievalRoleArn:
    Type: String
    Description: ARN of the IAM role for Answer Retrieval Lambda
  QueryHandlerRoleArn:
    Type: String
    Description: ARN of the IAM role for Query Handler Lambda

Resources:
  # Document Ingestion Lambda Function
  DocumentIngestionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: mobile-ka-document-ingestion
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !Ref DocumentIngestionRoleArn
      Timeout: 300
      MemorySize: 512
      Architectures:
        - arm64
      Environment:
        Variables:
          KNOWLEDGE_BASE_TABLE: !Ref KnowledgeBaseTableName
          DOCUMENTS_BUCKET: !Ref DocumentsBucketName
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': json.dumps('Placeholder')}
      Description: Processes uploaded documents and indexes them in DynamoDB

  # S3 Bucket Notification Permission
  DocumentIngestionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DocumentIngestionFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub 'arn:aws:s3:::${DocumentsBucketName}'

  # Answer Retrieval Lambda Function
  AnswerRetrievalFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: mobile-ka-answer-retrieval
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !Ref AnswerRetrievalRoleArn
      Timeout: 30
      MemorySize: 256
      Architectures:
        - arm64
      Environment:
        Variables:
          KNOWLEDGE_BASE_TABLE: !Ref KnowledgeBaseTableName
          TRANSCRIPTS_TABLE: !Ref TranscriptsTableName
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': json.dumps('Placeholder')}
      Description: Retrieves answers from knowledge base and stores transcripts

  # Query Handler Lambda Function
  QueryHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: mobile-ka-query-handler
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !Ref QueryHandlerRoleArn
      Timeout: 60
      MemorySize: 256
      Architectures:
        - arm64
      Environment:
        Variables:
          ANSWER_RETRIEVAL_FUNCTION_NAME: !Ref AnswerRetrievalFunction
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': json.dumps('Placeholder')}
      Description: Handles API Gateway requests and routes to answer retrieval

  # CloudWatch Log Groups
  DocumentIngestionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${DocumentIngestionFunction}'
      RetentionInDays: 7

  AnswerRetrievalLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AnswerRetrievalFunction}'
      RetentionInDays: 7

  QueryHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${QueryHandlerFunction}'
      RetentionInDays: 7

Outputs:
  DocumentIngestionFunctionArn:
    Description: ARN of Document Ingestion Lambda function
    Value: !GetAtt DocumentIngestionFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DocumentIngestionFunctionArn'

  AnswerRetrievalFunctionArn:
    Description: ARN of Answer Retrieval Lambda function
    Value: !GetAtt AnswerRetrievalFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AnswerRetrievalFunctionArn'

  QueryHandlerFunctionArn:
    Description: ARN of Query Handler Lambda function
    Value: !GetAtt QueryHandlerFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QueryHandlerFunctionArn'

  QueryHandlerFunctionName:
    Description: Name of Query Handler Lambda function
    Value: !Ref QueryHandlerFunction
    Export:
      Name: !Sub '${AWS::StackName}-QueryHandlerFunctionName'
