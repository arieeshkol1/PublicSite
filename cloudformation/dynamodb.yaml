AWSTemplateFormatVersion: '2010-09-09'
Description: 'DynamoDB tables for Mobile Knowledge Assistant'

Resources:
  # Knowledge Base Table - stores structured records from documents
  KnowledgeBaseTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: mobile-knowledge-assistant-kb
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: recordId
          AttributeType: S
        - AttributeName: language
          AttributeType: S
        - AttributeName: documentId
          AttributeType: S
      KeySchema:
        - AttributeName: recordId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: language-index
          KeySchema:
            - AttributeName: language
              KeyType: HASH
            - AttributeName: recordId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: document-index
          KeySchema:
            - AttributeName: documentId
              KeyType: HASH
            - AttributeName: recordId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: MobileKnowledgeAssistant
        - Key: Environment
          Value: Production

  # Transcripts Table - stores question/answer history
  TranscriptsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: mobile-knowledge-assistant-transcripts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: transcriptId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
        - AttributeName: language
          AttributeType: S
      KeySchema:
        - AttributeName: transcriptId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: timestamp-index
          KeySchema:
            - AttributeName: language
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: MobileKnowledgeAssistant
        - Key: Environment
          Value: Production

Outputs:
  KnowledgeBaseTableName:
    Description: Knowledge Base DynamoDB Table Name
    Value: !Ref KnowledgeBaseTable
    Export:
      Name: !Sub '${AWS::StackName}-KnowledgeBaseTable'

  KnowledgeBaseTableArn:
    Description: Knowledge Base DynamoDB Table ARN
    Value: !GetAtt KnowledgeBaseTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-KnowledgeBaseTableArn'

  TranscriptsTableName:
    Description: Transcripts DynamoDB Table Name
    Value: !Ref TranscriptsTable
    Export:
      Name: !Sub '${AWS::StackName}-TranscriptsTable'

  TranscriptsTableArn:
    Description: Transcripts DynamoDB Table ARN
    Value: !GetAtt TranscriptsTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TranscriptsTableArn'
