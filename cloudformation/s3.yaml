AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 bucket for Mobile Knowledge Assistant documents'

Resources:
  # Knowledge Base Document Storage
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'mobile-knowledge-assistant-docs-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: MobileKnowledgeAssistant
        - Key: Environment
          Value: Production

  # Bucket Policy - Allow Lambda access
  DocumentsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocumentsBucket
      PolicyDocument:
        Statement:
          - Sid: AllowLambdaRead
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt DocumentsBucket.Arn
              - !Sub '${DocumentsBucket.Arn}/*'

Outputs:
  DocumentsBucketName:
    Description: S3 Bucket for Knowledge Base Documents
    Value: !Ref DocumentsBucket
    Export:
      Name: !Sub '${AWS::StackName}-DocumentsBucket'

  DocumentsBucketArn:
    Description: S3 Bucket ARN
    Value: !GetAtt DocumentsBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DocumentsBucketArn'
