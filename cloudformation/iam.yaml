AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM roles and policies for Mobile Knowledge Assistant'

Parameters:
  KnowledgeBaseTableArn:
    Type: String
    Description: ARN of the Knowledge Base DynamoDB table
  
  TranscriptsTableArn:
    Type: String
    Description: ARN of the Transcripts DynamoDB table
  
  DocumentsBucketArn:
    Type: String
    Description: ARN of the Documents S3 bucket

Resources:
  # Lambda Execution Role for Document Ingestion
  DocumentIngestionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mobile-ka-document-ingestion-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectMetadata
                  - s3:PutObjectTagging
                Resource: !Sub '${DocumentsBucketArn}/*'
        - PolicyName: DynamoDBWriteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:BatchWriteItem
                Resource: !Ref KnowledgeBaseTableArn

  # Lambda Execution Role for Answer Retrieval
  AnswerRetrievalRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mobile-ka-answer-retrieval-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBReadWriteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:GetItem
                Resource:
                  - !Ref KnowledgeBaseTableArn
                  - !Sub '${KnowledgeBaseTableArn}/index/*'
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !Ref TranscriptsTableArn

  # Lambda Execution Role for Query Handler
  QueryHandlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mobile-ka-query-handler-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: '*'

Outputs:
  DocumentIngestionRoleArn:
    Description: IAM Role ARN for Document Ingestion Lambda
    Value: !GetAtt DocumentIngestionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DocumentIngestionRoleArn'

  AnswerRetrievalRoleArn:
    Description: IAM Role ARN for Answer Retrieval Lambda
    Value: !GetAtt AnswerRetrievalRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AnswerRetrievalRoleArn'

  QueryHandlerRoleArn:
    Description: IAM Role ARN for Query Handler Lambda
    Value: !GetAtt QueryHandlerRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QueryHandlerRoleArn'
